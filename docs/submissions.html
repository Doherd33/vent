<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Floor Submissions</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1e1e1e;
  --s1:       #252526;
  --s2:       #2d2d30;
  --s3:       #333337;
  --border:   #3c3c3c;
  --borderhi: #5a5a5a;
  --text:     #cccccc;
  --mid:      #8e8e8e;
  --dim:      #5a5a5a;
  --accent:   #007acc;
  --accent2:  rgba(0,122,204,0.15);
  --accent3:  rgba(0,122,204,0.28);
  --gold:     #ffc64d;
  --gold2:    rgba(255,198,77,0.15);
  --green:    #4ec9b0;
  --green2:   rgba(78,201,176,0.15);
  --red:      #f44747;
  --red2:     rgba(244,71,71,0.15);
  --blue:     #007acc;
  --blue2:    rgba(0,122,204,0.15);
  --teal:     #4ec9b0;
  --teal2:    rgba(78,201,176,0.12);
}

html { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── TOPBAR ── */
.topbar {
  flex-shrink: 0; z-index: 100;
  background: rgba(30,30,30,.97); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 16px; height: 56px;
}
.logo {
  font-family: 'Instrument Serif', serif; font-size: 22px;
  letter-spacing: -.02em; color: var(--text);
  display: flex; align-items: center; gap: 7px;
  text-decoration: none; flex-shrink: 0;
}
.pip { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: breathe 3s ease-in-out infinite; }
.app-nav { display: flex; align-items: center; gap: 2px; flex: 1; }
.nav-item {
  font-size: 13px; color: var(--mid); padding: 6px 12px; border-radius: 7px;
  text-decoration: none; transition: color .15s, background .15s; white-space: nowrap;
}
.nav-item:hover { color: var(--text); background: var(--s3); }
.nav-item.on { color: var(--accent); background: var(--accent2); font-weight: 500; }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* ── PAGE HEADER ── */
.page-header {
  flex-shrink: 0;
  background: var(--s1); border-bottom: 1px solid var(--border);
  padding: 20px 28px 18px;
}
.ph-inner { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.ph-title { font-family: 'Instrument Serif', serif; font-size: 24px; color: var(--text); margin-bottom: 4px; }
.ph-sub   { font-size: 12.5px; color: var(--dim); }

/* Stats strip */
.stat-strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }
.stat-chip {
  display: flex; flex-direction: column; align-items: center;
  background: var(--s2); border: 1px solid var(--border); border-radius: 9px;
  padding: 8px 18px; min-width: 72px; text-align: center;
}
.sc-n {
  font-family: 'Instrument Serif', serif; font-size: 26px; line-height: 1; margin-bottom: 3px;
}
.sc-n.ct { color: var(--teal); }
.sc-n.ca { color: var(--accent); }
.sc-n.cg { color: var(--gold); }
.sc-n.cv { color: var(--green); }
.sc-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--dim); }

/* ── FILTER BAR ── */
.filter-bar {
  flex-shrink: 0;
  background: rgba(240,244,248,.98); border-bottom: 1px solid var(--border);
  padding: 10px 28px;
}
.filter-inner { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.status-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.s-pill {
  background: none; border: 1px solid var(--border); border-radius: 100px;
  font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--mid);
  padding: 5px 12px; cursor: pointer; transition: all .12s; white-space: nowrap;
}
.s-pill:hover { border-color: var(--borderhi); color: var(--text); }
.s-pill.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-right { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.f-select {
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--s1); color: var(--mid);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 10px; outline: none; cursor: pointer;
}
.f-select:focus { border-color: var(--accent); }
.search-wrap { position: relative; display: flex; align-items: center; }
.search-ico  { position: absolute; left: 9px; color: var(--dim); pointer-events: none; }
.f-search {
  border: 1px solid var(--border); border-radius: 7px;
  background: var(--s1); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 10px 6px 30px; outline: none; width: 200px;
}
.f-search:focus { border-color: var(--accent); }
.f-search::placeholder { color: var(--dim); }
.result-count { font-size: 11px; color: var(--dim); white-space: nowrap; }

/* ── LIST AREA ── */
.list-area { flex: 1; overflow-y: auto; }
.list-inner {
  max-width: 1060px; width: 100%; margin: 0 auto;
  padding: 16px 28px 48px;
  display: flex; flex-direction: column; gap: 7px;
}

/* ── SUBMISSION ROW ── */
.sub-row {
  background: var(--s1); border: 1px solid var(--border); border-radius: 11px;
  overflow: hidden; transition: border-color .15s;
  animation: fadeUp .2s ease both;
}
.sub-row:hover { border-color: var(--borderhi); }
.sub-row.expanded { border-color: rgba(27,95,204,.3); }

.sub-row-head { display: flex; cursor: pointer; }
.sr-pri-bar { width: 4px; flex-shrink: 0; border-radius: 11px 0 0 11px; }
.sr-pri-bar.high   { background: var(--red); }
.sr-pri-bar.medium { background: var(--gold); }
.sr-pri-bar.low    { background: var(--green); }

.sr-main { flex: 1; padding: 13px 16px 12px; min-width: 0; }

.sr-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.sr-ref {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 500;
  color: var(--accent); background: var(--accent2); padding: 2px 8px; border-radius: 5px; flex-shrink: 0;
}
.sr-submitter { font-size: 12.5px; font-weight: 400; color: var(--text); flex-shrink: 0; }
.sr-sep { color: var(--borderhi); font-size: 12px; }
.sr-area {
  font-size: 10.5px; font-weight: 500; padding: 2px 8px; border-radius: 5px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; letter-spacing: .02em;
}
.area-upstream { background: var(--blue2);  color: var(--blue); }
.area-media    { background: var(--teal2);  color: var(--teal); }
.area-harvest  { background: var(--gold2);  color: var(--gold); }
.area-cip      { background: var(--s3);     color: var(--mid); border: 1px solid var(--border); }
.area-qc       { background: var(--green2); color: var(--green); }

.sr-date { font-size: 10.5px; color: var(--dim); margin-left: auto; white-space: nowrap; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

.sr-preview {
  font-size: 13px; color: var(--mid); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 9px;
}

.sr-bottom { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.sr-badge {
  font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  padding: 2px 8px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0;
}
.sb-new   { background: var(--accent2); color: var(--accent); }
.sb-ack   { background: var(--gold2);   color: var(--gold); }
.sb-wip   { background: var(--teal2);   color: var(--teal); }
.sb-done  { background: var(--green2);  color: var(--green); }

.sr-stage { font-size: 11.5px; color: var(--mid); display: flex; align-items: center; gap: 5px; }
.sr-stage-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.sr-expand-btn {
  margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--dim); cursor: pointer; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.sr-expand-btn:hover { border-color: var(--borderhi); color: var(--text); }
.sub-row.expanded .sr-expand-btn { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
.expand-chevron { transition: transform .22s cubic-bezier(.34,1.1,.64,1); }
.sub-row.expanded .expand-chevron { transform: rotate(180deg); }

/* ── EXPANDED BODY ── */
.sub-row-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 20px 20px 22px 24px;
}
.sub-row.expanded .sub-row-body { display: block; }

.full-text {
  font-size: 13.5px; color: var(--text); line-height: 1.75;
  margin-bottom: 20px; padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}

.expand-section-lbl {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); font-family: 'JetBrains Mono', monospace;
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.expand-section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.outcome-box {
  margin-top: 18px; padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-start;
}
.ob-icon { flex-shrink: 0; margin-top: 2px; }
.ob-txt  { font-size: 12.5px; color: var(--text); line-height: 1.55; }
.ob-by   { font-size: 11px; color: var(--dim); margin-top: 3px; }

/* ── PIPELINE ── */
.pl-pipeline { display: flex; flex-direction: column; }
.pl-step { display: flex; gap: 12px; }
.pl-left { display: flex; flex-direction: column; align-items: center; width: 20px; flex-shrink: 0; }
.pl-dot {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 9px; z-index: 1;
}
.pl-dot.done    { background: var(--green2); border: 1.5px solid var(--green); color: var(--green); }
.pl-dot.active  { background: var(--teal2);  border: 1.5px solid var(--teal);  color: var(--teal); }
.pl-dot.pending { background: var(--s3);     border: 1.5px solid var(--border); color: var(--dim); }
.pl-connector { width: 1.5px; flex: 1; min-height: 8px; background: var(--border); margin: 2px 0; }
.pl-connector.done-line { background: var(--green); opacity: .35; }
.pl-body { flex: 1; padding-bottom: 12px; }
.pl-step:last-child .pl-body { padding-bottom: 0; }
.pl-stage { font-size: 12.5px; color: var(--text); font-weight: 400; line-height: 1.3; }
.pl-who   { font-size: 11px; color: var(--mid); margin-top: 2px; }
.pl-note  { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.5; }
.pl-date  { font-size: 10px; color: var(--dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.pl-badge-active {
  display: inline-flex; align-items: center; gap: 3px; margin-left: 6px;
  font-size: 9px; font-family: 'JetBrains Mono', monospace; font-weight: 600;
  background: var(--teal2); color: var(--teal); padding: 1px 7px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: .04em;
}

/* ── EMPTY STATE ── */
.empty-list {
  text-align: center; padding: 60px 20px;
  color: var(--dim); font-size: 13px; line-height: 1.7;
}
.empty-list strong { color: var(--mid); display: block; margin-bottom: 6px; font-size: 14px; }

/* ── HAMBURGER ── */
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--mid); cursor: pointer; padding: 6px; border-radius: 7px; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.hamburger:hover { color: var(--text); background: var(--s3); }
.hamburger svg { display: block; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .hamburger { display: flex; align-items: center; justify-content: center; }
  .app-nav { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--s1); border-bottom: 1px solid var(--border); flex-direction: column; padding: 8px 12px; gap: 2px; box-shadow: 0 12px 32px rgba(0,0,0,.3); z-index: 200; }
  .app-nav.open { display: flex; }
  .topbar { position: relative; padding: 0 12px; gap: 8px; }
  .nav-item { padding: 12px 16px; font-size: 14px; width: 100%; border-radius: 8px; }
  .page-header { padding: 16px 14px; }
  .ph-title { font-size: 20px; }
  .filter-bar { padding: 10px 14px; }
  .filter-inner { gap: 8px; }
  .status-pills { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .status-pills::-webkit-scrollbar { display: none; }
  .filter-right { width: 100%; margin-left: 0; }
  .list-inner { padding: 12px 14px 28px; }
  .sr-date { display: none; }
  .stat-strip { gap: 6px; }
  .stat-chip { padding: 6px 10px; min-width: 58px; }
  .sc-n { font-size: 20px; }
  .f-search { width: 100%; min-width: 0; }
  .search-wrap { flex: 1; }
  .sr-preview { -webkit-line-clamp: 1; font-size: 12px; }
  .sr-top { gap: 5px; }
  .sr-main { padding: 10px 12px 9px; }
  .sr-submitter { font-size: 12px; }
  .sub-row-body { padding: 14px 14px 16px 16px; }
  .full-text { font-size: 13px; }
  .pl-stage { font-size: 12px; }
}
</style>
<script>
  const SERVER = 'https://vent-production-8f8a.up.railway.app';
  // Auth guard
  (async function authGuard() {
    if(new URLSearchParams(window.location.search).has('dev')){localStorage.setItem('vent_role','admin');localStorage.setItem('vent_name','Dev Admin');localStorage.setItem('vent_token','dev');}
    const token = localStorage.getItem('vent_token');
    const _r = localStorage.getItem('vent_role');
    if (!token || !_r || _r === 'operator') { window.location.replace('login.html'); return; }
    if (token === 'dev') return;
    try {
      const res = await fetch(SERVER + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error('expired');
    } catch {
      localStorage.removeItem('vent_token'); localStorage.removeItem('vent_role');
      localStorage.removeItem('vent_name'); localStorage.removeItem('vent_user_id');
      window.location.replace('login.html');
    }
  })();
</script>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="logo">Vent<div class="pip"></div></a>
  <button class="hamburger" onclick="document.querySelector('.app-nav').classList.toggle('open')" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
  <div class="app-nav">
    <a href="index.html"       class="nav-item">Submit</a>
    <a href="query.html"       class="nav-item">Query SOPs</a>
    <a href="submissions.html" class="nav-item on">Submissions</a>
    <a href="builder.html"     class="nav-item">Doc Builder</a>
    <a href="qa.html"          class="nav-item">QA Control</a>
    <a href="workflow.html"    class="nav-item">Workflow</a>
    <a href="dashboard.html"   class="nav-item">Dashboard</a>
  </div>
  <div class="topbar-right" id="topbarRight"></div>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="ph-inner">
    <div>
      <div class="ph-title">Floor Submissions</div>
      <div class="ph-sub">All operator observations — sorted newest first</div>
    </div>
    <div class="stat-strip" id="statStrip"></div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-inner">
    <div class="status-pills">
      <button class="s-pill on" data-s="all"          onclick="setStatus(this)">All</button>
      <button class="s-pill"    data-s="new"           onclick="setStatus(this)">New</button>
      <button class="s-pill"    data-s="acknowledged"  onclick="setStatus(this)">Acknowledged</button>
      <button class="s-pill"    data-s="in_progress"   onclick="setStatus(this)">In Progress</button>
      <button class="s-pill"    data-s="resolved"      onclick="setStatus(this)">Resolved</button>
    </div>
    <div class="filter-right">
      <select id="areaFilter" class="f-select" onchange="render()">
        <option value="">All areas</option>
        <option value="Upstream Bioreactor">Upstream</option>
        <option value="Media Prep">Media Prep</option>
        <option value="Harvest / TFF">Harvest / TFF</option>
        <option value="CIP / SIP">CIP / SIP</option>
        <option value="QC / In-process">QC</option>
      </select>
      <select id="priFilter" class="f-select" onchange="render()">
        <option value="">All priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <div class="search-wrap">
        <svg class="search-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" class="f-search" placeholder="Search submissions…" oninput="render()">
      </div>
      <span class="result-count" id="resultCount"></span>
    </div>
  </div>
</div>

<!-- LIST AREA -->
<div class="list-area">
  <div class="list-inner" id="listInner"></div>
</div>

// ── FILTER STATE ──────────────────────────────────────
let _statusFilter = 'all';

function setStatus(btn) {
  document.querySelectorAll('.s-pill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  _statusFilter = btn.dataset.s;
  render();
}

function getFiltered() {
  const area   = document.getElementById('areaFilter').value;
  const pri    = document.getElementById('priFilter').value;
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  return ALL_SUBS.filter(s => {
    if (_statusFilter !== 'all' && s.status !== _statusFilter) return false;
    if (area && s.area !== area) return false;
    if (pri  && s.priority !== pri) return false;
    if (search) {
      const hay = (s.text + s.ref + s.submitter + s.area + (s.outcome||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

// ── HELPERS ───────────────────────────────────────────
function areaClass(area) {
  if (area.includes('Upstream')) return 'area-upstream';
  if (area.includes('Media'))    return 'area-media';
  if (area.includes('Harvest'))  return 'area-harvest';
  if (area.includes('CIP'))      return 'area-cip';
  if (area.includes('QC'))       return 'area-qc';
  return 'area-cip';
}

function currentStage(pipeline) {
  const active = pipeline.find(s => s.status === 'active');
  if (active) return { label: active.stage, who: active.who || '', color: 'var(--teal)' };
  if (pipeline.every(s => s.status === 'done')) return { label: 'Completed', who: '', color: 'var(--green)' };
  return { label: 'Pending review', who: '', color: 'var(--dim)' };
}

const badgeCls = { new:'sb-new', acknowledged:'sb-ack', in_progress:'sb-wip', resolved:'sb-done' };
const badgeTxt = { new:'New', acknowledged:'Acknowledged', in_progress:'In Progress', resolved:'Resolved ✓' };

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function buildPipelineHtml(pipeline) {
  return pipeline.map((step, idx) => {
    const isLast   = idx === pipeline.length - 1;
    const dotInner = step.status === 'done'
      ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`
      : step.status === 'active'
        ? `<div style="width:7px;height:7px;border-radius:50%;background:var(--teal)"></div>`
        : `<div style="width:5px;height:5px;border-radius:50%;background:var(--border)"></div>`;
    const connCls   = step.status === 'done' ? 'pl-connector done-line' : 'pl-connector';
    const connector = !isLast ? `<div class="${connCls}"></div>` : '';
    const activeBadge = step.status === 'active' ? `<span class="pl-badge-active">● With them now</span>` : '';
    const whoHtml  = step.who  ? `<div class="pl-who">${escHtml(step.who)}${activeBadge}</div>` : '';
    const noteHtml = step.note ? `<div class="pl-note">${escHtml(step.note)}</div>` : '';
    const dateHtml = step.date ? `<div class="pl-date">${escHtml(step.date)}</div>` : '';
    return `
    <div class="pl-step">
      <div class="pl-left">
        <div class="pl-dot ${step.status}">${dotInner}</div>
        ${connector}
      </div>
      <div class="pl-body">
        <div class="pl-stage">${escHtml(step.stage)}</div>
        ${whoHtml}${noteHtml}${dateHtml}
      </div>
    </div>`;
  }).join('');
}

// ── RENDER ────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const el = document.getElementById('listInner');
  const rc = document.getElementById('resultCount');
  rc.textContent = filtered.length === ALL_SUBS.length
    ? '' : `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-list"><strong>No submissions match your filters.</strong>Try adjusting the status filter, area, or search term.</div>`;
    return;
  }

  el.innerHTML = filtered.map((s, i) => {
    const stage = currentStage(s.pipeline);
    const outcomeHtml = s.outcome ? `
    <div class="outcome-box">
      <svg class="ob-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
      <div>
        <div class="ob-txt">${escHtml(s.outcome)}</div>
        ${s.reviewer ? `<div class="ob-by">${escHtml(s.reviewer)}</div>` : ''}
      </div>
    </div>` : '';

    return `
    <div class="sub-row" id="row-${i}" style="animation-delay:${i * 0.025}s">
      <div class="sub-row-head" onclick="toggleRow(${i})">
        <div class="sr-pri-bar ${s.priority}"></div>
        <div class="sr-main">
          <div class="sr-top">
            <span class="sr-ref">${escHtml(s.ref)}</span>
            <span class="sr-submitter">${escHtml(s.submitter)}</span>
            <span class="sr-sep">·</span>
            <span class="sr-area ${areaClass(s.area)}">${escHtml(s.area)}</span>
            <span class="sr-date">${escHtml(s.date)}</span>
          </div>
          <div class="sr-preview">${escHtml(s.text)}</div>
          <div class="sr-bottom">
            <span class="sr-badge ${badgeCls[s.status]}">${badgeTxt[s.status]}</span>
            <div class="sr-stage">
              <div class="sr-stage-dot" style="background:${stage.color}"></div>
              ${escHtml(stage.label)}${stage.who ? ` · ${escHtml(stage.who)}` : ''}
            </div>
            <button class="sr-expand-btn"
              onclick="event.stopPropagation();toggleRow(${i})"
              title="${s.status === 'new' ? 'View pipeline' : 'View details'}">
              <svg class="expand-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="sub-row-body">
        <div class="full-text">${escHtml(s.text)}</div>
        <div class="expand-section-lbl">Approval Pipeline</div>
        <div class="pl-pipeline">${buildPipelineHtml(s.pipeline)}</div>
        ${outcomeHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleRow(i) {
  document.getElementById(`row-${i}`).classList.toggle('expanded');
}

function renderStats() {
  const total    = ALL_SUBS.length;
  const newCount = ALL_SUBS.filter(s => s.status === 'new').length;
  const inRev    = ALL_SUBS.filter(s => s.status === 'acknowledged' || s.status === 'in_progress').length;
  const resolved = ALL_SUBS.filter(s => s.status === 'resolved').length;
  document.getElementById('statStrip').innerHTML = `
    <div class="stat-chip"><div class="sc-n ct">${total}</div><div class="sc-lbl">Total</div></div>
    <div class="stat-chip"><div class="sc-n ca">${newCount}</div><div class="sc-lbl">New</div></div>
    <div class="stat-chip"><div class="sc-n cg">${inRev}</div><div class="sc-lbl">In Review</div></div>
    <div class="stat-chip"><div class="sc-n cv">${resolved}</div><div class="sc-lbl">Resolved</div></div>
  `;
}

// ── AUTH TOPBAR ───────────────────────────────────────
(function() {
  const role = localStorage.getItem('vent_role');
  const name = localStorage.getItem('vent_name');
  if (!role) return;
  const labels = {operator:'Operator',qa:'QA',director:'Director',msat:'MSAT',engineering:'Engineering',admin:'Admin'};
  const clrs   = {operator:'var(--teal)',qa:'var(--accent)',director:'var(--gold)',msat:'var(--green)',engineering:'var(--mid)',admin:'var(--red)'};
  const navRules = {
    operator:    ['Query SOPs','Doc Builder'],
    qa:          ['Submit','Submissions','Doc Builder','QA Control'],
    director:    ['Submissions','Doc Builder','QA Control'],
    msat:        ['Submit','Query SOPs','Submissions','Doc Builder'],
    engineering: ['Submissions','Doc Builder'],
    admin:       ['Submit','Query SOPs','Submissions','Doc Builder','QA Control']
  };
  const right = document.querySelector('.topbar-right');
  if (!right) return;
  const safe = s => s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
  const d = document.createElement('div');
  d.style.cssText = 'display:flex;align-items:center;gap:8px;border-left:1px solid var(--border);padding-left:12px;flex-shrink:0;';
  d.innerHTML = `<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:${clrs[role]||'var(--mid)'};background:var(--s3);border:1px solid var(--border);padding:3px 8px;border-radius:5px;letter-spacing:.05em;">${labels[role]||role.toUpperCase()}</span>${name?`<span style="font-size:12px;color:var(--mid);font-weight:300">${safe(name)}</span>`:''}<button onclick="localStorage.removeItem('vent_token');localStorage.removeItem('vent_role');localStorage.removeItem('vent_name');localStorage.removeItem('vent_user_id');window.location.replace('login.html')" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;" onmouseover="this.style.borderColor='var(--borderhi)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">Sign out</button>`;
  right.appendChild(d);
  const allowed = navRules[role] || [];
  document.querySelectorAll('.nav-item').forEach(l => { if (!allowed.some(a => l.textContent.trim().includes(a))) l.style.display = 'none'; });
})();

// Init
renderStats();
render();
</script>
