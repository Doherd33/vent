<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<style>
body {
  height: 100vh;
  display: grid;
  grid-template-rows: 42px 1fr 22px;
  overflow: hidden;
}

/* ── WORKBENCH ── */
.workbench {
  display: grid;
  grid-template-columns: 260px 4px 1fr;
  grid-template-rows: 1fr 4px 280px;
  overflow: hidden;
  position: relative;
}

/* ── RESIZE HANDLES ── */
.resizer { background: #3c3c3c; z-index: 10; transition: background 0.15s; }
.resizer:hover, .resizer.dragging { background: #007acc; }
.resizer-v { cursor: col-resize; grid-row: 1 / 4; }
.resizer-h { cursor: row-resize; grid-column: 1 / 4; grid-row: 2; }

/* ── LEFT PANEL ── */
.left-panel {
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  grid-row: 1 / 4;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--mid);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.panel-badge {
  background: var(--accent2);
  color: var(--accent);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 2px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.filter-btn {
  background: none;
  border: 1px solid transparent;
  color: var(--dim);
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.filter-btn:hover { color: var(--mid); background: var(--s2); }
.filter-btn.active { color: var(--accent); border-color: var(--accent2); background: var(--accent2); }

/* Session list */
.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
.session-list::-webkit-scrollbar { width: 6px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.session-card {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.session-card:hover { background: var(--s2); }
.session-card.active { background: var(--accent2); border-color: var(--accent3); }
.session-card-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.session-user {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.session-role-badge {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  padding: 1px 6px;
  border-radius: 3px;
  letter-spacing: .04em;
}
.sev-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sev-low { background: #69db7c; }
.sev-medium { background: #ffd43b; }
.sev-high { background: #ffa94d; }
.sev-critical { background: #ff6b6b; }
.session-date {
  font-size: 10px;
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
}
.session-summary {
  font-size: 11px;
  color: var(--mid);
  line-height: 1.4;
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.session-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 5px;
}
.cat-tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  background: var(--s3);
  color: var(--mid);
}
.cat-tag.UX { background: rgba(0,122,204,0.15); color: #4fc1ff; }
.cat-tag.missing_feature { background: rgba(255,198,77,0.15); color: #ffc64d; }
.cat-tag.bug { background: rgba(244,71,71,0.15); color: #f44747; }
.cat-tag.workflow { background: rgba(78,201,176,0.15); color: #4ec9b0; }
.cat-tag.sop_gap { background: rgba(197,134,192,0.15); color: #c586c0; }
.cat-tag.training { background: rgba(156,220,254,0.15); color: #9cdcfe; }
.cat-tag.performance { background: rgba(255,169,77,0.15); color: #ffa94d; }
.cat-tag.praise { background: rgba(105,219,124,0.15); color: #69db7c; }

.status-pill {
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.status-active    { background: rgba(0,122,204,0.2); color: #4fc1ff; }
.status-completed { background: rgba(255,198,77,0.2); color: #ffc64d; }
.status-analysed  { background: rgba(78,201,176,0.2); color: #4ec9b0; }

/* ── CENTER PANEL ── */
.center-panel {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.center-tabs {
  display: flex;
  align-items: center;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  min-height: 32px;
}
.center-tab {
  padding: 6px 14px;
  font-size: 11px;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: inherit;
}
.center-tab:hover { color: var(--mid); }
.center-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.center-tab-spacer { flex: 1; }
.center-actions { display: flex; gap: 6px; align-items: center; }
.action-btn {
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--mid);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.action-btn:hover { color: var(--text); border-color: var(--borderhi); background: var(--s3); }
.action-btn.primary { background: var(--accent2); border-color: var(--accent3); color: hsl(var(--hue),100%,65%); }
.action-btn.primary:hover { background: var(--accent3); color: #fff; }
.action-btn:disabled { opacity: .5; cursor: default; }
.action-btn svg { flex-shrink: 0; }
.center-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.center-content::-webkit-scrollbar { width: 6px; }
.center-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--dim);
  font-size: 13px;
  gap: 8px;
}

/* Transcript view */
.transcript-msg {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.transcript-msg.operator { flex-direction: row; }
.transcript-msg.assistant { flex-direction: row-reverse; }
.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
}
.msg-avatar.operator-av { background: var(--teal2); color: var(--teal); }
.msg-avatar.charlie-av { background: var(--accent2); color: var(--accent); }
.msg-bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.5;
}
.transcript-msg.operator .msg-bubble {
  background: var(--s2);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.transcript-msg.assistant .msg-bubble {
  background: var(--accent2);
  border-bottom-right-radius: 4px;
  color: var(--text);
}
.msg-time {
  font-size: 9px;
  color: var(--dim);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

/* Analysis view */
.analysis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.analysis-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
.analysis-card.full-width { grid-column: 1 / -1; }
.analysis-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dim);
  margin-bottom: 8px;
  font-weight: 500;
}
.analysis-value {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}
.sentiment-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}
.sentiment-positive { background: rgba(105,219,124,0.15); color: #69db7c; }
.sentiment-neutral  { background: rgba(142,142,142,0.15); color: #8e8e8e; }
.sentiment-negative { background: rgba(244,71,71,0.15); color: #f44747; }
.sentiment-mixed    { background: rgba(255,198,77,0.15); color: #ffc64d; }
.severity-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}
.severity-low      { background: rgba(105,219,124,0.15); color: #69db7c; }
.severity-medium   { background: rgba(255,212,59,0.15); color: #ffd43b; }
.severity-high     { background: rgba(255,169,77,0.15); color: #ffa94d; }
.severity-critical { background: rgba(244,71,71,0.15); color: #f44747; }
.quote-block {
  border-left: 3px solid var(--accent);
  padding: 6px 12px;
  margin: 6px 0;
  font-style: italic;
  font-size: 12px;
  color: var(--mid);
  background: var(--s2);
  border-radius: 0 6px 6px 0;
}
.action-item {
  padding: 8px 12px;
  margin: 4px 0;
  background: var(--s2);
  border-radius: 6px;
  border-left: 3px solid var(--accent);
}
.action-item-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 3px;
}
.action-item-desc {
  font-size: 11px;
  color: var(--mid);
}
.action-item-priority {
  display: inline-block;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  margin-right: 6px;
}
.priority-low      { background: rgba(105,219,124,0.15); color: #69db7c; }
.priority-medium   { background: rgba(255,212,59,0.15); color: #ffd43b; }
.priority-high     { background: rgba(255,169,77,0.15); color: #ffa94d; }
.priority-critical { background: rgba(244,71,71,0.15); color: #f44747; }

/* ── RIGHT PANEL — Prompt ── */
.right-panel {
  position: fixed;
  top: 42px;
  right: 0;
  bottom: 22px;
  width: 520px;
  background: var(--s1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 100;
  transform: translateX(100%);
  transition: transform .25s ease;
  box-shadow: -4px 0 24px rgba(0,0,0,.5);
}
.right-panel.open {
  transform: translateX(0);
}
.right-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--mid);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.right-close {
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  padding: 2px;
  border-radius: 4px;
  transition: all .15s;
}
.right-close:hover { color: var(--text); background: var(--s3); }
.right-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
.right-content::-webkit-scrollbar { width: 6px; }
.right-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.prompt-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.6;
  color: #e0e0e0;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.copy-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent2);
  border: 1px solid var(--accent3);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  margin-bottom: 12px;
  transition: all .15s;
  width: 100%;
  justify-content: center;
}
.copy-btn:hover { background: var(--accent3); }
@keyframes btnSpin { to { transform: rotate(360deg); } }

/* ── BOTTOM PANEL ── */
.bottom-panel {
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  grid-column: 1 / 4;
}
.bottom-tabs {
  display: flex;
  background: var(--s2);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  min-height: 28px;
  align-items: center;
}
.bottom-tab {
  padding: 4px 12px;
  font-size: 10px;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  background: none;
  border-top: none; border-left: none; border-right: none;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.bottom-tab:hover { color: var(--mid); }
.bottom-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.bottom-content {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.bottom-pane {
  position: absolute;
  inset: 0;
  display: none;
  overflow-y: auto;
  padding: 16px;
}
.bottom-pane.active { display: block; }
.bottom-pane::-webkit-scrollbar { width: 6px; }
.bottom-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Chat Capture — JARVIS Voice Command Center ── */
.chat-capture {
  display: flex;
  height: 100%;
  gap: 0;
}
.chat-thread {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.chat-thread::-webkit-scrollbar { width: 5px; }
.chat-thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.chat-thread:empty::after {
  content: 'Start a conversation with Charlie about your experience using Vent.';
  color: var(--dim);
  font-size: 11px;
  text-align: center;
  margin: auto;
}
.chat-msg {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  max-width: 85%;
}
.chat-msg.from-user { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg.from-charlie { align-self: flex-start; }
.chat-msg-av {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 600; flex-shrink: 0;
}
.chat-msg-av.user-av { background: var(--teal2); color: var(--teal); }
.chat-msg-av.charlie-av { background: var(--accent2); color: var(--accent); }
.chat-msg-text {
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 11px;
  line-height: 1.45;
}
.chat-msg.from-user .chat-msg-text {
  background: var(--s3);
  color: var(--text);
  border-bottom-right-radius: 3px;
}
.chat-msg.from-charlie .chat-msg-text {
  background: var(--accent2);
  color: var(--text);
  border-bottom-left-radius: 3px;
}
.chat-msg-thinking {
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 11px;
  background: var(--accent2);
  color: var(--dim);
  border-bottom-left-radius: 3px;
}
.chat-msg-thinking .dots span {
  animation: dotPulse 1.4s infinite;
  display: inline-block;
}
.chat-msg-thinking .dots span:nth-child(2) { animation-delay: .2s; }
.chat-msg-thinking .dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dotPulse { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

/* ── Voice Command Center ── */
.voice-command {
  width: 260px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  border-left: 1px solid var(--border);
  overflow: hidden;
  background: radial-gradient(circle at 50% 50%, hsla(var(--hue),80%,20%,.12) 0%, transparent 70%);
  cursor: pointer;
}
/* Scan lines overlay */
.voice-command::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, hsla(var(--hue),100%,50%,.02) 3px, hsla(var(--hue),100%,50%,.02) 4px);
  pointer-events: none;
  z-index: 0;
}
/* Grid overlay */
.voice-command::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(hsla(var(--hue),100%,50%,.03) 1px, transparent 1px),
    linear-gradient(90deg, hsla(var(--hue),100%,50%,.03) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: 0;
}

.vc-orb-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

/* Concentric rings */
.vc-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid hsla(var(--hue),100%,50%,.08);
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  transition: border-color .5s, opacity .5s;
}
.vc-ring-1 { width: 90px; height: 90px; }
.vc-ring-2 { width: 120px; height: 120px; opacity: .5; }
.vc-ring-3 { width: 150px; height: 150px; opacity: .25; }

/* Ring animations per state */
.chat-capture.state-listening .vc-ring {
  border-color: hsla(var(--hue),100%,50%,.18);
  animation: ringPulse 2s ease-in-out infinite;
}
.chat-capture.state-listening .vc-ring-2 { animation-delay: .3s; }
.chat-capture.state-listening .vc-ring-3 { animation-delay: .6s; }
@keyframes ringPulse {
  0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .3; }
  50%     { transform: translate(-50%,-50%) scale(1.06); opacity: .6; }
}

.chat-capture.state-speaking .vc-ring {
  border-color: hsla(var(--hue),100%,55%,.2);
  animation: ringExpand 1.8s ease-out infinite;
}
.chat-capture.state-speaking .vc-ring-2 { animation-delay: .4s; }
.chat-capture.state-speaking .vc-ring-3 { animation-delay: .8s; }
@keyframes ringExpand {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: .35; }
  100% { transform: translate(-50%,-50%) scale(1.25); opacity: 0; }
}

.chat-capture.state-thinking .vc-ring-1 {
  border-color: transparent;
  border-top-color: hsla(var(--hue),100%,55%,.5);
  border-right-color: hsla(var(--hue),100%,55%,.2);
  animation: spin 1.2s linear infinite;
}
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

/* Glowing core orb */
.vc-core {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%,
    hsla(var(--hue),100%,55%,.85),
    hsla(var(--hue),80%,30%,.7));
  box-shadow:
    0 0 24px hsla(var(--hue),100%,50%,.45),
    0 0 60px hsla(var(--hue),100%,50%,.12),
    inset 0 0 12px hsla(var(--hue),100%,70%,.2);
  z-index: 2;
  transition: box-shadow .3s, transform .3s;
  animation: coreBreath 4s ease-in-out infinite;
}
@keyframes coreBreath {
  0%,100% { transform: scale(1); box-shadow: 0 0 24px hsla(var(--hue),100%,50%,.45), 0 0 60px hsla(var(--hue),100%,50%,.12); }
  50%     { transform: scale(1.04); box-shadow: 0 0 32px hsla(var(--hue),100%,50%,.55), 0 0 80px hsla(var(--hue),100%,50%,.18); }
}
.chat-capture.state-listening .vc-core {
  box-shadow: 0 0 30px hsla(var(--hue),100%,50%,.6), 0 0 80px hsla(var(--hue),100%,50%,.2);
  animation: coreListen 1.5s ease-in-out infinite;
}
@keyframes coreListen {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}
.chat-capture.state-speaking .vc-core {
  box-shadow: 0 0 36px hsla(var(--hue),100%,55%,.7), 0 0 100px hsla(var(--hue),100%,50%,.25);
}
.chat-capture.state-thinking .vc-core {
  animation: coreThink 0.8s ease-in-out infinite;
}
@keyframes coreThink {
  0%,100% { opacity: 1; }
  50%     { opacity: .6; }
}

/* Radial frequency bars */
.vc-bars {
  position: absolute;
  inset: 0;
  z-index: 1;
}
.vc-bar {
  position: absolute;
  left: calc(50% - 1.5px);
  bottom: 50%;
  width: 3px;
  height: 33px; /* 30px spacer + 3px visible */
  transform-origin: 1.5px 0;
  background: linear-gradient(to top, transparent 30px, hsla(var(--hue),100%,58%,.35) 30px);
  border-radius: 2px;
  transition: height .05s linear;
}
.chat-capture.state-listening .vc-bar {
  background: linear-gradient(to top, transparent 30px, hsla(var(--hue),100%,60%,.6) 30px);
  filter: drop-shadow(0 0 2px hsla(var(--hue),100%,50%,.3));
}
.chat-capture.state-speaking .vc-bar {
  background: linear-gradient(to top, transparent 30px, hsla(var(--hue),100%,65%,.75) 30px);
  filter: drop-shadow(0 0 4px hsla(var(--hue),100%,50%,.4));
}

/* Status label */
.vc-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: hsla(var(--hue),100%,60%,.5);
  text-shadow: 0 0 8px hsla(var(--hue),100%,50%,.2);
  z-index: 1;
  margin-top: -8px;
  transition: color .3s;
}
.chat-capture.state-listening .vc-status { color: hsla(var(--hue),100%,65%,.8); text-shadow: 0 0 12px hsla(var(--hue),100%,50%,.4); }
.chat-capture.state-thinking .vc-status  { color: hsla(var(--hue),100%,60%,.7); }
.chat-capture.state-speaking .vc-status  { color: hsla(var(--hue),100%,70%,.9); text-shadow: 0 0 16px hsla(var(--hue),100%,55%,.5); }

.vc-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: hsla(var(--hue),100%,50%,.25);
  z-index: 1;
  margin-top: 4px;
}

/* ── Input Row ── */
.chat-input-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--s2);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
  flex-shrink: 0;
}
.chat-send-btn:hover { opacity: .85; }
.chat-send-btn:disabled { opacity: .4; cursor: default; }

/* Voice orb (inline input button) */
.chat-orb-btn {
  position: relative;
  width: 30px; height: 30px;
  background: none; border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--mid);
  transition: all .15s;
  flex-shrink: 0;
}
.chat-orb-btn:hover { border-color: var(--borderhi); color: var(--text); }
.chat-orb-btn.recording { border-color: var(--red); color: var(--red); animation: recPulse 1.5s ease-in-out infinite; }
.chat-orb-btn.thinking { border-color: var(--accent); color: var(--accent); animation: recPulse 1.2s ease-in-out infinite; }
.chat-orb-btn.speaking { border-color: hsl(var(--hue),100%,55%); color: hsl(var(--hue),100%,55%); animation: speakPulse 0.8s ease-in-out infinite; }
@keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes speakPulse { 0%,100%{box-shadow:0 0 0 0 hsla(var(--hue),100%,50%,.3)} 50%{box-shadow:0 0 0 6px hsla(var(--hue),100%,50%,0)} }

.chat-end-btn {
  background: var(--red2);
  border: 1px solid rgba(244,71,71,0.3);
  color: var(--red);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  transition: all .15s;
  flex-shrink: 0;
  display: none;
  letter-spacing: .03em;
}
.chat-end-btn:hover { background: rgba(244,71,71,0.35); color: #ff6b6b; }
.chat-capture.has-session ~ .chat-input-row .chat-end-btn { display: block; }

/* ── STATUS BAR ── */
.status-bar {
  background: var(--accent);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  color: rgba(255,255,255,.85);
  gap: 14px;
  height: 22px;
}
.status-item { display: flex; align-items: center; gap: 4px; }

/* ── Trend Report ── */
.trend-card { background:#2a2a2a; border:1px solid #3c3c3c; border-radius:8px; padding:16px; margin-bottom:12px; }
.trend-title { color:#e0e0e0; font-size:14px; font-weight:600; margin-bottom:8px; }
.trend-body { color:#999; font-size:12px; line-height:1.6; }

/* ── Mobile ── */
@media(max-width:768px) {
  .workbench { grid-template-columns: 1fr !important; grid-template-rows: auto 1fr auto !important; }
  .left-panel { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  .right-panel { display: none !important; }
  .resizer-v { display: none; }
}

<script>
// ── Globals ──
var currentSessionId = null;
var currentSession = null;
var sessions = [];
var currentFilter = '';
var centerView = 'transcript';
var feedbackSessionId = null;  // active voice session
var voiceState = 'idle';       // idle | listening | thinking | speaking
var voiceConvoMode = false;    // continuous voice conversation mode
var voiceRetryCount = 0;       // consecutive empty-STT retries

function t(k) { return (window.VentI18n && VentI18n.t(k)) || k; }

// ════════════════════════════════════════════════════════════════════════════════
// VENT AUDIO — STT/TTS (ported from query.html)
// ════════════════════════════════════════════════════════════════════════════════
window.VentAudio = (function(){
  var CHARLIE_VOICE_ID = 'IKne3meq5aSn9XLyUdCD';
  var TTS_MODEL = 'eleven_multilingual_v2';
  var audioCtx = null;
  var analyser = null;
  var currentSource = null;
  var currentAudio = null;
  var gainNode = null;
  var animFrame = null;
  var recorder = null;
  var recChunks = [];
  var recStream = null;
  var micAnalyser = null;
  var micSource = null;
  var cancelled = false;

  function unlock(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    if(!gainNode){
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.85;
      gainNode.connect(audioCtx.destination);
    }
    return audioCtx;
  }

  var stopGen = 0;
  function stop(){
    stopGen++;
    if(animFrame){ cancelAnimationFrame(animFrame); animFrame = null; }
    if(currentSource){ try{ currentSource.stop(); }catch(e){} currentSource = null; }
    if(currentAudio){ currentAudio.pause(); currentAudio.src = ''; currentAudio = null; }
  }

  function speak(text, onBars, onEnd){
    if(!text){ if(onEnd) onEnd(); return; }

    // Read user voice settings from localStorage (shared with query.html profile panel)
    var vc = {};
    try { vc = JSON.parse(localStorage.getItem('vent_voice_config') || '{}') || {}; } catch(e){}

    // Global mute check
    if(vc.mute){ if(onEnd) onEnd(); return; }

    stop();
    var gen = stopGen;
    var done = false;
    function finish(){ if(done) return; done = true; if(animFrame){ cancelAnimationFrame(animFrame); animFrame = null; } currentSource = null; currentAudio = null; if(onEnd) onEnd(); }
    var safety = setTimeout(function(){ finish(); }, 25000);
    function finishClean(){ clearTimeout(safety); finish(); }

    var selectedVoice = vc.voiceId || CHARLIE_VOICE_ID;
    var ttsBody = {
      text: text, voiceId: selectedVoice, modelId: TTS_MODEL,
      stability:        vc.stability !== undefined ? vc.stability / 100 : undefined,
      similarity_boost: vc.clarity   !== undefined ? vc.clarity  / 100 : undefined,
      style:            vc.style     !== undefined ? vc.style    / 100 : undefined,
      use_speaker_boost: vc.boost !== undefined ? !!vc.boost : undefined
    };
    Object.keys(ttsBody).forEach(function(k){ if(ttsBody[k] === undefined) delete ttsBody[k]; });

    fetch(SERVER + '/tts', {
      method: 'POST',
      headers: Object.assign({'Content-Type':'application/json'}, getAuthHeaders()),
      body: JSON.stringify(ttsBody)
    })
    .then(function(r){ if(!r.ok) throw new Error('TTS ' + r.status); return r.blob(); })
    .then(function(blob){
      if(gen !== stopGen){ finishClean(); return; }
      if(blob.size < 200) throw new Error('Audio too small');
      var url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.volume = vc.volume !== undefined ? vc.volume / 100 : 1.0;
      // Speed + pitch: combine speed slider with pitch semitone offset
      var baseRate = vc.speed !== undefined ? vc.speed / 100 : 1.0;
      var pitchSemis = vc.pitch || 0;
      currentAudio.playbackRate = pitchSemis !== 0 ? baseRate * Math.pow(2, pitchSemis / 12) : baseRate;
      currentAudio.onended = function(){ URL.revokeObjectURL(url); finishClean(); };
      currentAudio.onerror = function(){ URL.revokeObjectURL(url); finishClean(); };
      try {
        var ctx = unlock();
        if(ctx.state === 'running'){
          var source = ctx.createMediaElementSource(currentAudio);
          analyser = ctx.createAnalyser();
          analyser.fftSize = 64;
          analyser.smoothingTimeConstant = 0.75;
          // Build audio chain: source → bass → treble → analyser → destination
          var lastNode = source;
          var bassVal = vc.bass || 0;
          if(bassVal !== 0){
            var bassFilter = ctx.createBiquadFilter();
            bassFilter.type = 'lowshelf';
            bassFilter.frequency.value = 200;
            bassFilter.gain.value = bassVal;
            lastNode.connect(bassFilter);
            lastNode = bassFilter;
          }
          var trebleVal = vc.treble || 0;
          if(trebleVal !== 0){
            var trebleFilter = ctx.createBiquadFilter();
            trebleFilter.type = 'highshelf';
            trebleFilter.frequency.value = 3000;
            trebleFilter.gain.value = trebleVal;
            lastNode.connect(trebleFilter);
            lastNode = trebleFilter;
          }
          lastNode.connect(analyser);
          analyser.connect(ctx.destination);
        }
      } catch(e){ analyser = null; }
      var p = currentAudio.play();
      if(p && p.then) p.catch(function(){ URL.revokeObjectURL(url); finishClean(); });
      // Drive bar animation during playback
      if(analyser && onBars){
        var barData = new Uint8Array(analyser.frequencyBinCount);
        (function barTick(){
          if(gen !== stopGen || done) return;
          analyser.getByteFrequencyData(barData);
          onBars(barData);
          animFrame = requestAnimationFrame(barTick);
        })();
      }
    })
    .catch(function(){ finishClean(); });
  }

  function recordSTT(onResult, onError){
    killRecording();
    cancelled = false;
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(function(stream){
      recStream = stream;
      recChunks = [];
      var ctx = unlock();
      micSource = ctx.createMediaStreamSource(stream);
      micAnalyser = ctx.createAnalyser();
      micAnalyser.fftSize = 128;
      micAnalyser.smoothingTimeConstant = 0.7;
      micSource.connect(micAnalyser);
      recorder = new MediaRecorder(stream, {
        mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : ''
      });
      recorder.ondataavailable = function(e){ if(e.data.size > 0) recChunks.push(e.data); };
      recorder.onstop = function(){
        if(micSource){ try{ micSource.disconnect(); }catch(e){} micSource = null; }
        micAnalyser = null;
        if(recStream){ recStream.getTracks().forEach(function(t){ t.stop(); }); recStream = null; }
        if(cancelled){ cancelled = false; return; }
        var blob = new Blob(recChunks, { type: 'audio/webm' });
        if(blob.size < 100){ if(onError) onError('empty'); return; }
        var reader = new FileReader();
        reader.onload = function(){
          var base64 = reader.result.split(',')[1];
          fetch(SERVER + '/stt', {
            method: 'POST',
            headers: Object.assign({'Content-Type':'application/json'}, getAuthHeaders()),
            body: JSON.stringify({ audio: base64, mimeType: 'audio/webm', language_code: (window.VentI18n && VentI18n.getSttLangCode()) || 'eng' })
          })
          .then(function(r){
            if(!r.ok) { console.error('[STT] Server error:', r.status); if(onError) onError('stt_error'); return; }
            return r.json();
          })
          .then(function(data){
            if(!data) return; // already handled above
            if(data.text && data.text.trim()) onResult(data.text.trim());
            else if(onError) onError('empty');
          })
          .catch(function(err){ console.error('[STT] Fetch error:', err); if(onError) onError(err); });
        };
        reader.readAsDataURL(blob);
      };
      recorder.start(250);
    })
    .catch(function(err){ if(onError) onError('mic'); });
  }

  function stopRecording(){ if(recorder && recorder.state === 'recording'){ try{ recorder.stop(); }catch(e){} } }
  function killRecording(){
    cancelled = true;
    if(recorder && recorder.state === 'recording'){ try{ recorder.stop(); }catch(e){} }
    if(micSource){ try{ micSource.disconnect(); }catch(e){} micSource = null; }
    micAnalyser = null;
    if(recStream){ recStream.getTracks().forEach(function(t){ t.stop(); }); recStream = null; }
  }
  function isRecording(){ return recorder && recorder.state === 'recording'; }
  function getMicAnalyser(){ return micAnalyser; }

  return {
    speak: speak, stop: stop, unlock: unlock,
    recordSTT: recordSTT, stopRecording: stopRecording,
    killRecording: killRecording, isRecording: isRecording,
    getMicAnalyser: getMicAnalyser
  };
})();

async function loadSessions() {
  try {
    var url = SERVER + '/feedback/sessions';
    if (currentFilter) url += '?status=' + currentFilter;
    var res = await authFetch(url);
    sessions = await res.json();
    renderSessionList();
    document.getElementById('sessionCount').textContent = sessions.length;
    document.getElementById('statusSessions').textContent = 'Sessions: ' + sessions.length;
  } catch (err) {
    console.error('Load sessions error:', err);
  }
}

function renderSessionList() {
  var list = document.getElementById('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state" style="padding:20px;height:auto"><span style="font-size:11px">' + t('fb.noSessions') + '</span></div>';
    return;
  }
  var roleColors = { operator:'#4ec9b0', qa:'#007acc', director:'#ffc64d', msat:'#4ec9b0', engineering:'#8e8e8e', admin:'#f44747' };

  list.innerHTML = sessions.map(function(s) {
    var isActive = s.id === currentSessionId;
    var tags = (s.categories || []).map(function(c) { return '<span class="cat-tag ' + c + '">' + c.replace('_',' ') + '</span>'; }).join('');

        '<span class="status-pill status-' + s.status + '">' + s.status + '</span>' +

      '<div class="session-date">' + new Date(s.created_at).toLocaleDateString() + ' &middot; ' + (s.message_count || 0) + ' msgs' + (s.session_duration ? ' &middot; ' + Math.floor(s.session_duration/60) + 'm' + (s.session_duration%60) + 's' : '') + '</div>' +

// SESSION DETAIL

async function selectSession(id) {
  currentSessionId = id;
  renderSessionList(); // update active state
  try {
    var res = await authFetch(SERVER + '/feedback/sessions/' + id);
    currentSession = await res.json();
    renderDetail();
    document.getElementById('centerActions').style.display = 'flex';
  } catch (err) {
    console.error('Load session error:', err);
  }
}

function renderDetail() {
  if (!currentSession) return;
  if (centerView === 'transcript') renderTranscript();
  else renderAnalysis();
}

function renderTranscript() {
  var el = document.getElementById('centerContent');
  var transcript = currentSession.transcript || [];
  if (!transcript.length) {
    el.innerHTML = '<div class="empty-state"><p style="color:var(--dim)">No messages in this session.</p></div>';
    return;
  }
  el.innerHTML = transcript.map(function(msg) {
    var isOp = msg.role === 'user';
    var cls = isOp ? 'operator' : 'assistant';
    var avCls = isOp ? 'operator-av' : 'charlie-av';
    var initials = isOp ? 'OP' : 'CH';
    var time = msg.ts ? new Date(msg.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
    return '<div class="transcript-msg ' + cls + '">' +
      '<div class="msg-avatar ' + avCls + '">' + initials + '</div>' +
      '<div>' +
        '<div class="msg-bubble">' + escHtml(msg.content) + '</div>' +
        '<div class="msg-time">' + time + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderAnalysis() {
  var el = document.getElementById('centerContent');
  var a = currentSession.analysis;
  if (!a) {
    var status = currentSession.status;
    if (status === 'active') {
      el.innerHTML = '<div class="empty-state"><p style="color:var(--dim)">Session is still active. End the session to generate analysis.</p></div>';
    } else {
      el.innerHTML = '<div class="empty-state" style="gap:12px">' +
        '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
        '<p style="color:var(--dim)">No analysis yet</p>' +
        '<button class="action-btn primary" onclick="reanalyseSession(this)" style="margin-top:8px">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' +
          ' Summarise this session' +
        '</button>' +
      '</div>';
    }
    return;
  }

  var sentiment = currentSession.sentiment || a.sentiment || 'neutral';
  var severity = currentSession.severity || a.severity || 'low';
  var summary = currentSession.summary || a.summary || '';
  var categories = currentSession.categories || a.categories || [];
  var quotes = a.key_quotes || currentSession.key_quotes || [];
  var themes = a.themes || [];
  var items = a.actionable_items || [];

  var html = '<div class="analysis-grid">';

  // Summary hero card
  html += '<div class="analysis-card full-width" style="background:var(--s2);border-color:var(--borderhi)">' +
    '<div class="analysis-label" style="font-size:12px;margin-bottom:6px">Summary</div>' +
    '<div class="analysis-value" style="font-size:13px;line-height:1.6;color:var(--text)">' + escHtml(summary) + '</div>' +
    '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center">' +
      '<span class="sentiment-badge sentiment-' + sentiment + '">' + sentiment + '</span>' +
      '<span class="severity-badge severity-' + severity + '">' + severity + ' severity</span>' +
      categories.map(function(c) { return '<span class="cat-tag ' + c + '">' + c.replace('_',' ') + '</span>'; }).join('') +
    '</div>' +
  '</div>';

  // Key quotes
  if (quotes.length) {
    html += '<div class="analysis-card full-width">' +
      '<div class="analysis-label">Key Quotes</div>' +
      '<div class="analysis-value">' +
        quotes.map(function(q) { return '<div class="quote-block">"' + escHtml(q) + '"</div>'; }).join('') +
      '</div>' +
    '</div>';
  }

  // Themes
  if (themes.length) {
    html += '<div class="analysis-card full-width">' +
      '<div class="analysis-label">Themes</div>' +
      '<div class="analysis-value">' +
        themes.map(function(th) {
          return '<div style="margin:6px 0;padding:8px 10px;background:var(--bg);border-radius:6px;border-left:3px solid var(--accent)">' +
            '<strong style="color:var(--text);font-size:12px">' + escHtml(th.name) + '</strong>' +
            '<div style="font-size:11px;color:var(--mid);margin-top:2px">' + escHtml(th.description) + '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  // Action items
  if (items.length) {
    html += '<div class="analysis-card full-width">' +
      '<div class="analysis-label">Action Items</div>' +
      '<div class="analysis-value">' +
        items.map(function(item) {
          return '<div class="action-item">' +
            '<div class="action-item-title"><span class="action-item-priority priority-' + (item.priority || 'medium') + '">' + (item.priority || 'medium') + '</span>' + escHtml(item.title) + '</div>' +
            '<div class="action-item-desc">' + escHtml(item.description) + '</div>' +
          '</div>';
        }).join('') +
      '</div>' +
    '</div>';
  }

  // Generate Prompt CTA
  html += '<div style="padding:16px 0;text-align:center">' +
    '<button class="action-btn primary" onclick="generatePrompt(this)" style="padding:10px 24px;font-size:13px;border-radius:8px">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' +
      ' Generate Requirements Brief' +
    '</button>' +
    '<p style="color:var(--dim);font-size:10px;margin-top:6px">Creates a clear requirements brief you can paste into Claude Code</p>' +
  '</div>';

  html += '</div>';
  el.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════════════════════
// CHAT WITH CHARLIE — Text + Voice feedback
// ════════════════════════════════════════════════════════════════════════════════
var chatBusy = false;

function appendChatMsg(role, text) {
  var thread = document.getElementById('chatThread');
  var isUser = role === 'user';
  var div = document.createElement('div');
  div.className = 'chat-msg ' + (isUser ? 'from-user' : 'from-charlie');
  div.innerHTML =
    '<div class="chat-msg-av ' + (isUser ? 'user-av' : 'charlie-av') + '">' + (isUser ? 'You' : 'CH') + '</div>' +
    '<div class="chat-msg-text">' + escHtml(text) + '</div>';
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

function showThinking() {
  var thread = document.getElementById('chatThread');
  var div = document.createElement('div');
  div.className = 'chat-msg from-charlie';
  div.id = 'thinkingMsg';
  div.innerHTML =
    '<div class="chat-msg-av charlie-av">CH</div>' +
    '<div class="chat-msg-thinking"><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>';
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

function hideThinking() {
  var el = document.getElementById('thinkingMsg');
  if (el) el.remove();
}

async function sendChatMessage() {
  if (chatBusy) return;
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;

  input.value = '';
  chatBusy = true;
  setChatBusy(true);

  // Show in thread
  appendChatMsg('user', text);

  // Mark session active
  var cc = document.getElementById('chatCapture');
  cc.classList.add('has-session');

  showThinking();

  try {
    var lang = (window.VentI18n && VentI18n.getLang()) || 'en';
    var body = { question: text, lang: lang };
    if (feedbackSessionId) body.sessionId = feedbackSessionId;

    var res = await authFetch(SERVER + '/charlie/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    hideThinking();

    if (!res.ok) {
      var errBody = {};
      try { errBody = await res.json(); } catch(_) {}
      console.error('[Charlie/feedback] HTTP', res.status, errBody.error || '');
      var errMsg = res.status === 401
        ? 'Session expired — please sign out and back in.'
        : res.status === 500 && errBody.error
          ? 'Server error: ' + errBody.error
          : 'Sorry, something went wrong (HTTP ' + res.status + '). Please try again.';
      appendChatMsg('assistant', errMsg);
      chatBusy = false;
      setChatBusy(false);
      return;
    }

    var data = await res.json();

    if (data.error) {
      console.error('[Charlie/feedback] API error:', data.error);
      appendChatMsg('assistant', 'Sorry — ' + data.error + '. Please try again.');
      chatBusy = false;
      setChatBusy(false);
      return;
    }

    if (!feedbackSessionId && data.sessionId) {
      feedbackSessionId = data.sessionId;
    }

    appendChatMsg('assistant', data.answer);

    if (data.action === 'end_session') {
      endFeedbackSessionUI();
      chatBusy = false;
      setChatBusy(false);
      return;
    }

    // Strip markdown before TTS so asterisks/bullets aren't read aloud
    function stripTTSMarkdown(text){
      if(!text) return text;
      return text
        .replace(/#{1,6}\s+/g, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g, '$1')
        .replace(/`(.+?)`/g, '$1')
        .replace(/^\s*[-*•]\s+/gm, '')
        .replace(/^\s*\d+\.\s+/gm, '')
        .replace(/\n{2,}/g, '. ')
        .replace(/\n/g, ' ')
        .trim();
    }

    // Voice path: speak Charlie's response via TTS, then auto-listen
    if (voiceConvoMode) {
      setVoiceState('speaking');
      VentAudio.speak(stripTTSMarkdown(data.answer), function(freqData) {
        animateVCBars(freqData);
      }, function() {
        resetVCBars();
        setVoiceState('idle');
        chatBusy = false;
        setChatBusy(false);
        // Auto-listen for next message in continuous mode
        if (voiceConvoMode && feedbackSessionId) {
          startListening();
        }
      });
      return;
    }
  } catch (err) {
    hideThinking();
    console.error('Feedback error:', err);
    appendChatMsg('assistant', 'Connection error. Is the server running?');
    voiceConvoMode = false;
  }

  chatBusy = false;
  setChatBusy(false);
  input.focus();
}

function setChatBusy(busy) {
  document.getElementById('chatSendBtn').disabled = busy;
  document.getElementById('chatInput').disabled = busy;
}

// ── Voice input (mic button) ──
function toggleFeedbackVoice() {
  VentAudio.unlock();

  // If already in continuous mode, stop everything
  if (voiceConvoMode) {
    voiceConvoMode = false;
    VentAudio.stop();
    VentAudio.killRecording();
    setVoiceState('idle');
    chatBusy = false;
    setChatBusy(false);
    return;
  }

  // Start continuous voice conversation
  voiceConvoMode = true;
  document.getElementById('chatCapture').classList.add('has-session');
  startListening();
}

function setVoiceState(s) {
  voiceState = s;
  var btn = document.getElementById('voiceBtn');
  btn.classList.remove('recording', 'thinking', 'speaking');
  if (s === 'listening') btn.classList.add('recording');
  else if (s === 'thinking') btn.classList.add('thinking');
  else if (s === 'speaking') btn.classList.add('speaking');

  // Drive JARVIS voice command UI
  var cc = document.getElementById('chatCapture');
  cc.classList.remove('state-idle', 'state-listening', 'state-thinking', 'state-speaking');
  cc.classList.add('state-' + s);
  var statusLabels = { idle: 'READY', listening: 'LISTENING', thinking: 'PROCESSING', speaking: 'SPEAKING' };
  var vcStatus = document.getElementById('vcStatus');
  if (vcStatus) vcStatus.textContent = statusLabels[s] || 'READY';

  // Start/stop mic bar animation
  if (s === 'listening') startVCMicAnimation();
  else if (s === 'idle') resetVCBars();
}

function startListening() {
  VentAudio.stop();
  setVoiceState('listening');

  var cc = document.getElementById('chatCapture');
  cc.classList.add('has-session');

  var speechDetected = false;
  var silenceStart = 0;
  var SILENCE_THRESH = 12;
  var SILENCE_MS = 3000;
  var MAX_REC_MS = 120000;
  var recStart = Date.now();

  VentAudio.recordSTT(function(text) {
    voiceRetryCount = 0;
    setVoiceState('thinking');
    // Put transcribed text in input and auto-send
    document.getElementById('chatInput').value = text;
    sendChatMessage();
  }, function(err) {
    setVoiceState('idle');
    if (err === 'mic') {
      voiceConvoMode = false;
      voiceRetryCount = 0;
      appendChatMsg('assistant', 'Microphone access denied. Please allow mic permissions or type your feedback below.');
    } else if (err === 'stt_error') {
      voiceConvoMode = false;
      voiceRetryCount = 0;
      setChatBusy(false);
      chatBusy = false;
      appendChatMsg('assistant', 'Voice recognition is unavailable right now. Please type your feedback in the box below — I\'m still listening!');
    } else if (err === 'empty' || err === 'no_speech') {
      voiceRetryCount++;
      if (!speechDetected) {
        // User never spoke — don't show a message, just silently retry once
        if (voiceConvoMode && voiceRetryCount <= 1) {
          setTimeout(startListening, 500);
        } else {
          voiceConvoMode = false;
          voiceRetryCount = 0;
          appendChatMsg('assistant', 'No audio detected. Make sure your mic is working, or type your response below.');
        }
      } else if (voiceRetryCount <= 2) {
        appendChatMsg('assistant', "I didn't quite catch that. Could you speak a little louder and try again?");
        if (voiceConvoMode) setTimeout(startListening, 800);
      } else {
        // Too many failures — fall back to text
        voiceConvoMode = false;
        voiceRetryCount = 0;
        appendChatMsg('assistant', 'Having trouble with the mic. Please type your feedback below instead.');
      }
    } else {
      voiceConvoMode = false;
      voiceRetryCount = 0;
      appendChatMsg('assistant', 'Something went wrong with the recording. Please try again or type below.');
    }
  });

  // Silence detection loop — poll until mic analyser is ready, then tick every frame
  (function waitForMic() {
    if (voiceState !== 'listening') return; // aborted before mic was ready
    var ma = VentAudio.getMicAnalyser();
    if (!ma) {
      // Mic not ready yet — retry in 100 ms instead of bailing out
      setTimeout(waitForMic, 100);
      return;
    }
    // Mic is ready — start the real tick loop
    (function tickListen() {
      if (voiceState !== 'listening') return;
      var ma2 = VentAudio.getMicAnalyser();
      if (!ma2) return; // stream died
      var freq = new Uint8Array(ma2.frequencyBinCount);
      ma2.getByteFrequencyData(freq);
      var avg = 0;
      for (var i = 0; i < freq.length; i++) avg += freq[i];
      avg /= freq.length;

      if (avg > SILENCE_THRESH) { speechDetected = true; silenceStart = 0; }
      else if (speechDetected) {
        if (!silenceStart) silenceStart = Date.now();
        else if (Date.now() - silenceStart > SILENCE_MS) {
          VentAudio.stopRecording();
          return;
        }
      }
      if (Date.now() - recStart > MAX_REC_MS) { VentAudio.stopRecording(); return; }
      requestAnimationFrame(tickListen);
    })();
  })();
}

function endFeedbackSession() {
  if (!feedbackSessionId) return;
  VentAudio.stop();
  VentAudio.killRecording();

  authFetch(SERVER + '/charlie/feedback/end', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: feedbackSessionId }),
  }).then(function() {
    endFeedbackSessionUI();
  }).catch(function(err) {
    console.error('End session error:', err);
    endFeedbackSessionUI();
  });
}

function endFeedbackSessionUI() {
  voiceConvoMode = false;
  VentAudio.stop();
  VentAudio.killRecording();
  setVoiceState('idle');
  feedbackSessionId = null;
  document.getElementById('chatCapture').classList.remove('has-session');
  appendChatMsg('assistant', 'Session ended. Thanks for your feedback!');

  // Refresh sessions after a moment (analysis runs async)
  setTimeout(function() { loadSessions(); }, 2000);
}

// ACTIONS
// ════════════════════════════════════════════════════════════════════════════════
async function reanalyseSession(clickedBtn) {
  if (!currentSessionId) { console.warn('reanalyseSession: no currentSessionId'); return; }
  var tabBtn = document.getElementById('btnReanalyse');
  var btn = clickedBtn || tabBtn;
  var origHTML = btn ? btn.innerHTML : '';
  var spinnerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:btnSpin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Analysing...';
  if (btn) { btn.innerHTML = spinnerHTML; btn.disabled = true; }
  if (tabBtn && tabBtn !== btn) { tabBtn.innerHTML = spinnerHTML; tabBtn.disabled = true; }
  try {
    await authFetch(SERVER + '/feedback/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: currentSessionId }),
    });
    await selectSession(currentSessionId);
    loadSessions();
    // Auto-switch to analysis view
    centerView = 'analysis';
    document.querySelectorAll('.center-tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.view === 'analysis');
    });
    renderDetail();
  } catch (err) {
    console.error('Re-analyse error:', err);
  }
  if (btn) { btn.innerHTML = origHTML; btn.disabled = false; }
  if (tabBtn && tabBtn !== btn) { tabBtn.innerHTML = origHTML; tabBtn.disabled = false; }
}

async function generatePrompt(clickedBtn) {
  if (!currentSessionId) { console.warn('generatePrompt: no currentSessionId'); return; }
  // Update both the tab-bar button and any inline button that was clicked
  var tabBtn = document.getElementById('btnGenPrompt');
  var btn = clickedBtn || tabBtn;
  var origHTML = btn ? btn.innerHTML : '';
  var spinnerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:btnSpin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Generating...';
  if (btn) { btn.innerHTML = spinnerHTML; btn.disabled = true; }
  if (tabBtn && tabBtn !== btn) { tabBtn.innerHTML = spinnerHTML; tabBtn.disabled = true; }

  try {
    var res = await authFetch(SERVER + '/feedback/generate-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionIds: [currentSessionId] }),
    });
    var data = await res.json();

    if (data.error) {
      alert(data.error);
    } else {
      // Slide in the prompt panel
      document.getElementById('rightPanel').classList.add('open');
      document.getElementById('promptContent').innerHTML =
        '<div style="display:flex;gap:8px;margin-bottom:12px;">' +
          '<button class="copy-btn" onclick="copyPrompt()" style="flex:1">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
            'Copy to Clipboard' +
          '</button>' +
        '</div>' +
        '<div class="prompt-block" id="promptText">' + escHtml(data.prompt) + '</div>';
    }
  } catch (err) {
    console.error('Generate prompt error:', err);
  }
  if (btn) { btn.innerHTML = origHTML; btn.disabled = false; }
  if (tabBtn && tabBtn !== btn) { tabBtn.innerHTML = origHTML; tabBtn.disabled = false; }
}

function copyPrompt() {
  var text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.querySelector('.copy-btn');
    var orig = btn.innerHTML;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>' + t('fb.copied');
    setTimeout(function() { btn.innerHTML = orig; }, 2000);
  });
}

function closePromptPanel() {
  document.getElementById('rightPanel').classList.remove('open');
}

async function generateTrendReport() {
  var el = document.getElementById('trendContent');
  el.innerHTML = '<div class="empty-state" style="height:120px"><p style="color:var(--dim)">' + t('fb.analysing') + '</p></div>';
  try {
    var res = await authFetch(SERVER + '/feedback/batch-analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    var data = await res.json();
    if (data.html) {
      el.innerHTML = data.html;
    } else {
      el.innerHTML = '<div class="empty-state" style="height:120px"><p style="color:var(--dim)">No feedback data available.</p></div>';
    }
  } catch (err) {
    console.error('Trend report error:', err);
    el.innerHTML = '<div class="empty-state" style="height:120px"><p style="color:var(--red)">Failed to generate report.</p></div>';
  }
}

async function exportFeedback(format) {
  try {
    var res = await authFetch(SERVER + '/feedback/sessions');
    var data = await res.json();
    var content, mime, ext;
    if (format === 'json') {
      content = JSON.stringify(data, null, 2);
      mime = 'application/json';
      ext = 'json';
    } else {
      // CSV
      var headers = ['id','user_name','user_role','status','sentiment','severity','summary','categories','created_at'];
      var rows = [headers.join(',')];
      data.forEach(function(s) {
        rows.push(headers.map(function(h) {
          var v = Array.isArray(s[h]) ? s[h].join('; ') : (s[h] || '');
          return '"' + String(v).replace(/"/g, '""') + '"';
        }).join(','));
      });
      content = rows.join('\n');
      mime = 'text/csv';
      ext = 'csv';
    }
    var blob = new Blob([content], { type: mime });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'vent-feedback-' + new Date().toISOString().slice(0,10) + '.' + ext;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error('Export error:', err);
  }
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Resizer Logic ──
(function(){
  var rh = document.getElementById('resizerH');
  var wb = document.getElementById('workbench');
  if(!rh || !wb) return;
  var startY, startH;
  rh.addEventListener('mousedown', function(e){
    e.preventDefault();
    rh.classList.add('dragging');
    startY = e.clientY;
    var rows = getComputedStyle(wb).gridTemplateRows.split(/\s+/);
    startH = parseFloat(rows[2]) || 220;
    function onMove(e2){
      var diff = startY - e2.clientY;
      var newH = Math.max(80, Math.min(500, startH + diff));
      wb.style.gridTemplateRows = '1fr 4px ' + newH + 'px';
    }
    function onUp(){ rh.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ════════════════════════════════════════════════════════════════════════════════
// JARVIS VOICE COMMAND — Bar creation + animation
// ════════════════════════════════════════════════════════════════════════════════
var VC_NUM_BARS = 28;
var VC_SPACER = 30; // px from center to where visible bar starts
var vcMicFrame = null;

(function initVCBars() {
  var container = document.getElementById('vcBars');
  if (!container) return;
  for (var i = 0; i < VC_NUM_BARS; i++) {
    var bar = document.createElement('div');
    bar.className = 'vc-bar';
    bar.style.transform = 'rotate(' + (i * (360 / VC_NUM_BARS)) + 'deg)';
    bar.style.height = (VC_SPACER + 3) + 'px';
    container.appendChild(bar);
  }
})();

function animateVCBars(freqData) {
  var bars = document.querySelectorAll('.vc-bar');
  if (!bars.length || !freqData) return;
  for (var i = 0; i < bars.length; i++) {
    var idx = Math.floor((i / bars.length) * freqData.length * 0.7);
    var val = freqData[idx] || 0;
    var h = VC_SPACER + Math.max(3, (val / 255) * 30);
    bars[i].style.height = h + 'px';
  }
}

function resetVCBars() {
  if (vcMicFrame) { cancelAnimationFrame(vcMicFrame); vcMicFrame = null; }
  var bars = document.querySelectorAll('.vc-bar');
  for (var i = 0; i < bars.length; i++) {
    bars[i].style.height = (VC_SPACER + 3) + 'px';
  }
}

function startVCMicAnimation() {
  if (vcMicFrame) return;
  (function tick() {
    if (voiceState !== 'listening') { vcMicFrame = null; return; }
    var ma = VentAudio.getMicAnalyser();
    if (ma) {
      var freq = new Uint8Array(ma.frequencyBinCount);
      ma.getByteFrequencyData(freq);
      animateVCBars(freq);
    }
    vcMicFrame = requestAnimationFrame(tick);
  })();
}
