<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · QA Control</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1e1e1e;
  color: #cccccc;
  height: 100vh;
  display: grid;
  grid-template-rows: 35px 1fr 22px;
  overflow: hidden;
}

/* ── TITLE BAR ── */
.title-bar {
  background: #323233;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid #111;
  user-select: none;
}
.title-bar-left { display: flex; align-items: center; gap: 16px; }
.app-name { font-size: 12px; font-weight: 600; color: #cccccc; letter-spacing: 1px; }
.title-nav { display: flex; gap: 2px; }
.nav-tab {
  padding: 4px 14px; font-size: 12px; color: #8e8e8e;
  cursor: pointer; border-radius: 3px; text-decoration: none; transition: all 0.15s;
}
.nav-tab:hover { color: #cccccc; background: #404040; }
.nav-tab.active { color: #ffffff; background: #007acc; }
.title-bar-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #8e8e8e; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ec9b0; animation: pulse 2.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── WORKBENCH ── */
.workbench {
  display: grid;
  grid-template-columns: 260px 4px 1fr 4px 0px;
  grid-template-rows: 1fr 4px 180px;
  overflow: hidden;
}
.workbench.sop-open {
  grid-template-columns: 260px 4px 1fr 4px 380px;
}

/* ── RESIZE HANDLES ── */
.resizer {
  background: #3c3c3c;
  z-index: 10;
  transition: background 0.15s;
  position: relative;
}
.resizer:hover, .resizer.dragging { background: #007acc; }
.resizer-v {
  cursor: col-resize;
  grid-row: 1;
}
.resizer-h {
  cursor: row-resize;
  grid-column: 1 / 6;
  grid-row: 2;
}
.resizer::after {
  content: '';
  position: absolute;
  inset: 0;
}
.resizer-v::after  { left: -4px; right: -4px; }
.resizer-h::after  { top: -4px; bottom: -4px; }

/* ── LEFT PANEL ── */
.left-panel {
  grid-column: 1; grid-row: 1 / 2;
  background: #252526;
  border-right: 1px solid #3c3c3c;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 8px 12px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: #bbbbbb; background: #2d2d30;
  border-bottom: 1px solid #3c3c3c;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-badge {
  background: #007acc; color: #fff;
  font-size: 10px; padding: 1px 7px;
  border-radius: 10px; font-weight: 700;
}
.filter-bar {
  padding: 6px 8px; display: flex; gap: 4px; flex-wrap: wrap;
  border-bottom: 1px solid #3c3c3c; flex-shrink: 0;
}
.filter-btn {
  padding: 3px 10px; border-radius: 2px;
  border: 1px solid #3c3c3c; background: transparent;
  color: #8e8e8e; font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: #cccccc; border-color: #6c6c6c; }
.filter-btn.active { background: #007acc; border-color: #007acc; color: #fff; }

.submission-list { flex: 1; overflow-y: auto; padding: 4px; }
.submission-list::-webkit-scrollbar { width: 4px; }
.submission-list::-webkit-scrollbar-thumb { background: #424242; border-radius: 2px; }

.sub-card {
  padding: 8px 10px; border-radius: 2px; margin-bottom: 1px;
  cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent;
}
.sub-card:hover { background: #2a2d2e; }
.sub-card.active { background: #094771; border-left-color: #007acc; }

.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.card-id { font-size: 10px; font-weight: 600; color: #9cdcfe; font-family: 'Courier New', monospace; }
.risk-badge { font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.risk-High   { background: rgba(244,71,71,0.2);  color: #f44747; border: 1px solid rgba(244,71,71,0.35); }
.risk-Medium { background: rgba(255,198,77,0.15); color: #ffc64d; border: 1px solid rgba(255,198,77,0.3); }
.risk-Low    { background: rgba(78,201,176,0.15); color: #4ec9b0; border: 1px solid rgba(78,201,176,0.3); }
.card-title { font-size: 11px; color: #cccccc; margin-bottom: 3px; line-height: 1.3; }
.card-meta  { font-size: 10px; color: #5a5a5a; }

/* ── CENTER PANEL ── */
.center-panel { grid-column: 3; grid-row: 1; display: flex; flex-direction: column; overflow: hidden; background: #1e1e1e; }
.editor-tabs { display: flex; align-items: center; background: #2d2d30; border-bottom: 1px solid #3c3c3c; height: 35px; flex-shrink: 0; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; }
.editor-tabs::-webkit-scrollbar { display: none; }
.editor-tab { padding: 0 10px 0 16px; height: 100%; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8e8e8e; border-right: 1px solid #3c3c3c; white-space: nowrap; cursor: pointer; flex-shrink: 0; user-select: none; transition: background 0.1s, color 0.1s; }
.editor-tab:hover { background: #2a2a2a; color: #cccccc; }
.editor-tab.active { background: #1e1e1e; color: #fff; border-top: 1px solid #007acc; }
.editor-tab-placeholder { padding: 0 16px; font-size: 12px; color: #5a5a5a; font-style: italic; flex-shrink: 0; }
.tab-close { background: none; border: none; color: transparent; cursor: pointer; font-size: 11px; padding: 2px 3px; border-radius: 2px; line-height: 1; transition: color 0.1s, background 0.1s; flex-shrink: 0; }
.editor-tab:hover .tab-close,
.editor-tab.active .tab-close { color: #6c6c6c; }
.tab-close:hover { color: #ffffff !important; background: rgba(255,255,255,0.1); }
.center-content { flex: 1; overflow-y: auto; padding: 20px 24px; }
.center-content::-webkit-scrollbar { width: 6px; }
.center-content::-webkit-scrollbar-track { background: #1e1e1e; }
.center-content::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; user-select: none; }
.empty-state .ei { font-size: 36px; }
.empty-state p { font-size: 13px; color: #5a5a5a; }
.section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6c6c6c; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #2d2d30; }
.detail-section { margin-bottom: 24px; }
.obs-text { background: #252526; border: 1px solid #3c3c3c; border-radius: 2px; padding: 12px 14px; font-size: 12px; line-height: 1.7; color: #d4d4d4; font-family: 'Courier New', monospace; }

/* SOP TABLE */
.sop-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sop-table th { text-align: left; padding: 6px 10px; background: #2d2d30; color: #6c6c6c; font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #3c3c3c; }
.sop-table td { padding: 7px 10px; border-bottom: 1px solid #2a2a2a; color: #cccccc; vertical-align: middle; }
.sop-table tr:hover td { background: #2a2d2e; cursor: pointer; }
.sop-table tr.sop-selected td { background: #094771; }
.sop-code { color: #9cdcfe; font-family: 'Courier New', monospace; font-size: 11px; }
.issue-tag { display: inline-block; padding: 1px 6px; border-radius: 2px; font-size: 10px; font-weight: 600; }
.tag-gap       { background: rgba(244,71,71,0.15);  color: #f44747; }
.tag-ambiguous { background: rgba(255,198,77,0.15); color: #ffc64d; }
.tag-missing   { background: rgba(78,201,176,0.15); color: #4ec9b0; }
.tag-ok        { background: rgba(100,100,100,0.15); color: #6c6c6c; }

/* SUGGESTED CHANGES */
.changes-list { display: flex; flex-direction: column; gap: 8px; }
.change-item { background: #252526; border: 1px solid #3c3c3c; border-left: 3px solid #007acc; border-radius: 2px; padding: 10px 14px; display: flex; gap: 12px; }
.change-num { width: 20px; height: 20px; border-radius: 50%; background: #007acc; color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.change-title { font-size: 12px; font-weight: 600; color: #e0e0e0; margin-bottom: 3px; }
.change-desc  { font-size: 11px; color: #8e8e8e; line-height: 1.5; }

/* ── RIGHT PANEL ── */
.right-panel { grid-column: 5; grid-row: 1; background: #252526; border-left: 1px solid #3c3c3c; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.right-tabs { display: flex; align-items: center; background: #2d2d30; border-bottom: 1px solid #3c3c3c; height: 35px; flex-shrink: 0; }
.right-tab-title { flex: 1; padding: 0 14px; height: 100%; display: flex; align-items: center; font-size: 12px; color: #ffffff; border-top: 1px solid #007acc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.right-close { padding: 0 10px; height: 100%; background: none; border: none; color: #6c6c6c; cursor: pointer; font-size: 16px; transition: color 0.15s; }
.right-close:hover { color: #cccccc; }
.right-content { flex: 1; overflow-y: auto; padding: 16px; }
.right-content::-webkit-scrollbar { width: 4px; }
.right-content::-webkit-scrollbar-thumb { background: #424242; border-radius: 2px; }
.sop-doc-title { font-size: 13px; font-weight: 600; color: #e0e0e0; margin-bottom: 3px; }
.sop-doc-meta  { font-size: 11px; color: #6c6c6c; margin-bottom: 16px; }
.sop-block { margin-bottom: 16px; }
.sop-block-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6c6c6c; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #3c3c3c; }
.sop-text { font-size: 11px; font-family: 'Courier New', monospace; color: #d4d4d4; line-height: 1.7; white-space: pre-wrap; }
.sop-highlight { background: rgba(255,198,77,0.08); border-left: 3px solid #ffc64d; padding: 8px 10px; border-radius: 0 2px 2px 0; font-size: 11px; color: #ffc64d; line-height: 1.5; }
.sop-suggested { background: rgba(78,201,176,0.08); border-left: 3px solid #4ec9b0; padding: 8px 10px; border-radius: 0 2px 2px 0; font-size: 11px; font-family: 'Courier New', monospace; color: #4ec9b0; line-height: 1.7; white-space: pre-wrap; }

/* ── BOTTOM PANEL ── */
.bottom-panel { grid-column: 1 / 6; grid-row: 3; background: #1e1e1e; border-top: 1px solid #3c3c3c; display: flex; flex-direction: column; overflow: hidden; }
.bottom-tabs { display: flex; align-items: center; background: #2d2d30; border-bottom: 1px solid #3c3c3c; height: 30px; flex-shrink: 0; }
.bottom-tab { padding: 0 16px; height: 100%; display: flex; align-items: center; font-size: 11px; color: #8e8e8e; cursor: pointer; border-right: 1px solid #3c3c3c; transition: color 0.15s; user-select: none; }
.bottom-tab:hover { color: #cccccc; }
.bottom-tab.active { color: #fff; border-bottom: 1px solid #007acc; }
.bottom-content { flex: 1; overflow-y: auto; padding: 6px 12px; font-size: 11px; font-family: 'Courier New', monospace; color: #cccccc; }
.bottom-content::-webkit-scrollbar { width: 4px; }
.bottom-content::-webkit-scrollbar-thumb { background: #424242; }
.log-line { display: flex; gap: 12px; padding: 2px 0; border-bottom: 1px solid #252526; line-height: 1.6; }
.log-time  { color: #5a5a5a; flex-shrink: 0; }
.log-info  { color: #4ec9b0; }
.log-warn  { color: #ffc64d; }
.log-error { color: #f44747; }

/* ── STATUS BAR ── */
.status-bar { background: #007acc; display: flex; align-items: center; padding: 0 10px; gap: 14px; font-size: 11px; color: rgba(255,255,255,0.85); user-select: none; }
.s-sep { color: rgba(255,255,255,0.35); }
.s-right { margin-left: auto; display: flex; gap: 14px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeUp 0.2s ease forwards; }
</style>
<script>if(!localStorage.getItem('vent_role'))window.location.replace('login.html');</script>
</head>

<!-- TITLE BAR -->
<div class="title-bar">
  <div class="title-bar-left">
    <span class="app-name">&#11041; VENT</span>
    <nav class="title-nav">
      <a href="index.html"       class="nav-tab">Submit</a>
      <a href="query.html"       class="nav-tab">Query SOPs</a>
      <a href="submissions.html" class="nav-tab">Submissions</a>
      <a href="dashboard.html"   class="nav-tab">Dashboard</a>
      <a href="qa.html"          class="nav-tab active">QA Control</a>
    </nav>
  </div>
  <div class="title-bar-right">
    <div class="live-dot"></div>
    <span>System Online</span>
    <span class="s-sep">|</span>
    <span id="titleUser"></span>
  </div>
</div>

<!-- WORKBENCH -->
<div class="workbench" id="workbench">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-header">
      Submissions
      <span class="panel-badge" id="subCount">0</span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('High',this)">High</button>
      <button class="filter-btn" onclick="setFilter('Medium',this)">Medium</button>
      <button class="filter-btn" onclick="setFilter('Low',this)">Low</button>
    </div>
    <div class="submission-list" id="subList"></div>
  </div>

  <!-- RESIZER: left | center -->
  <div class="resizer resizer-v" id="resizerLC"></div>

  <!-- CENTER PANEL -->
  <div class="center-panel">
    <div class="editor-tabs" id="editorTabs">
      <div class="editor-tab-placeholder">No submission selected</div>
    </div>
    <div class="center-content" id="centerContent">
      <div class="empty-state">
        <div class="ei">&#128203;</div>
        <p>Select a submission from the left panel to begin review</p>
      </div>
    </div>
  </div>

  <!-- RESIZER: center | right -->
  <div class="resizer resizer-v" id="resizerCR"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel" id="rightPanel">
    <div class="right-tabs">
      <div class="right-tab-title" id="rightTitle">SOP Viewer</div>
      <button class="right-close" onclick="closeRight()">&#10005;</button>
    </div>
    <div class="right-content" id="rightContent">
      <div class="empty-state" style="height:100%"><p>Click a SOP row to view</p></div>
    </div>
  </div>

  <!-- RESIZER: main | bottom -->
  <div class="resizer resizer-h" id="resizerBottom"></div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="bottom-tabs">
      <div class="bottom-tab active" onclick="switchBottom('log',this)">Activity Log</div>
      <div class="bottom-tab" onclick="switchBottom('notes',this)">Notes</div>
      <div class="bottom-tab" onclick="switchBottom('export',this)">Export</div>
    </div>
    <div class="bottom-content" id="bottomContent"></div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span>&#11041; QA Control</span>
  <span class="s-sep">|</span>
  <span id="statusSubs">Loading&#8230;</span>
  <span class="s-sep">|</span>
  <span id="statusSel">No selection</span>
  <div class="s-right">
    <span id="statusSop"></span>
    <span>&#127866; Connected</span>
  </div>
</div>

<script>
const MOCK = [
  {
    id:'VNT-0047', priority:'High', area:'Upstream', operator:'Liu Chen', date:'21 Feb 06:42',
    title:'DO Probe Erratic Fluctuations — N-2 Bioreactor',
    obs:'Dissolved oxygen probe on N-2 bioreactor (500L) showing erratic fluctuations between 18% and 67% over the past 4 hours. Sparging rate unchanged. Probe last calibrated on Day 0 per SOP. Currently Day 6 of perfusion run with VCD at 45x10^6 cells/mL. DO control loop has been in manual override since 04:15.',
    sops:[
      {code:'SOP-UP-001',title:'Bioreactor Setup & Inoculation',section:'§8.2',flag:'gap',      issue:'Probe calibration frequency — no mid-run recalibration protocol defined'},
      {code:'SOP-UP-003',title:'Perfusion Run Monitoring',       section:'§6.4',flag:'ok',       issue:'DO control loop operation and manual override procedure'},
      {code:'BPR-UP-001',title:'Batch Production Record',        section:'§4.2',flag:'gap',      issue:'In-process DO monitoring — deviation requires formal documentation'}
    ],
    changes:[
      {title:'Add mid-run probe recalibration to SOP-UP-001',desc:'Add mandatory mid-run probe recalibration step for perfusion runs exceeding 40x10^6 cells/mL. Define acceptance criteria and frequency at VCD checkpoints.'},
      {title:'Update BPR-UP-001 §4.2 deviation guidance',desc:'Clarify that DO excursion during GMP production run requires formal deviation documentation with timestamps before batch release sign-off.'}
    ]
  },
  {
    id:'VNT-0046', priority:'High', area:'Upstream', operator:'Liu Chen', date:'20 Feb 14:18',
    title:'Excessive Foam Formation — N-1 Bioreactor',
    obs:'Excessive foam formation in N-1 bioreactor (50L) seed train at approximately 6 hours post-inoculation. Antifoam C Emulsion added at standard 0.1% v/v per SOP but foam layer persisting at 8cm depth. No other process parameters outside range. Agitation 120 RPM, DO 40%, pH 7.15.',
    sops:[
      {code:'SOP-UP-002',title:'Seed Train Operation',          section:'§5.3',flag:'ambiguous',issue:'Antifoam addition protocol — no escalation dose or maximum cumulative volume defined'},
      {code:'SOP-UP-001',title:'Bioreactor Setup & Inoculation',section:'§7.1',flag:'ok',       issue:'Inoculation procedure and post-inoculation monitoring parameters'}
    ],
    changes:[
      {title:'Add antifoam escalation guidance to SOP-UP-002',desc:'Define maximum cumulative antifoam volume, escalation steps (0.1% to 0.2% to escalate), and decision criteria for persistent foaming events in seed bioreactors.'}
    ]
  },
  {
    id:'VNT-0045', priority:'Medium', area:'Media Prep', operator:'Aoife Brennan', date:'20 Feb 15:03',
    title:'Basal Media Hold Temperature Excursion — MP-04',
    obs:'Basal media hold temperature in vessel MP-04 measured 22.4C at 14:30. Set point is 20C +/-1C per SOP-UP-004 — deviation is +2.4C above upper limit. Vessel has been in hold for 9 hours. Media is scheduled for use in N-2 production bioreactor at 08:00 tomorrow.',
    sops:[
      {code:'SOP-UP-004',title:'Media Preparation & Hold',section:'§3.2',flag:'gap',issue:'Temperature specification for basal media hold — no action guidance if excursion occurs'},
      {code:'BPR-UP-001',title:'Batch Production Record', section:'§2.4',flag:'gap',issue:'Media preparation sign-off — temperature excursion must be documented before batch release'}
    ],
    changes:[
      {title:'Add temperature excursion response to SOP-UP-004',desc:'Define action limits, notification escalation, and hold vs. discard decision criteria for media temperature deviations. Include OOS assessment trigger.'},
      {title:'Update BPR-UP-001 §2.4 media sign-off criteria',desc:'Add explicit requirement that temperature excursion during media hold must be documented with QA sign-off before media can be used in production.'}
    ]
  },
  {
    id:'VNT-0044', priority:'High', area:'Downstream', operator:'Ciarán Murphy', date:'19 Feb 10:45',
    title:'Harvest Centrifuge Yield Below Threshold — 2nd Batch',
    obs:'Harvest centrifuge yield for DSP batch 2024-DS-089 calculated at 73% based on pre/post cell counts. SOP specifies >=88% yield for this step. Bowl speed 8,400 RPM and feed rate 12 L/hr were both within specification. This is the second consecutive batch below threshold — batch 2024-DS-086 yielded 79%.',
    sops:[
      {code:'SOP-UP-005',title:'Harvest & Primary Clarification',section:'§4.3',flag:'ok', issue:'Centrifuge yield acceptance criteria and in-spec troubleshooting guide'},
      {code:'SOP-UP-005',title:'Harvest & Primary Clarification',section:'§5.1',flag:'gap',issue:'Feed pump calibration verification requirement — not recorded in recent BPRs'},
      {code:'BPR-UP-001',title:'Batch Production Record',         section:'§6.1',flag:'gap',issue:'Yield calculation and out-of-specification result handling procedure'}
    ],
    changes:[
      {title:'Update SOP-UP-005 §5.1 — pump calibration requirement',desc:'Make pre-run gravimetric calibration check on harvest feed pump a mandatory recorded step in BPR before each clarification run.'},
      {title:'Add CAPA trigger criteria to BPR-UP-001 §6.1',desc:'Specify that two or more consecutive OOS yield results triggers mandatory CAPA initiation with MSAT as technical lead.'}
    ]
  },
  {
    id:'VNT-0043', priority:'Low', area:'QC', operator:'Dr. Sarah Park', date:'18 Feb 09:30',
    title:'Vi-Cell vs Manual Count Variance — 2.4% Delta',
    obs:'Vi-Cell XR automated counter gave 94.2% viability vs 91.8% from manual haemocytometer count on the same sample. Delta is 2.4%. Both methods are within the acceptable range (>=85%), but the gap between methods is larger than the typical <=1% variance we normally observe.',
    sops:[
      {code:'SOP-UP-003',title:'Perfusion Run Monitoring',section:'§7.2',flag:'ambiguous',issue:'Cell viability measurement method and acceptable inter-method variance — range not defined'}
    ],
    changes:[
      {title:'Define inter-method variance spec in SOP-UP-003',desc:'Update SOP to include acceptable inter-method variance range (suggest <=3%) and escalation criteria if delta is exceeded. Reference both Vi-Cell XR and haemocytometer.'}
    ]
  }
];

let filter='all', selected=null, selSopIdx=null, logLines=[], curBottom='log';
let openTabs=[], activeTabId=null;

function addLog(msg,level='info'){
  const t=new Date().toLocaleTimeString('en-GB',{hour12:false});
  logLines.unshift({t,msg,level});
  if(logLines.length>100)logLines.pop();
  if(curBottom==='log')renderLog();
}

function renderLog(){
  const el=document.getElementById('bottomContent');
  if(!logLines.length){el.innerHTML='<span style="color:#5a5a5a">No activity yet.</span>';return;}
  el.innerHTML=logLines.map(l=>`<div class="log-line"><span class="log-time">${l.t}</span><span class="log-${l.level}">[${l.level.toUpperCase()}]</span><span>${l.msg}</span></div>`).join('');
}

function switchBottom(tab,el){
  curBottom=tab;
  document.querySelectorAll('.bottom-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const bc=document.getElementById('bottomContent');
  if(tab==='log'){renderLog();}
  else if(tab==='notes'){bc.innerHTML='<textarea placeholder="Notes for this session..." style="width:100%;height:100%;background:transparent;border:none;color:#cccccc;font-size:11px;font-family:inherit;resize:none;outline:none;line-height:1.7;"></textarea>';}
  else if(tab==='export'){bc.innerHTML='<div style="display:flex;gap:8px;padding:4px 0;"><button onclick="doExport(\'json\')" style="padding:4px 14px;background:#007acc;color:#fff;border:none;border-radius:2px;font-size:11px;cursor:pointer;">Export JSON</button><button onclick="doExport(\'csv\')" style="padding:4px 14px;background:#007acc;color:#fff;border:none;border-radius:2px;font-size:11px;cursor:pointer;">Export CSV</button><button style="padding:4px 14px;background:#3c3c3c;color:#6c6c6c;border:none;border-radius:2px;font-size:11px;cursor:default;">PDF (coming soon)</button></div>';}
}

function doExport(fmt){addLog('Export requested: '+fmt.toUpperCase(),'info');}

function renderLeft(){
  const filtered=filter==='all'?MOCK:MOCK.filter(s=>s.priority===filter);
  document.getElementById('subCount').textContent=filtered.length;
  document.getElementById('statusSubs').textContent=MOCK.length+' submissions loaded';
  document.getElementById('subList').innerHTML=filtered.map(s=>{
    const isActive=activeTabId===s.id;
    const isOpen=openTabs.includes(s.id)&&!isActive;
    return `<div class="sub-card ${isActive?'active':''}" onclick="selectSub('${s.id}')" style="${isOpen?'border-left-color:#555;':''}">`+
      `<div class="card-top"><span class="card-id">${s.id}</span><span class="risk-badge risk-${s.priority}">${s.priority}</span></div>`+
      `<div class="card-title">${s.title}</div>`+
      `<div class="card-meta">${s.date} &middot; ${s.operator}${isOpen?' &middot; <span style="color:#5a9bc7;font-size:9px">OPEN</span>':''}</div>`+
      `</div>`;
  }).join('');
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLeft();
  addLog('Filter: '+f);
}

function selectSub(id){
  if(!openTabs.includes(id)) openTabs.push(id);
  activeTabId=id;
  selected=MOCK.find(s=>s.id===id);
  selSopIdx=null;
  closeRight();
  renderLeft();
  renderTabs();
  renderCenter();
  document.getElementById('statusSel').textContent=selected.id+' — '+selected.priority+' priority';
  addLog('Opened '+selected.id+': '+selected.title);
}

function switchTab(id){
  activeTabId=id;
  selected=MOCK.find(s=>s.id===id);
  selSopIdx=null;
  closeRight();
  renderLeft();
  renderTabs();
  renderCenter();
  document.getElementById('statusSel').textContent=selected.id+' — '+selected.priority+' priority';
}

function closeTab(id,e){
  e.stopPropagation();
  const idx=openTabs.indexOf(id);
  openTabs.splice(idx,1);
  if(activeTabId===id){
    activeTabId=openTabs[Math.min(idx,openTabs.length-1)]||null;
    selected=activeTabId?MOCK.find(s=>s.id===activeTabId):null;
    selSopIdx=null;
    if(!activeTabId) closeRight();
  }
  renderLeft();
  renderTabs();
  if(activeTabId) renderCenter();
  else {
    document.getElementById('centerContent').innerHTML='<div class="empty-state"><div class="ei">&#128203;</div><p>Select a submission from the left panel to begin review</p></div>';
    document.getElementById('statusSel').textContent='';
  }
}

function renderTabs(){
  if(!openTabs.length){
    document.getElementById('editorTabs').innerHTML='<div class="editor-tab-placeholder">No submission selected</div>';
    return;
  }
  document.getElementById('editorTabs').innerHTML=openTabs.map(id=>{
    const s=MOCK.find(m=>m.id===id);
    const active=id===activeTabId;
    return `<div class="editor-tab ${active?'active':''}" onclick="switchTab('${id}')">`+
      `<span>${s.id}</span>`+
      `<button class="tab-close" onclick="closeTab('${id}',event)" title="Close">&#10005;</button>`+
      `</div>`;
  }).join('');
}

function renderCenter(){
  if(!selected)return;
  const s=selected;
  const tagCls={gap:'tag-gap',ambiguous:'tag-ambiguous',missing:'tag-missing',ok:'tag-ok'};
  const sopRows=s.sops.map((r,i)=>`<tr onclick="openSop(${i})" class="${selSopIdx===i?'sop-selected':''}"><td><span class="sop-code">${r.code}</span></td><td style="font-size:11.5px">${r.title}</td><td style="color:#9cdcfe;font-family:monospace;font-size:11px">${r.section}</td><td><span class="issue-tag ${tagCls[r.flag]||''}">${r.flag}</span></td><td style="font-size:11px;color:#8e8e8e">${r.issue}</td></tr>`).join('');
  const changes=s.changes.map((c,i)=>`<div class="change-item"><div class="change-num">${i+1}</div><div><div class="change-title">${c.title}</div><div class="change-desc">${c.desc}</div></div></div>`).join('');
  document.getElementById('centerContent').innerHTML=`<div class="fade-in">
    <div class="detail-section"><div class="section-label">Raw Observation &middot; ${s.area} &middot; ${s.operator} &middot; ${s.date}</div><div class="obs-text">${s.obs}</div></div>
    <div class="detail-section"><div class="section-label">SOP &amp; Document References &mdash; click a row to open SOP viewer</div><table class="sop-table"><thead><tr><th>Doc</th><th>Title</th><th>Section</th><th>Flag</th><th>Issue</th></tr></thead><tbody>${sopRows}</tbody></table></div>
    <div class="detail-section"><div class="section-label">Suggested Changes</div><div class="changes-list">${changes}</div></div>
  </div>`;
}

const SOP_CONTENT={
  'SOP-UP-001':{current:`8.2 Probe Calibration\n\nCalibrate DO probe prior to sterilisation using\ntwo-point calibration (0% N2 sparge, 100% air).\nRecord calibration data in BPR before inoculation.\nNo further calibration steps defined for ongoing run.`,suggested:`ADD: 8.2.1 Mid-Run Recalibration\n\nFor perfusion runs where VCD exceeds 40x10^6 cells/mL,\nperform in-situ 2-point recalibration at Day 4 and Day 6.\nDocument result in BPR. If drift >5% from baseline,\ninitiate probe replacement and raise deviation report.`},
  'SOP-UP-002':{current:`5.3 Antifoam Addition\n\nAdd Antifoam C Emulsion at 0.1% v/v as required\nto control foaming during seed train operation.\nRecord each addition volume and time in BPR.`,suggested:`ADD: Escalation Protocol\n\nIf foaming persists after initial 0.1% v/v addition:\n  Step 1: Increase to 0.2% v/v after 15 minutes\n  Step 2: If foam >10cm, notify shift lead\n  Step 3: Max cumulative dose = 0.5% v/v\nExceedance requires QA notification before continuing.`},
  'SOP-UP-003':{current:`6.4 DO Control Loop\n\nMaintain DO setpoint at 40% via PID-controlled\ncascaded sparging and agitation.\nManual override permitted if control loop is unstable.\nRecord all overrides in BPR with timestamp.`,suggested:`ADD: 6.4.1 Manual Override Criteria\n\nManual override must not exceed 4 hours without:\n  (1) Process engineer notification\n  (2) Documented root cause assessment in BPR\n  (3) QA notification if override extends beyond 8h\nReturn to auto control must be documented.`},
  'SOP-UP-004':{current:`3.2 Media Hold Temperature\n\nHold basal media at 20C +/-1C in temperature-controlled\nvessels. Monitor via calibrated inline probe.\nRecord temperature at 4-hour intervals in BPR.`,suggested:`ADD: 3.2.1 Temperature Excursion Response\n\nIf hold temperature exceeds +/-1C specification:\n  < 2h excursion:  Document, notify supervisor\n  2-8h excursion: QA notification, OOS assessment\n  > 8h excursion: Quarantine media, QA disposition required\nMedia may not be used without QA sign-off.`},
  'SOP-UP-005':{current:`4.3 Centrifuge Yield Acceptance\n\nMinimum acceptable harvest yield: >=88% based on\npre/post cell count. Yield calculated per BPR 6.1.\nOut-of-specification result must be investigated.`,suggested:`ADD: 5.1 Pre-Run Pump Calibration (mandatory)\n\nBefore each clarification run, perform gravimetric\ncalibration check on harvest feed pump. Record actual\nvs set-point flow rate across operating range.\nPump must be within +/-2% of set-point before proceeding.`},
  'BPR-UP-001':{current:`Standard batch production record fields apply.\nAll deviations must be noted with timestamp\nand operator initials. QA review at batch close.`,suggested:`ADD: Mandatory deviation documentation fields:\n  - Deviation type and timestamp\n  - Immediate corrective action taken\n  - Process engineer sign-off\n  - QA notification timestamp (if applicable)\nMust be complete before batch release sign-off.`}
};

function openSop(idx){
  selSopIdx=idx;
  renderCenter();
  const sop=selected.sops[idx];
  const content=SOP_CONTENT[sop.code]||{current:'Content not available.',suggested:'No suggestion defined.'};
  document.getElementById('rightTitle').textContent=sop.code+' \u00b7 '+sop.section;
  const wb=document.getElementById('workbench');
  wb.classList.add('sop-open');
  const leftW=wb.style.gridTemplateColumns ? parseFloat(wb.style.gridTemplateColumns) : 260;
  wb.style.gridTemplateColumns=leftW+'px 4px 1fr 4px 380px';
  document.getElementById('statusSop').textContent='Viewing '+sop.code;
  document.getElementById('rightContent').innerHTML=`<div class="fade-in">
    <div class="sop-doc-title">${sop.title}</div>
    <div class="sop-doc-meta">${sop.section} &middot; Rev 4.1 &middot; Last reviewed 2023-09-12</div>
    <div class="sop-block"><div class="sop-block-label">Current Text</div><div class="sop-text">${content.current}</div></div>
    <div class="sop-block"><div class="sop-block-label">Identified Issue</div><div class="sop-highlight">${sop.issue}</div></div>
    <div class="sop-block"><div class="sop-block-label">Suggested Addition</div><div class="sop-suggested">${content.suggested}</div></div>
  </div>`;
  addLog('Opened SOP viewer: '+sop.code+' '+sop.section);
}

function closeRight(){
  const wb=document.getElementById('workbench');
  wb.classList.remove('sop-open');
  const leftW=wb.style.gridTemplateColumns ? parseFloat(wb.style.gridTemplateColumns) : 260;
  wb.style.gridTemplateColumns=leftW+'px 4px 1fr 4px 0px';
  document.getElementById('statusSop').textContent='';
  selSopIdx=null;
}

(function(){
  const role=localStorage.getItem('vent_role');
  const name=localStorage.getItem('vent_name');
  if(!role)return;
  const labels={operator:'Operator',qa:'QA',director:'Director',msat:'MSAT',engineering:'Engineering',admin:'Admin'};
  const el=document.getElementById('titleUser');
  if(el)el.textContent=(name||'')+' \u00b7 '+(labels[role]||role);
})();

renderLeft();
renderTabs();
renderLog();
addLog('VENT QA Control ready','info');
addLog(MOCK.length+' submissions loaded','info');

// ─────────────────────────────────────────────
// RESIZE HANDLES
// ─────────────────────────────────────────────
(function() {
  const wb = document.getElementById('workbench');

  function getCols() {
    return getComputedStyle(wb).gridTemplateColumns.split(' ').map(parseFloat);
  }
  function getRows() {
    return getComputedStyle(wb).gridTemplateRows.split(' ').map(parseFloat);
  }
  function setCols(cols) {
    // only left (index 0) and right (index 4) are variable; center stays 1fr
    wb.style.gridTemplateColumns =
      cols[0]+'px 4px 1fr 4px '+cols[4]+'px';
  }
  function setRows(bottomPx) {
    // main row stays 1fr; only bottom height is variable
    wb.style.gridTemplateRows = '1fr 4px '+bottomPx+'px';
  }

  function makeDragger(el, onDrag) {
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      el.classList.add('dragging');
      document.body.style.userSelect = 'none';
      document.body.style.cursor = el.classList.contains('resizer-v') ? 'col-resize' : 'row-resize';

      function onMove(e) { onDrag(e); }
      function onUp() {
        el.classList.remove('dragging');
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  // Left | Center
  let startX, startVal;
  document.getElementById('resizerLC').addEventListener('mousedown', function(e) {
    startX = e.clientX; startVal = getCols()[0];
  });
  makeDragger(document.getElementById('resizerLC'), function(e) {
    const cols = getCols();
    cols[0] = Math.max(160, Math.min(520, startVal + (e.clientX - startX)));
    setCols(cols);
  });

  // Center | Right
  let startX2, startVal2;
  document.getElementById('resizerCR').addEventListener('mousedown', function(e) {
    startX2 = e.clientX; startVal2 = getCols()[4];
  });
  makeDragger(document.getElementById('resizerCR'), function(e) {
    const cols = getCols();
    const newRight = Math.max(0, Math.min(700, startVal2 + (startX2 - e.clientX)));
    cols[4] = newRight;
    setCols(cols);
    if (newRight > 20) wb.classList.add('sop-open');
  });

  // Main | Bottom — standalone handler so it always works regardless of grid state
  document.getElementById('resizerBottom').addEventListener('mousedown', function(e) {
    e.preventDefault();
    const startY = e.clientY;
    const startH = document.querySelector('.bottom-panel').getBoundingClientRect().height;
    this.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'row-resize';
    function onMove(e) {
      const newH = Math.max(40, Math.min(520, startH + (startY - e.clientY)));
      wb.style.gridTemplateRows = '1fr 4px ' + newH + 'px';
    }
    function onUp() {
      document.getElementById('resizerBottom').classList.remove('dragging');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
</script>
