<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · QC Lab Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<style>
body {
  height: 100vh;
  display: grid;
  grid-template-rows: 42px 1fr 22px;
  overflow: hidden;
}

/* ── WORKBENCH ── */
.workbench {
  display: grid;
  grid-template-columns: 280px 4px 1fr;
  grid-template-rows: 1fr 4px 140px;
  overflow: hidden;
}

/* ── RESIZE HANDLES ── */
.resizer { background: #3c3c3c; z-index: 10; transition: background 0.15s; position: relative; }
.resizer:hover, .resizer.dragging { background: #007acc; }
.resizer-v { cursor: col-resize; grid-row: 1; }
.resizer-h { cursor: row-resize; grid-column: 1 / 4; grid-row: 2; }
.resizer::after { content: ''; position: absolute; inset: 0; }
.resizer-v::after  { left: -4px; right: -4px; }
.resizer-h::after  { top: -4px; bottom: -4px; }

/* ── LEFT PANEL ── */
.left-panel {
  grid-column: 1; grid-row: 1 / 2;
  background: #252526; border-right: 1px solid #3c3c3c;
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-header {
  padding: 8px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; color: #8e8e8e; border-bottom: 1px solid #3c3c3c;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-badge {
  background: #007acc; color: #fff; font-size: 10px; padding: 1px 6px;
  border-radius: 8px; font-weight: 600;
}
.filter-bar {
  display: flex; gap: 2px; padding: 6px 8px; border-bottom: 1px solid #2d2d30; flex-wrap: wrap;
}
.filter-btn {
  background: none; border: 1px solid #3c3c3c; color: #8e8e8e; font-size: 10px;
  padding: 2px 8px; border-radius: 2px; cursor: pointer; transition: all .15s;
}
.filter-btn:hover { color: #ccc; border-color: #5a5a5a; }
.filter-btn.active { background: #007acc; color: #fff; border-color: #007acc; }
.search-bar {
  padding: 4px 8px; border-bottom: 1px solid #2d2d30;
}
.search-bar input {
  width: 100%; background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 2px;
  color: #d4d4d4; font-size: 11px; padding: 4px 8px; outline: none;
}
.search-bar input:focus { border-color: #007acc; }
.sample-list { flex: 1; overflow-y: auto; }

/* ── SAMPLE CARD ── */
.sample-card {
  padding: 8px 10px; border-radius: 2px; margin-bottom: 1px;
  cursor: pointer; transition: background 0.1s; border-left: 2px solid transparent;
}
.sample-card:hover { background: #2a2d2e; }
.sample-card.active { background: #094771; border-left-color: #007acc; }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.card-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #9cdcfe; }
.card-title { font-size: 11px; color: #d4d4d4; line-height: 1.4; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 10px; color: #5a5a5a; display: flex; align-items: center; gap: 6px; }

/* ── PRIORITY BADGES ── */
.priority-badge { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px; text-transform: uppercase; letter-spacing: .03em; }
.pri-critical { background: rgba(244,71,71,0.2); color: #f44747; border: 1px solid rgba(244,71,71,0.35); }
.pri-urgent   { background: rgba(255,198,77,0.15); color: #ffc64d; border: 1px solid rgba(255,198,77,0.3); }
.pri-normal   { background: rgba(78,201,176,0.15); color: #4ec9b0; border: 1px solid rgba(78,201,176,0.3); }

/* ── STATUS BADGES ── */
.status-badge { font-size: 9px; padding: 1px 6px; border-radius: 2px; text-transform: capitalize; }
.st-received       { background: rgba(0,122,204,0.18); color: #4fc1ff; }
.st-in_testing     { background: rgba(255,198,77,0.15); color: #ffc64d; }
.st-pending_review { background: rgba(206,145,255,0.15); color: #ce91ff; }
.st-completed      { background: rgba(78,201,176,0.15); color: #4ec9b0; }
.st-cancelled      { background: rgba(100,100,100,0.18); color: #8e8e8e; }

/* ── BATCH CRITICAL ── */
.batch-critical-star { color: #f44747; font-size: 11px; margin-left: 4px; }

/* ── TAT INDICATOR ── */
.tat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.tat-ok { background: #4ec9b0; }
.tat-risk { background: #ffc64d; }
.tat-overdue { background: #f44747; }

/* ── CENTER PANEL ── */
.center-panel {
  grid-column: 3; grid-row: 1 / 2;
  background: var(--bg, #1e1e1e); display: flex; flex-direction: column; overflow: hidden;
}
.editor-tabs {
  display: flex; gap: 0; background: #252526; border-bottom: 1px solid #3c3c3c;
  min-height: 34px; align-items: flex-end; overflow-x: auto;
}
.editor-tab {
  padding: 6px 14px; font-size: 11px; color: #8e8e8e; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s;
}
.editor-tab:hover { color: #ccc; }
.editor-tab.active { color: #fff; border-bottom-color: #007acc; }
.center-content { flex: 1; overflow-y: auto; padding: 16px 20px; }
.empty-state { text-align: center; padding: 60px 20px; }
.empty-state .ei { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty-state p { color: #5a5a5a; font-size: 12px; }

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #2d2d30;
  background: #252526; flex-wrap: wrap;
}
.stat-card {
  background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 4px;
  padding: 8px 14px; min-width: 100px; text-align: center;
}
.stat-value { font-size: 20px; font-weight: 700; color: #e0e0e0; font-family: 'JetBrains Mono', monospace; }
.stat-label { font-size: 9px; color: #8e8e8e; text-transform: uppercase; letter-spacing: .05em; margin-top: 2px; }
.stat-warn .stat-value { color: #f44747; }

/* ── DETAIL SECTIONS ── */
.detail-section { margin-bottom: 20px; }
.section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  color: #8e8e8e; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #2d2d30;
  display: flex; align-items: center; gap: 8px;
}
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.detail-item label { font-size: 10px; color: #5a5a5a; display: block; margin-bottom: 2px; }
.detail-item span { font-size: 12px; color: #d4d4d4; }

/* ── TEST TABLE ── */
.test-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.test-table th {
  text-align: left; padding: 6px 8px; color: #8e8e8e; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .03em; border-bottom: 1px solid #3c3c3c;
}
.test-table td { padding: 6px 8px; color: #cccccc; border-bottom: 1px solid #2d2d30; }
.test-table tr:hover { background: rgba(0,122,204,0.08); }
.oos-row { background: rgba(244,71,71,0.08) !important; }
.oos-badge { background: rgba(244,71,71,0.2); color: #f44747; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px; }
.oot-badge { background: rgba(255,198,77,0.15); color: #ffc64d; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px; }
.pass-badge { background: rgba(78,201,176,0.15); color: #4ec9b0; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px; }
.fail-badge { background: rgba(244,71,71,0.2); color: #f44747; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 2px; }
.qual-warn { background: rgba(255,198,77,0.15); color: #ffc64d; font-size: 9px; padding: 1px 6px; border-radius: 2px; cursor: help; }

/* ── REVIEW STATUS ── */
.rv-pending_review { color: #ffc64d; }
.rv-reviewed { color: #4fc1ff; }
.rv-approved { color: #4ec9b0; }
.rv-rejected { color: #f44747; }

/* ── OOS INVESTIGATION PANEL ── */
.oos-panel {
  background: rgba(244,71,71,0.05); border: 1px solid rgba(244,71,71,0.2);
  border-radius: 4px; padding: 12px; margin-top: 8px;
}
.oos-panel h4 { font-size: 12px; color: #f44747; margin: 0 0 8px 0; }
.oos-phase { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #ffc64d; }
.oos-due { font-size: 10px; color: #8e8e8e; }
.oos-due.overdue { color: #f44747; font-weight: 700; }

/* ── WORKLOAD TABLE ── */
.workload-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.workload-table th { text-align: left; padding: 6px 8px; color: #8e8e8e; font-size: 10px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #3c3c3c; }
.workload-table td { padding: 6px 8px; color: #cccccc; border-bottom: 1px solid #2d2d30; }
.capacity-bar { height: 8px; background: #3c3c3c; border-radius: 4px; overflow: hidden; min-width: 60px; }
.capacity-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.cap-low { background: #4ec9b0; }
.cap-med { background: #ffc64d; }
.cap-high { background: #f44747; }

/* ── QUAL MATRIX ── */
.qual-matrix { width: 100%; border-collapse: collapse; font-size: 11px; overflow-x: auto; display: block; }
.qual-matrix th { text-align: left; padding: 4px 6px; color: #8e8e8e; font-size: 9px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #3c3c3c; white-space: nowrap; }
.qual-matrix td { padding: 4px 6px; text-align: center; border-bottom: 1px solid #2d2d30; }
.q-yes { color: #4ec9b0; }
.q-exp { color: #f44747; }
.q-no  { color: #3c3c3c; }

/* ── WORKFLOW BUTTONS ── */
.wf-btn {
  padding: 5px 14px; font-size: 11px; border: 1px solid #3c3c3c; border-radius: 2px;
  background: #2d2d30; color: #ccc; cursor: pointer; transition: all .15s;
}
.wf-btn:hover { border-color: #5a5a5a; color: #fff; }
.wf-primary { background: #007acc; border-color: #007acc; color: #fff; }
.wf-primary:hover { background: #0098ff; }
.wf-danger { background: rgba(244,71,71,0.15); border-color: rgba(244,71,71,0.4); color: #f44747; }
.wf-danger:hover { background: rgba(244,71,71,0.25); }
.wf-ai { background: rgba(206,145,255,0.1); border-color: rgba(206,145,255,0.3); color: #ce91ff; }
.wf-ai:hover { background: rgba(206,145,255,0.2); }
.action-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

/* ── BOTTOM PANEL ── */
.bottom-panel { grid-column: 1 / 4; grid-row: 3; background: #252526; border-top: 1px solid #3c3c3c; display: flex; flex-direction: column; overflow: hidden; }
.bottom-tabs { display: flex; gap: 0; border-bottom: 1px solid #2d2d30; }
.bottom-tab { padding: 4px 12px; font-size: 10px; color: #8e8e8e; cursor: pointer; border-bottom: 2px solid transparent; }
.bottom-tab.active { color: #ccc; border-bottom-color: #007acc; }
.bottom-content { flex: 1; overflow-y: auto; padding: 6px 10px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
.log-line { padding: 1px 0; color: #8e8e8e; }
.log-time { color: #5a5a5a; margin-right: 8px; }
.log-info { color: #4ec9b0; }
.log-warn { color: #ffc64d; }
.log-error { color: #f44747; }

/* ── STATUS BAR ── */
.status-bar {
  background: #007acc; display: flex; align-items: center; padding: 0 10px;
  font-size: 11px; color: #fff; gap: 6px;
}
.status-bar .s-sep { color: rgba(255,255,255,0.4); }
.status-bar .s-right { margin-left: auto; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.modal { background: #252526; border: 1px solid #3c3c3c; border-radius: 4px; width: 600px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid #3c3c3c; }
.modal-header h3 { font-size: 14px; color: #e0e0e0; margin: 0 0 4px 0; }
.modal-header p { font-size: 11px; color: #8e8e8e; margin: 0; }
.modal-body { padding: 16px 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #3c3c3c; display: flex; justify-content: flex-end; gap: 8px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 10px; color: #8e8e8e; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 4px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; background: #1e1e1e; border: 1px solid #3c3c3c; border-radius: 2px;
  color: #d4d4d4; font-size: 12px; padding: 6px 10px; outline: none; font-family: inherit;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #007acc; }
.form-row textarea { min-height: 60px; resize: vertical; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
.form-check { display: flex; align-items: center; gap: 6px; }
.form-check input[type="checkbox"] { width: auto; }
.hidden { display: none !important; }
.method-status-badge { font-size: 9px; padding: 1px 6px; border-radius: 2px; margin-left: 6px; }
.ms-validated { background: rgba(78,201,176,0.15); color: #4ec9b0; }
.ms-due_for_revalidation { background: rgba(255,198,77,0.15); color: #ffc64d; }
.ms-expired { background: rgba(244,71,71,0.2); color: #f44747; }
.ms-draft { background: rgba(100,100,100,0.18); color: #8e8e8e; }
</style>
</head>
<body>
<!-- NAV injected by nav.js -->

<div class="workbench">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="panel-header">
      <span>QC Samples</span>
      <span class="panel-badge" id="sampleCount">0</span>
    </div>
    <div class="filter-bar" id="viewToggle">
      <button class="filter-btn active" data-view="samples">Samples</button>
      <button class="filter-btn" data-view="tests">Tests</button>
    </div>
    <div class="filter-bar" id="statusFilter">
      <button class="filter-btn active" data-status="">All</button>
      <button class="filter-btn" data-status="received">Received</button>
      <button class="filter-btn" data-status="in_testing">Testing</button>
      <button class="filter-btn" data-status="pending_review">Review</button>
      <button class="filter-btn" data-status="completed">Done</button>
    </div>
    <div class="filter-bar" id="priorityFilter">
      <button class="filter-btn active" data-priority="">All</button>
      <button class="filter-btn" data-priority="critical">Critical</button>
      <button class="filter-btn" data-priority="urgent">Urgent</button>
      <button class="filter-btn" data-priority="normal">Normal</button>
      <button class="filter-btn" data-priority="batch_critical">Batch-Crit</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search sample ID, batch, product...">
    </div>
    <div class="sample-list" id="sampleList"></div>
    <div style="padding: 6px 8px; border-top: 1px solid #3c3c3c;">
      <button class="wf-btn wf-primary" style="width: 100%;" onclick="openRegisterModal()">+ Register Sample</button>
    </div>
  </div>

  <!-- RESIZER -->
  <div class="resizer resizer-v" id="resizerV"></div>

  <!-- CENTER PANEL -->
  <div class="center-panel">
    <div class="stats-bar" id="statsBar"></div>
    <div class="editor-tabs" id="mainTabs">
      <div class="editor-tab active" data-tab="detail">Sample Detail</div>
      <div class="editor-tab" data-tab="instruments">Instruments</div>
      <div class="editor-tab" data-tab="workload">Workload</div>
      <div class="editor-tab" data-tab="qualifications">Qualifications</div>
      <div class="editor-tab" data-tab="methods">Test Methods</div>
      <div class="editor-tab" data-tab="templates">Templates</div>
    </div>
    <div class="center-content" id="centerContent">
      <div class="empty-state">
        <div class="ei">&#x1F52C;</div>
        <p>Select a sample from the left panel or use the tabs above.</p>
      </div>
    </div>
  </div>

  <!-- RESIZER H -->
  <div class="resizer resizer-h" id="resizerH"></div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel">
    <div class="bottom-tabs">
      <div class="bottom-tab active" data-btab="audit">Audit Trail</div>
      <div class="bottom-tab" data-btab="ai">AI Insights</div>
    </div>
    <div class="bottom-content" id="bottomContent">
      <div class="log-line"><span class="log-time">--:--</span> <span class="log-info">QC Lab Dashboard ready</span></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span id="sbModule">QC Lab</span>
  <span class="s-sep">|</span>
  <span id="sbStatus">Ready</span>
  <span class="s-right" id="sbUser"></span>
</div>

<script src="/shared/nav.js"></script>
<script src="/shared/i18n.js"></script>
<script src="/shared/dev-progress.js"></script>
<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────
let STATE = {
  samples: [], tests: [], selectedSample: null, currentView: 'samples',
  statusFilter: '', priorityFilter: '', searchQuery: '',
  activeTab: 'detail', activeBtab: 'audit',
  instruments: [], methods: [], qualifications: [], templates: [],
};

// ── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  if (window.__user) document.getElementById('sbUser').textContent = window.__user.name + ' (' + window.__user.role + ')';
  initFilters();
  initTabs();
  initResizers();
  await loadStats();
  await loadSamples();
});

// ── Data Loading ─────────────────────────────────────────────────────────
async function loadSamples() {
  try {
    const params = new URLSearchParams();
    if (STATE.statusFilter) params.set('status', STATE.statusFilter);
    if (STATE.priorityFilter === 'batch_critical') params.set('batchCritical', 'true');
    else if (STATE.priorityFilter) params.set('priority', STATE.priorityFilter);
    STATE.samples = await authFetch('/qc/samples?' + params).then(r => r.json());
    renderSampleList();
  } catch (e) { logBottom('error', 'Failed to load samples: ' + e.message); }
}

async function loadTests() {
  try {
    STATE.tests = await authFetch('/qc/tests').then(r => r.json());
    renderTestList();
  } catch (e) { logBottom('error', 'Failed to load tests: ' + e.message); }
}

async function loadStats() {
  try {
    const stats = await authFetch('/qc/stats').then(r => r.json());
    renderStats(stats);
  } catch (e) { logBottom('warn', 'Stats unavailable'); renderStats({}); }
}

async function loadSampleDetail(sampleId) {
  try {
    STATE.selectedSample = await authFetch('/qc/samples/' + sampleId).then(r => r.json());
    STATE.activeTab = 'detail';
    setActiveTab('detail');
    renderDetail();
  } catch (e) { logBottom('error', 'Failed to load sample: ' + e.message); }
}

// ── Render: Stats Bar ────────────────────────────────────────────────────
function renderStats(s) {
  const bar = document.getElementById('statsBar');
  const sc = (v, l, w) => `<div class="stat-card${w ? ' stat-warn' : ''}"><div class="stat-value">${v ?? '-'}</div><div class="stat-label">${l}</div></div>`;
  bar.innerHTML = sc(s.samplesInQueue, 'In Queue') + sc(s.testsInProgress, 'Testing') + sc(s.overdueTests, 'Overdue', s.overdueTests > 0) +
    sc(s.oosThisMonth, 'OOS (30d)', s.oosThisMonth > 0) + sc(s.openOosInvestigations, 'Open OOS Inv.', s.openOosInvestigations > 0) +
    sc(s.avgTatHours ? s.avgTatHours + 'h' : '-', 'Avg TAT') + sc(s.instrumentsDueCal, 'Inst. Due Cal', s.instrumentsDueCal > 0) +
    sc(s.methodsDueReval, 'Methods Due', s.methodsDueReval > 0) + sc(s.qualsDueReqal, 'Quals Due', s.qualsDueReqal > 0);
}

// ── Render: Sample List ──────────────────────────────────────────────────
function renderSampleList() {
  const el = document.getElementById('sampleList');
  let items = STATE.samples;
  if (STATE.searchQuery) {
    const q = STATE.searchQuery.toLowerCase();
    items = items.filter(s => s.sample_id.toLowerCase().includes(q) || (s.batch_number || '').toLowerCase().includes(q) || (s.product_name || '').toLowerCase().includes(q));
  }
  document.getElementById('sampleCount').textContent = items.length;
  if (!items.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#5a5a5a;font-size:11px;">No samples found</div>'; return; }
  el.innerHTML = items.map(s => {
    const active = STATE.selectedSample && STATE.selectedSample.sample_id === s.sample_id ? ' active' : '';
    const priClass = 'pri-' + (s.priority || 'normal');
    const stClass = 'st-' + (s.status || 'received');
    const star = s.batch_critical ? '<span class="batch-critical-star" title="Batch Critical">&#9733;</span>' : '';
    return `<div class="sample-card${active}" onclick="loadSampleDetail('${s.sample_id}')">
      <div class="card-top"><span class="card-id">${s.sample_id}${star}</span><span class="priority-badge ${priClass}">${s.priority || 'normal'}</span></div>
      <div class="card-title">${esc(s.product_name || s.batch_number || 'Untitled')}</div>

    s.tests.forEach(t => {

      const isOos = result && result.oos_flag;
      const rowClass = isOos ? ' class="oos-row"' : '';
      html += `<tr${rowClass}><td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#9cdcfe;">${t.test_id}</td>`;

        if (result.review_status === 'reviewed') html += `<button class="wf-btn" style="font-size:9px;padding:2px 6px;" onclick="approveResult('${result.result_id}')">Approve</button>`;
        if (result.oos_flag && !result.oos_investigation_status) html += `<button class="wf-btn wf-danger" style="font-size:9px;padding:2px 6px;" onclick="initiateOos('${result.result_id}')">Init OOS</button>`;

      }

// ── Render: Qualifications ───────────────────────────────────────────────
async function renderQualifications() {
  const cc = document.getElementById('centerContent');
  cc.innerHTML = '<div style="padding:20px;color:#5a5a5a;">Loading qualifications...</div>';
  try {
    STATE.qualifications = await authFetch('/qc/qualifications').then(r => r.json());
    STATE.methods = await authFetch('/qc/methods').then(r => r.json());
  } catch (e) { STATE.qualifications = []; STATE.methods = []; }

  // Build matrix: rows = analysts, cols = methods
  const analysts = {};
  STATE.qualifications.forEach(q => {
    if (!analysts[q.analyst_id]) analysts[q.analyst_id] = { name: q.analyst_name || q.analyst_id, quals: {} };
    analysts[q.analyst_id].quals[q.test_method] = q;
  });
  const methodNames = [...new Set(STATE.qualifications.map(q => q.test_method))].sort();

  let html = `<div class="detail-section"><div class="section-label">Analyst Qualification Matrix <button class="wf-btn" style="font-size:9px;padding:2px 8px;margin-left:auto;" onclick="openQualModal()">+ Add Qualification</button></div>`;
  if (Object.keys(analysts).length && methodNames.length) {
    html += `<table class="qual-matrix"><thead><tr><th>Analyst</th>`;
    methodNames.forEach(m => { html += `<th>${esc(m)}</th>`; });
    html += `</tr></thead><tbody>`;
    Object.values(analysts).forEach(a => {
      html += `<tr><td style="color:#d4d4d4;text-align:left;">${esc(a.name)}</td>`;
      methodNames.forEach(m => {
        const q = a.quals[m];
        if (!q) html += `<td><span class="q-no">-</span></td>`;
        else if (q.qualification_status === 'qualified') {
          const requalDue = q.requalification_due && new Date(q.requalification_due) < new Date(Date.now() + 30*86400000);
          html += `<td><span class="q-yes" title="Qualified${requalDue ? ' (requalification due soon)' : ''}">${requalDue ? '&#x26A0;' : '&#x2713;'}</span></td>`;
        } else html += `<td><span class="q-exp" title="Expired">&#x2717;</span></td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  } else html += `<p style="color:#5a5a5a;font-size:11px;">No qualification data. Add qualifications to build the matrix.</p>`;
  html += `</div>`;
  cc.innerHTML = html;
}

// ── Filters & Tabs ───────────────────────────────────────────────────────
function initFilters() {
  document.querySelectorAll('#viewToggle .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#viewToggle .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.currentView = btn.dataset.view;
      if (STATE.currentView === 'tests') loadTests();
      else renderSampleList();
    });
  });
  document.querySelectorAll('#statusFilter .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#statusFilter .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.statusFilter = btn.dataset.status;
      loadSamples();
    });
  });
  document.querySelectorAll('#priorityFilter .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#priorityFilter .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      STATE.priorityFilter = btn.dataset.priority;
      loadSamples();
    });
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    STATE.searchQuery = e.target.value;
    renderSampleList();
  });
}

function initTabs() {
  document.querySelectorAll('#mainTabs .editor-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      setActiveTab(tab.dataset.tab);
      STATE.activeTab = tab.dataset.tab;
      switch (tab.dataset.tab) {
        case 'detail': renderDetail(); break;
        case 'instruments': renderInstruments(); break;
        case 'workload': renderWorkload(); break;
        case 'qualifications': renderQualifications(); break;
        case 'methods': renderMethods(); break;
        case 'templates': renderTemplates(); break;
      }
    });
  });
  document.querySelectorAll('.bottom-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      STATE.activeBtab = tab.dataset.btab;
    });
  });
}

function setActiveTab(tabName) {
  document.querySelectorAll('#mainTabs .editor-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
}

// ── Resizers ─────────────────────────────────────────────────────────────
function initResizers() {
  const wb = document.querySelector('.workbench');
  const rv = document.getElementById('resizerV');
  const rh = document.getElementById('resizerH');

  let startX, startY, startCols, startRows;
  rv.addEventListener('mousedown', e => {
    startX = e.clientX; startCols = wb.style.gridTemplateColumns || '280px 4px 1fr';
    const onMove = ev => { const dx = ev.clientX - startX; const w = Math.max(180, parseInt(startCols) + dx); wb.style.gridTemplateColumns = w + 'px 4px 1fr'; rv.classList.add('dragging'); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); rv.classList.remove('dragging'); };
    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  });
  rh.addEventListener('mousedown', e => {
    startY = e.clientY; startRows = wb.style.gridTemplateRows || '1fr 4px 140px';
    const parts = startRows.split(' '); const bottomH = parseInt(parts[2]) || 140;
    const onMove = ev => { const dy = startY - ev.clientY; const h = Math.max(60, bottomH + dy); wb.style.gridTemplateRows = `1fr 4px ${h}px`; rh.classList.add('dragging'); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); rh.classList.remove('dragging'); };
    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  });
}

// ── Actions ──────────────────────────────────────────────────────────────
async function startTest(testId) {
  try {
    await authFetch('/qc/tests/' + testId + '/start', { method: 'POST' });
    logBottom('info', 'Test ' + testId + ' started');
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to start test: ' + e.message); }
}

async function reviewResult(resultId) {
  try {
    await authFetch('/qc/results/' + resultId + '/review', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reviewStatus: 'reviewed' }) });
    logBottom('info', 'Result ' + resultId + ' reviewed');
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to review result: ' + e.message); }
}

async function approveResult(resultId) {
  try {
    await authFetch('/qc/results/' + resultId + '/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
    logBottom('info', 'Result ' + resultId + ' approved');
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to approve result: ' + e.message); }
}

async function completeSample(sampleId) {
  try {
    await authFetch('/qc/samples/' + sampleId + '/complete', { method: 'POST' });
    logBottom('info', 'Sample ' + sampleId + ' completed');
    await loadSamples(); await loadSampleDetail(sampleId); await loadStats();
  } catch (e) { logBottom('error', 'Failed to complete sample: ' + e.message); }
}

async function initiateOos(resultId) {
  try {
    const r = await authFetch('/qc/results/' + resultId + '/oos/initiate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) }).then(r => r.json());
    logBottom('warn', 'OOS Phase I initiated for ' + resultId + ', due: ' + fmtDate(r.dueDate));
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to initiate OOS: ' + e.message); }
}

async function escalateOos(resultId) {
  try {
    const r = await authFetch('/qc/results/' + resultId + '/oos/escalate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) }).then(r => r.json());
    logBottom('warn', 'OOS escalated to Phase II for ' + resultId);
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to escalate OOS: ' + e.message); }
}

async function closeOos(resultId) {
  const conclusion = prompt('OOS Conclusion (confirmed_oos / invalidated / within_spec):');
  if (!conclusion) return;
  try {
    await authFetch('/qc/results/' + resultId + '/oos/close', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ conclusion }) });
    logBottom('info', 'OOS investigation closed for ' + resultId);
    if (STATE.selectedSample) await loadSampleDetail(STATE.selectedSample.sample_id);
  } catch (e) { logBottom('error', 'Failed to close OOS: ' + e.message); }
}

async function viewCoa(sampleId) {
  try {
    const coa = await authFetch('/qc/samples/' + sampleId + '/coa').then(r => r.json());
    const cc = document.getElementById('centerContent');
    let html = `<div class="detail-section"><div class="section-label">Certificate of Analysis</div>`;
    html += `<div class="detail-grid"><div class="detail-item"><label>Sample ID</label><span>${coa.sampleId}</span></div>`;
    html += `<div class="detail-item"><label>Batch</label><span>${esc(coa.batchNumber)}</span></div>`;
    html += `<div class="detail-item"><label>Product</label><span>${esc(coa.productName)}</span></div>`;
    html += `<div class="detail-item"><label>Generated</label><span>${fmtDate(coa.generatedAt)}</span></div></div>`;
    html += `<table class="test-table" style="margin-top:12px;"><thead><tr><th>Test</th><th>Method</th><th>Spec</th><th>Result</th><th>Pass/Fail</th><th>Approved By</th></tr></thead><tbody>`;
    (coa.tests || []).forEach(t => {
      const specStr = t.specText || ((t.specMin !== null ? t.specMin : '') + '-' + (t.specMax !== null ? t.specMax : '') + ' ' + (t.specUnit || ''));
      const r = t.result;
      html += `<tr><td>${esc(t.testName)}</td><td>${esc(t.testMethod || '-')}</td><td>${esc(specStr)}</td>`;
      if (r) {
        html += `<td>${r.value !== null ? r.value : ''} ${r.text || ''} ${r.unit || ''}</td>`;
        html += `<td>${r.passFail === 'pass' ? '<span class="pass-badge">PASS</span>' : '<span class="fail-badge">FAIL</span>'}</td>`;
        html += `<td>${esc(r.approvedBy || '-')}</td>`;
      } else html += `<td>-</td><td>-</td><td>-</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
    cc.innerHTML = html;
  } catch (e) { logBottom('error', 'Failed to generate COA: ' + e.message); }
}

// ── Modals ───────────────────────────────────────────────────────────────
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
  return overlay;
}

function closeModal() {
  const m = document.querySelector('.modal-overlay');
  if (m) m.remove();
}

async function submitTest() {
  const methodSel = document.getElementById('tMethod');
  const body = {
    sampleId: document.getElementById('tSampleId').value,
    testName: document.getElementById('tTestName').value,
    testMethodId: methodSel.value,
    testMethod: methodSel.options[methodSel.selectedIndex]?.textContent || '',
    testCategory: document.getElementById('tCategory').value,
    assignedAnalyst: document.getElementById('tAnalyst').value,
    instrumentId: document.getElementById('tInstrument').value,
    specificationMin: document.getElementById('tSpecMin').value ? Number(document.getElementById('tSpecMin').value) : null,
    specificationMax: document.getElementById('tSpecMax').value ? Number(document.getElementById('tSpecMax').value) : null,
    specificationUnit: document.getElementById('tSpecUnit').value,
    specificationText: document.getElementById('tSpecText').value,
    targetTatHours: Number(document.getElementById('tTat').value) || 48,
    dueDate: document.getElementById('tDue').value || null,
    notes: document.getElementById('tNotes').value,
  };
  try {
    const r = await authFetch('/qc/tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
    if (r.ok) {
      let msg = 'Test assigned: ' + r.testId;
      if (r.qualificationWarning) msg += ' [WARNING: Analyst not qualified for this method]';
      if (r.methodValidationWarning) msg += ' [WARNING: Method validation expired]';
      logBottom(r.qualificationWarning || r.methodValidationWarning ? 'warn' : 'info', msg);
      closeModal();
      await loadSampleDetail(body.sampleId);
    } else logBottom('error', 'Failed: ' + (r.error || 'unknown'));
  } catch (e) { logBottom('error', 'Submit test error: ' + e.message); }
}

          <option value="validated">Validated</option><option value="due_for_revalidation">Due for Revalidation</option>
          <option value="expired">Expired</option><option value="draft">Draft</option>
        </select></div>
      </div>
      <div class="form-grid">
        <div class="form-row"><label>Validated Date</label><input type="date" id="mmValDate"></div>
        <div class="form-row"><label>Next Revalidation</label><input type="date" id="mmNextReval"></div>
      </div>
      <div class="form-row"><label>SOP Reference</label><input id="mmSop"></div>
    </div>
    <div class="modal-footer">
      <button class="wf-btn" onclick="closeModal()">Cancel</button>
      <button class="wf-btn wf-primary" onclick="submitMethod()">Register Method</button>
    </div>`;
  showModal(html);
}

async function submitMethod() {
  const body = {
    methodName: document.getElementById('mmName').value,
    methodCategory: document.getElementById('mmCategory').value,
    version: document.getElementById('mmVersion').value,
    validationStatus: document.getElementById('mmStatus').value,
    validatedDate: document.getElementById('mmValDate').value || null,
    nextRevalidation: document.getElementById('mmNextReval').value || null,
    sopReference: document.getElementById('mmSop').value,
  };
  try {
    const r = await authFetch('/qc/methods', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
    if (r.ok) { logBottom('info', 'Method registered: ' + r.methodId); closeModal(); renderMethods(); }
    else logBottom('error', 'Failed: ' + (r.error || 'unknown'));
  } catch (e) { logBottom('error', 'Submit method error: ' + e.message); }
}

// ── Template Modal ───────────────────────────────────────────────────────
function openTemplateModal() {
  const html = `<div class="modal-header"><h3>Create Test Template</h3></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row"><label>Template Name *</label><input id="ttName" placeholder="e.g. Release Panel - mAb"></div>
        <div class="form-row"><label>Sample Type *</label><select id="ttType">
          <option value="in_process">In-Process</option><option value="release">Release</option><option value="stability">Stability</option>
          <option value="raw_material">Raw Material</option><option value="reference_standard">Reference Standard</option><option value="environmental">Environmental</option>
        </select></div>
      </div>
      <div class="form-row"><label>Product Name</label><input id="ttProduct" placeholder="Optional"></div>
      <div class="form-row"><label>Tests (JSON array)</label><textarea id="ttTests" placeholder='[{"name":"pH","method":"USP <791>","category":"chemical"}]'></textarea></div>
      <div class="form-row"><label>Notes</label><textarea id="ttNotes"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="wf-btn" onclick="closeModal()">Cancel</button>
      <button class="wf-btn wf-primary" onclick="submitTemplate()">Create Template</button>
    </div>`;
  showModal(html);
}

async function submitTemplate() {
  let tests = [];
  try { tests = JSON.parse(document.getElementById('ttTests').value || '[]'); } catch (e) { logBottom('error', 'Invalid JSON for tests'); return; }
  const body = {
    templateName: document.getElementById('ttName').value,
    sampleType: document.getElementById('ttType').value,
    productName: document.getElementById('ttProduct').value,
    tests,
    notes: document.getElementById('ttNotes').value,
  };
  try {
    const r = await authFetch('/qc/templates', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => r.json());
    if (r.ok) { logBottom('info', 'Template created: ' + r.templateId); closeModal(); renderTemplates(); }
    else logBottom('error', 'Failed: ' + (r.error || 'unknown'));
  } catch (e) { logBottom('error', 'Submit template error: ' + e.message); }
}

// ── Utilities ────────────────────────────────────────────────────────────
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { if (!d) return ''; try { return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); } catch { return d; } }

function logBottom(level, msg) {
  const bc = document.getElementById('bottomContent');
  const t = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const cls = level === 'error' ? 'log-error' : level === 'warn' ? 'log-warn' : 'log-info';
  bc.innerHTML += `<div class="log-line"><span class="log-time">${t}</span> <span class="${cls}">${esc(msg)}</span></div>`;
  bc.scrollTop = bc.scrollHeight;
}
</script>
</body>
</html>
