<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent — Project Command Centre</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#111118;--surface2:#16161e;--border:#1e1e28;--border2:#2a2a35;
    --text:#c8c8d0;--text2:#888;--text3:#555;--text4:#333;
    --white:#fff;--accent:#6c5ce7;--accent-dim:#6c5ce720;
    --green:#00b894;--gold:#fdcb6e;--blue:#74b9ff;--red:#e17055;
    --teal:#00cec9;--pink:#ff7675;--lavender:#a29bfe;--orange:#f39c12;
    --phase1:#6c5ce7;--phase2:#00b894;--phase3:#00cec9;--phase4:#e17055;
    --phase5:#fdcb6e;--phase6:#74b9ff;--phase7:#a29bfe;--phase8:#ff7675;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&family=JetBrains+Mono:wght@400;500&display=swap');

  /* ── Header ── */
  .header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;position:sticky;top:0;z-index:100;background:var(--bg);backdrop-filter:blur(20px)}
  .header-left{display:flex;align-items:center;gap:1rem}
  .logo{font-family:'Instrument Serif',Georgia,serif;font-size:1.4rem;color:var(--white);letter-spacing:-.02em}
  .logo span{color:var(--accent);font-weight:400}
  .subtitle{color:var(--text3);font-size:.65rem;letter-spacing:.08em;text-transform:uppercase}

  /* ── View Tabs ── */
  .view-tabs{display:flex;gap:.25rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px}
  .view-tab{padding:.35rem .75rem;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.7rem;font-weight:600;transition:all .15s;font-family:inherit}
  .view-tab:hover{color:var(--text)}
  .view-tab.active{background:var(--accent);color:var(--white)}

  /* ── Stats Bar ── */
  .stats-bar{display:flex;gap:1.5rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
  .stat{display:flex;align-items:baseline;gap:.35rem;font-size:.7rem;color:var(--text3)}
  .stat strong{font-size:1rem;font-weight:700}
  .stat-divider{width:1px;height:20px;background:var(--border);margin:0 .25rem}

  /* ── Phase Legend ── */
  .phase-legend{display:flex;gap:.5rem;flex-wrap:wrap;padding:.5rem 1.5rem;border-bottom:1px solid var(--border)}
  .phase-pill{padding:.2rem .5rem;border-radius:4px;font-size:.6rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;opacity:.7}
  .phase-pill:hover,.phase-pill.active{opacity:1;border-color:currentColor}
  .phase-pill.active{opacity:1}

  /* ── Filter Bar ── */
  .filter-bar{display:flex;gap:.4rem;padding:.5rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
  .filter-group{display:flex;gap:.25rem;align-items:center}
  .filter-label{color:var(--text4);font-size:.6rem;margin-right:.25rem;text-transform:uppercase;letter-spacing:.05em}
  .filter-btn{padding:.2rem .5rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:.6rem;transition:all .15s;font-family:inherit}
  .filter-btn:hover{border-color:var(--text3);color:var(--text)}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .search-box{padding:.3rem .6rem;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.7rem;font-family:inherit;width:200px;outline:none;transition:border-color .15s}
  .search-box:focus{border-color:var(--accent)}
  .search-box::placeholder{color:var(--text4)}

  /* ── Main Content ── */
  .main{padding:0}
  .view{display:none}
  .view.active{display:block}

  /* ═══ GANTT VIEW ═══ */
  .gantt-container{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 200px);position:relative}
  .gantt{display:grid;min-width:1800px;position:relative}
  .gantt-header{display:grid;grid-template-columns:280px repeat(46, 1fr);position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border)}
  .gantt-header-label{padding:.4rem .75rem;font-size:.6rem;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center}
  .gantt-week{padding:.3rem .2rem;font-size:.55rem;color:var(--text4);text-align:center;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .gantt-week.month-start{border-left:1px solid var(--text4)}

  .gantt-phase-row{display:grid;grid-template-columns:280px repeat(46, 1fr);border-bottom:1px solid var(--border);background:var(--surface)}
  .gantt-phase-label{padding:.35rem .75rem;font-size:.7rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:.5rem}
  .gantt-phase-label .phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .gantt-phase-bg{grid-column:span 46;position:relative}

  .gantt-row{display:grid;grid-template-columns:280px repeat(46, 1fr);border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;min-height:32px}
  .gantt-row:hover{background:var(--surface)}
  .gantt-module-label{padding:.3rem .75rem .3rem 1.5rem;font-size:.68rem;color:var(--text);display:flex;align-items:center;gap:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gantt-module-label .complexity-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .gantt-module-label .status-icon{font-size:.5rem;flex-shrink:0}
  .gantt-timeline{grid-column:2 / -1;position:relative;display:grid;grid-template-columns:repeat(46, 1fr)}

  .gantt-bar{position:absolute;top:4px;bottom:4px;border-radius:4px;display:flex;align-items:center;padding:0 .4rem;font-size:.55rem;font-weight:600;color:var(--white);overflow:hidden;white-space:nowrap;transition:all .15s;min-width:20px;cursor:pointer;z-index:2}
  .gantt-bar:hover{filter:brightness(1.2);transform:scaleY(1.15)}
  .gantt-bar.status-live{opacity:1}
  .gantt-bar.status-wip{opacity:.85;background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.08) 3px,rgba(255,255,255,.08) 6px)}
  .gantt-bar.status-planned{opacity:.6}

  .gantt-gridline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);z-index:1}
  .gantt-gridline.month{background:var(--text4);opacity:.3}

  /* Progress overlay on gantt bar */
  .gantt-progress{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.15);border-radius:4px 0 0 4px;transition:width .3s}

  /* ═══ BOARD VIEW ═══ */
  .board{display:flex;gap:.75rem;padding:1rem 1.5rem;overflow-x:auto;align-items:flex-start}
  .board-column{min-width:260px;max-width:290px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:10px}
  .board-col-header{padding:.6rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .board-col-title{font-size:.75rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:.4rem}
  .board-col-title .phase-dot{width:8px;height:8px;border-radius:50%}
  .board-col-count{font-size:.6rem;color:var(--text3)}
  .board-col-body{padding:.4rem;display:flex;flex-direction:column;gap:.35rem;max-height:65vh;overflow-y:auto}
  .board-col-body::-webkit-scrollbar{width:3px}
  .board-col-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  .board-card{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:.6rem;cursor:pointer;transition:all .15s}
  .board-card:hover{border-color:var(--accent);box-shadow:0 2px 12px var(--accent-dim)}
  .board-card-top{display:flex;align-items:center;gap:.3rem;margin-bottom:.25rem;flex-wrap:wrap}
  .board-card-title{font-size:.72rem;font-weight:600;color:var(--white)}
  .board-card-desc{font-size:.6rem;color:var(--text3);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .board-card-meta{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap}
  .board-card-meta span{font-size:.5rem;padding:.1rem .3rem;border-radius:3px;background:rgba(255,255,255,.04);color:var(--text3)}

  /* ═══ REGISTRY VIEW ═══ */
  .registry{padding:1rem 1.5rem}
  .registry-table{width:100%;border-collapse:collapse;font-size:.68rem}
  .registry-table th{text-align:left;padding:.5rem .6rem;color:var(--text3);font-weight:600;font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);cursor:pointer;user-select:none}
  .registry-table th:hover{color:var(--text)}
  .registry-table td{padding:.4rem .6rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
  .registry-table tr{cursor:pointer;transition:background .1s}
  .registry-table tr:hover{background:var(--surface)}

  /* ═══ PROGRESS VIEW ═══ */
  .progress-view{padding:1.5rem}
  .progress-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));gap:1rem;margin-bottom:1.5rem}
  .progress-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem}
  .progress-card-title{font-size:.75rem;font-weight:700;color:var(--white);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
  .progress-card-title .phase-dot{width:8px;height:8px;border-radius:50%}
  .progress-bar-bg{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:.5rem}
  .progress-bar-fill{height:100%;border-radius:4px;transition:width .3s}
  .progress-stats{display:flex;gap:.75rem;font-size:.6rem;color:var(--text3)}
  .progress-stats strong{color:var(--text)}

  .progress-overall{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1.5rem}
  .progress-overall-title{font-size:.85rem;font-weight:700;color:var(--white);margin-bottom:.75rem}
  .progress-overall-bar{height:12px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:.5rem;display:flex}
  .progress-segment{height:100%;transition:width .3s}
  .progress-overall-stats{display:flex;gap:1.5rem;font-size:.7rem;color:var(--text3)}
  .progress-overall-stats strong{color:var(--white);font-size:.9rem}

  /* Burndown chart */
  .burndown{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
  .burndown-title{font-size:.85rem;font-weight:700;color:var(--white);margin-bottom:.75rem}
  .burndown-canvas{width:100%;height:200px}

  /* ═══ MODULE DETAIL PANEL ═══ */
  .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;justify-content:flex-end;backdrop-filter:blur(4px)}
  .detail-overlay.active{display:flex}
  .detail-panel{width:520px;max-width:90vw;background:var(--surface);border-left:1px solid var(--border);height:100vh;overflow-y:auto;padding:0}
  .detail-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
  .detail-header-left{flex:1}
  .detail-id{font-size:.6rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:.2rem}
  .detail-title{font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:.3rem}
  .detail-desc{font-size:.72rem;color:var(--text2);line-height:1.4}
  .detail-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .detail-close:hover{border-color:var(--red);color:var(--red)}

  .detail-body{padding:1.25rem}
  .detail-section{margin-bottom:1.25rem}
  .detail-section-title{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem}
  .detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
  .detail-meta-item{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:.5rem .6rem}
  .detail-meta-label{font-size:.55rem;color:var(--text4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.15rem}
  .detail-meta-value{font-size:.75rem;color:var(--white);font-weight:600}

  .detail-list{list-style:none;padding:0}
  .detail-list li{padding:.3rem .5rem;font-size:.68rem;color:var(--text);border-left:2px solid var(--border);margin-bottom:.25rem;font-family:'JetBrains Mono',monospace}
  .detail-list li.highlight{border-left-color:var(--accent);color:var(--accent)}

  .detail-tags{display:flex;flex-wrap:wrap;gap:.25rem}
  .detail-tag{padding:.15rem .4rem;border-radius:3px;font-size:.58rem;font-weight:600}

  .detail-deps{display:flex;flex-direction:column;gap:.25rem}
  .detail-dep{padding:.3rem .5rem;border-radius:4px;font-size:.65rem;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;gap:.35rem;cursor:pointer;transition:all .15s}
  .detail-dep:hover{border-color:var(--accent)}
  .detail-dep .dep-status{width:6px;height:6px;border-radius:50%}

  /* Progress slider in detail */
  .detail-progress{margin-top:.5rem}
  .detail-progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
  .detail-progress-pct{font-size:.85rem;font-weight:700;color:var(--white)}
  .detail-progress input[type=range]{width:100%;-webkit-appearance:none;height:6px;background:var(--border);border-radius:3px;outline:none}
  .detail-progress input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer}

  /* ── Badges ── */
  .badge{display:inline-block;padding:.1rem .35rem;border-radius:3px;font-size:.5rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .badge-live{background:#00b89425;color:var(--green)}
  .badge-wip{background:#fdcb6e25;color:var(--gold)}
  .badge-planned{background:#74b9ff20;color:var(--blue)}
  .badge-s{background:var(--green);color:#000}
  .badge-m{background:var(--gold);color:#000}
  .badge-l{background:var(--orange);color:#000}
  .badge-xl{background:var(--red);color:#fff}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--text4)}

  /* ═══ ROUNDS VIEW ═══ */
  .rounds-view{padding:1.5rem}
  .rounds-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem}
  .rounds-info-title{font-size:.85rem;font-weight:700;color:var(--white);margin-bottom:.3rem}
  .rounds-info-desc{font-size:.68rem;color:var(--text2);line-height:1.5}
  .round-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;overflow:hidden}
  .round-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .round-header:hover{background:var(--surface2)}
  .round-title{font-size:.8rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:.5rem}
  .round-title .round-num{background:var(--accent);color:var(--white);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
  .round-meta{display:flex;gap:.75rem;font-size:.6rem;color:var(--text3)}
  .round-body{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:.5rem;padding:.75rem}
  .round-module{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:.75rem;cursor:pointer;transition:all .15s;position:relative}
  .round-module:hover{border-color:var(--accent);box-shadow:0 2px 12px var(--accent-dim)}
  .round-module-top{display:flex;align-items:center;gap:.3rem;margin-bottom:.25rem;flex-wrap:wrap}
  .round-module-title{font-size:.75rem;font-weight:600;color:var(--white)}
  .round-module-branch{font-size:.55rem;color:var(--text4);font-family:'JetBrains Mono',monospace;margin-top:.2rem;display:flex;align-items:center;gap:.3rem}
  .round-module-branch code{background:var(--bg);padding:.1rem .3rem;border-radius:3px;color:var(--accent)}
  .round-module-desc{font-size:.6rem;color:var(--text3);line-height:1.3;margin-top:.2rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .round-module-stats{display:flex;gap:.4rem;margin-top:.35rem;flex-wrap:wrap}
  .round-module-stats span{font-size:.5rem;padding:.1rem .3rem;border-radius:3px;background:rgba(255,255,255,.04);color:var(--text3)}

  /* Agent spec modal */
  .spec-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
  .spec-overlay.active{display:flex}
  .spec-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:700px;max-width:92vw;max-height:85vh;display:flex;flex-direction:column}
  .spec-modal-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .spec-modal-title{font-size:.8rem;font-weight:700;color:var(--white)}
  .spec-modal-actions{display:flex;gap:.4rem}
  .spec-copy-btn{padding:.3rem .7rem;border-radius:5px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;font-size:.65rem;font-weight:600;font-family:inherit;transition:all .15s}
  .spec-copy-btn:hover{background:var(--accent);color:var(--white)}
  .spec-modal-body{padding:1rem;overflow-y:auto;flex:1}
  .spec-content{font-family:'JetBrains Mono',monospace;font-size:.62rem;line-height:1.6;color:var(--text);white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;tab-size:2}

  /* ── Responsive ── */
  @media(max-width:768px){
    .header{padding:.75rem 1rem}
    .stats-bar{padding:.5rem 1rem}
    .filter-bar{padding:.5rem 1rem}
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-left">
    <div>
      <div class="logo">Vent <span>Command Centre</span></div>
      <div class="subtitle">76 modules &middot; 8 phases &middot; Full facility coverage</div>
    </div>
  </div>
  <div class="view-tabs" id="viewTabs">
    <button class="view-tab active" data-view="gantt">Gantt</button>
    <button class="view-tab" data-view="board">Board</button>
    <button class="view-tab" data-view="registry">Registry</button>
    <button class="view-tab" data-view="progress">Progress</button>
    <button class="view-tab" data-view="rounds">Rounds</button>
  </div>
</header>

<!-- ── Stats Bar ── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── Phase Legend ── -->
<div class="phase-legend" id="phaseLegend"></div>

<!-- ── Filter Bar ── -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Status</span>
    <button class="filter-btn active" data-filter="status" data-value="live" onclick="toggleFilter(this)">Live</button>
    <button class="filter-btn active" data-filter="status" data-value="wip" onclick="toggleFilter(this)">WIP</button>
    <button class="filter-btn active" data-filter="status" data-value="planned" onclick="toggleFilter(this)">Planned</button>
  </div>
  <div class="filter-group" style="margin-left:.75rem">
    <span class="filter-label">Size</span>
    <button class="filter-btn active" data-filter="complexity" data-value="S" onclick="toggleFilter(this)">S</button>
    <button class="filter-btn active" data-filter="complexity" data-value="M" onclick="toggleFilter(this)">M</button>
    <button class="filter-btn active" data-filter="complexity" data-value="L" onclick="toggleFilter(this)">L</button>
    <button class="filter-btn active" data-filter="complexity" data-value="XL" onclick="toggleFilter(this)">XL</button>
  </div>
  <input class="search-box" type="text" placeholder="Search modules..." id="searchBox" oninput="applyFilters()">
</div>

<!-- ── Main Views ── -->
<main class="main">
  <div class="view active" id="view-gantt"></div>
  <div class="view" id="view-board"></div>
  <div class="view" id="view-registry"></div>
  <div class="view" id="view-progress"></div>
  <div class="view" id="view-rounds"></div>
</main>

<!-- ── Agent Spec Modal ── -->
<div class="spec-overlay" id="specOverlay" onclick="if(event.target===this)closeSpec()">
  <div class="spec-modal">
    <div class="spec-modal-header">
      <div class="spec-modal-title" id="specTitle">Agent Spec</div>
      <div class="spec-modal-actions">
        <button class="spec-copy-btn" onclick="copyLaunch()" id="btnCopyLaunch" style="background:var(--green);color:#000;border-color:var(--green)">Copy Launch Command</button>

// ═══════════════════════════════════════════════════════════════════
// STATE & PERSISTENCE
// ═══════════════════════════════════════════════════════════════════
var STORAGE_KEY = 'vent_project_v1';
var activeFilters = { status:{ live:true, wip:true, planned:true }, complexity:{ S:true, M:true, L:true, XL:true }, phase:null };
var searchQuery = '';
var currentView = 'gantt';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveProgress(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function getModuleProgress(id) {
  var m = getModuleById(id);
  if (m && m.status === 'live') return 100;
  var saved = (loadProgress()[id] || {}).progress;
  if (saved !== undefined && saved !== null) return saved;
  // WIP modules with a path have working code — default 60%
  if (m && m.status === 'wip' && m.path) return 60;
  return 0;
}
function setModuleProgress(id, pct) {
  var data = loadProgress();
  if (!data[id]) data[id] = {};
  data[id].progress = pct;
  if (pct === 100 && !data[id].completedAt) data[id].completedAt = new Date().toISOString();
  if (pct > 0 && !data[id].startedAt) data[id].startedAt = new Date().toISOString();
  if (pct < 100) data[id].completedAt = null;
  saveProgress(data);
}

function getModuleById(id) { return MODULES.find(function(m) { return m.id === id; }); }
function getPhaseById(id) { return PHASES.find(function(p) { return p.id === id; }); }
function getPhaseColor(phase) { if (phase === 0) return '#00b894'; var p = getPhaseById(phase); return p ? p.color : '#555'; }

function isModuleVisible(m) {
  if (!activeFilters.status[m.status]) return false;
  if (m.complexity !== '-' && !activeFilters.complexity[m.complexity]) return false;
  if (activeFilters.phase !== null && m.phase !== activeFilters.phase) return false;
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    return m.title.toLowerCase().indexOf(q) !== -1 || m.desc.toLowerCase().indexOf(q) !== -1 || m.id.toLowerCase().indexOf(q) !== -1;
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════
function renderStats() {
  var live = MODULES.filter(function(m) { return m.status === 'live'; }).length;
  var wip = MODULES.filter(function(m) { return m.status === 'wip'; }).length;
  var planned = MODULES.filter(function(m) { return m.status === 'planned'; }).length;
  var totalDays = MODULES.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
  var completedDays = MODULES.reduce(function(s, m) { return s + Math.round(m.daysEstimate * getModuleProgress(m.id) / 100); }, 0);
  var overallPct = totalDays > 0 ? Math.round(completedDays / totalDays * 100) : 0;

  // Built = live + wip modules that have pages
  var built = live + wip;
  var builtPct = Math.round((built / MODULES.length) * 100);

  // WIP modules with paths (navigable)
  var wipLinks = MODULES.filter(function(m) { return m.status === 'wip' && m.path; });
  var wipHtml = wipLinks.map(function(m) {
    return '<a href="' + m.path + '" style="padding:.15rem .4rem;border-radius:3px;background:#fdcb6e15;border:1px solid #fdcb6e30;color:#fdcb6e;text-decoration:none;font-size:.58rem;white-space:nowrap;transition:all .15s" onmouseover="this.style.background=\'#fdcb6e25\'" onmouseout="this.style.background=\'#fdcb6e15\'">' + m.title + '</a>';
  }).join('');

  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><strong style="color:var(--green)">' + live + '</strong> live</div>' +
    '<div class="stat"><strong style="color:var(--gold)">' + wip + '</strong> wip</div>' +
    '<div class="stat"><strong style="color:var(--blue)">' + planned + '</strong> planned</div>' +
    '<div class="stat-divider"></div>' +
    '<div class="stat"><strong style="color:var(--white)">' + built + '/' + MODULES.length + '</strong> built</div>' +
    '<div style="width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;display:flex">' +
      '<div style="width:' + Math.round((live/MODULES.length)*100) + '%;background:var(--green);height:100%"></div>' +
      '<div style="width:' + Math.round((wip/MODULES.length)*100) + '%;background:var(--gold);height:100%"></div>' +
    '</div>' +
    '<div class="stat"><strong style="color:var(--accent)">' + builtPct + '%</strong></div>' +
    '<div class="stat-divider"></div>' +
    '<div class="stat"><strong style="color:var(--white)">' + totalDays + '</strong> est. days</div>' +
    '<div class="stat"><strong style="color:var(--accent)">' + overallPct + '%</strong> progress</div>' +
    (wipHtml ? '<div class="stat-divider"></div><div style="display:flex;gap:.25rem;align-items:center;flex-wrap:wrap"><span style="font-size:.55rem;color:var(--text4);margin-right:.15rem">OPEN:</span>' + wipHtml + '</div>' : '');
}

// ═══════════════════════════════════════════════════════════════════
// PHASE LEGEND
// ═══════════════════════════════════════════════════════════════════
function renderPhaseLegend() {
  var html = '<span class="phase-pill' + (activeFilters.phase === null ? ' active' : '') + '" style="color:var(--text);background:var(--surface2)" onclick="filterPhase(null)">All</span>';
  var liveCount = MODULES.filter(function(m) { return m.status === 'live'; }).length;
  html += '<span class="phase-pill' + (activeFilters.phase === 0 ? ' active' : '') + '" style="color:var(--green);background:#00b89415" onclick="filterPhase(0)">Live (' + liveCount + ')</span>';
  PHASES.forEach(function(p) {
    var count = MODULES.filter(function(m) { return m.phase === p.id; }).length;
    html += '<span class="phase-pill' + (activeFilters.phase === p.id ? ' active' : '') + '" style="color:' + p.color + ';background:' + p.color + '15" onclick="filterPhase(' + p.id + ')">' + p.label + ' (' + count + ')</span>';
  });
  document.getElementById('phaseLegend').innerHTML = html;
}

function filterPhase(phase) {
  activeFilters.phase = phase;
  renderPhaseLegend();
  renderCurrentView();
}

// ═══════════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════════
function toggleFilter(btn) {
  btn.classList.toggle('active');
  var type = btn.dataset.filter;
  var val = btn.dataset.value;
  activeFilters[type][val] = !activeFilters[type][val];
  renderCurrentView();
}

function applyFilters() {
  searchQuery = document.getElementById('searchBox').value;
  renderCurrentView();
}

// ═══════════════════════════════════════════════════════════════════
// GANTT VIEW
// ═══════════════════════════════════════════════════════════════════
function renderGantt() {
  var container = document.getElementById('view-gantt');
  var totalWeeks = 46;

  // Header
  var html = '<div class="gantt-container"><div class="gantt">';
  html += '<div class="gantt-header"><div class="gantt-header-label">Module</div>';
  for (var w = 1; w <= totalWeeks; w++) {
    var isMonth = w === 1 || w === 5 || w === 9 || w === 13 || w === 18 || w === 22 || w === 26 || w === 31 || w === 35 || w === 39 || w === 44;
    html += '<div class="gantt-week' + (isMonth ? ' month-start' : '') + '">W' + w + '</div>';
  }
  html += '</div>';

  // Group by phase
  var phases = [{ id:0, label:'Live (Built)', color:'#00b894' }].concat(PHASES);
  phases.forEach(function(phase) {
    var mods = MODULES.filter(function(m) { return m.phase === phase.id && isModuleVisible(m); });
    if (mods.length === 0) return;

    // Phase header row
    html += '<div class="gantt-phase-row">';
    html += '<div class="gantt-phase-label"><span class="phase-dot" style="background:' + phase.color + '"></span>' + phase.label + ' <span style="color:var(--text3);font-weight:400;font-size:.6rem">(' + mods.length + ')</span></div>';
    html += '<div class="gantt-phase-bg"></div></div>';

    // Module rows
    mods.forEach(function(m) {
      var progress = getModuleProgress(m.id);
      var statusIcon = m.status === 'live' ? '\u2705' : m.status === 'wip' ? '\ud83d\udfe1' : '\u26aa';
      var complexityColor = m.complexity === 'S' ? 'var(--green)' : m.complexity === 'M' ? 'var(--gold)' : m.complexity === 'L' ? 'var(--orange)' : m.complexity === 'XL' ? 'var(--red)' : 'var(--text4)';

      html += '<div class="gantt-row" onclick="openDetail(\'' + m.id + '\')">';
      html += '<div class="gantt-module-label">';
      html += '<span class="status-icon">' + statusIcon + '</span>';
      if (m.complexity !== '-') html += '<span class="complexity-dot" style="background:' + complexityColor + '" title="' + m.complexity + '"></span>';
      if (m.path) {
        html += '<a href="' + m.path + '" onclick="event.stopPropagation()" style="color:var(--white);text-decoration:none;border-bottom:1px dotted var(--text3)">' + m.title + '</a>';
      } else {
        html += m.title;
      }
      if (m.status === 'wip' && m.path) html += ' <span style="font-size:.5rem;color:var(--gold);background:#fdcb6e15;padding:.1rem .25rem;border-radius:2px;margin-left:.25rem">BUILT</span>';
      html += '</div>';
      html += '<div class="gantt-timeline" style="position:relative">';

      // Gridlines
      for (var w = 1; w <= totalWeeks; w++) {
        var isMonth = w === 5 || w === 9 || w === 13 || w === 18 || w === 22 || w === 26 || w === 31 || w === 35 || w === 39 || w === 44;
        var left = ((w - 1) / totalWeeks * 100);
        html += '<div class="gantt-gridline' + (isMonth ? ' month' : '') + '" style="left:' + left + '%"></div>';
      }

      // Bar
      if (m.startWeek > 0) {
        var durationWeeks = Math.max(1, Math.ceil(m.daysEstimate / 5));
        var barLeft = ((m.startWeek - 1) / totalWeeks * 100);
        var barWidth = (durationWeeks / totalWeeks * 100);
        html += '<div class="gantt-bar status-' + m.status + '" style="left:' + barLeft + '%;width:' + barWidth + '%;background:' + phase.color + '" title="' + m.title + ' (W' + m.startWeek + '-W' + (m.startWeek + durationWeeks - 1) + ', ' + m.daysEstimate + 'd)">';
        if (progress > 0) html += '<div class="gantt-progress" style="width:' + progress + '%"></div>';
        html += '<span style="position:relative;z-index:2">' + (barWidth > 4 ? m.title : '') + '</span>';
        html += '</div>';
      } else if (m.status === 'live') {
        // Live modules — show as completed bars at week 0
        html += '<div class="gantt-bar status-live" style="left:0%;width:2%;background:var(--green);opacity:.8" title="' + m.title + ' (Live)">';
        html += '<div class="gantt-progress" style="width:100%"></div>';
        html += '</div>';
      }

      html += '</div></div>';
    });
  });

  html += '</div></div>';
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// BOARD VIEW
// ═══════════════════════════════════════════════════════════════════
function renderBoard() {
  var container = document.getElementById('view-board');
  var html = '<div class="board">';

  var phases = [{ id:0, label:'Live (Built)', color:'#00b894' }].concat(PHASES);
  phases.forEach(function(phase) {
    var mods = MODULES.filter(function(m) { return m.phase === phase.id && isModuleVisible(m); });
    if (mods.length === 0) return;

    html += '<div class="board-column">';
    html += '<div class="board-col-header"><div class="board-col-title"><span class="phase-dot" style="background:' + phase.color + '"></span>' + phase.label + '</div>';
    html += '<span class="board-col-count">' + mods.length + '</span></div>';
    html += '<div class="board-col-body">';

    mods.forEach(function(m) {
      var progress = getModuleProgress(m.id);
      html += '<div class="board-card" onclick="openDetail(\'' + m.id + '\')">';
      html += '<div class="board-card-top">';
      html += '<span class="badge badge-' + m.status + '">' + m.status + '</span>';
      if (m.complexity !== '-') html += '<span class="badge badge-' + m.complexity.toLowerCase() + '">' + m.complexity + '</span>';
      html += '</div>';
      html += '<div class="board-card-title">' + m.title + '</div>';
      html += '<div class="board-card-desc">' + m.desc + '</div>';
      if (progress > 0) {
        html += '<div style="margin-top:.3rem"><div class="progress-bar-bg" style="height:4px"><div class="progress-bar-fill" style="width:' + progress + '%;background:' + phase.color + '"></div></div></div>';
      }
      html += '<div class="board-card-meta">';
      if (m.daysEstimate > 0) html += '<span>' + m.daysEstimate + 'd</span>';
      if (m.startWeek > 0) html += '<span>W' + m.startWeek + '</span>';
      if (m.aiFeatures.length > 0) html += '<span>AI: ' + m.aiFeatures.length + '</span>';
      if (m.apiEndpoints.length > 0) html += '<span>API: ' + m.apiEndpoints.length + '</span>';
      html += '</div>';
      if (m.path) {
        html += '<a href="' + m.path + '" onclick="event.stopPropagation()" style="display:block;margin-top:.4rem;padding:.25rem .5rem;border-radius:4px;background:' + (m.status === 'live' ? '#00b89415' : '#fdcb6e15') + ';border:1px solid ' + (m.status === 'live' ? '#00b89430' : '#fdcb6e30') + ';color:' + (m.status === 'live' ? 'var(--green)' : 'var(--gold)') + ';text-decoration:none;font-size:.6rem;font-weight:600;text-align:center;transition:all .15s" onmouseover="this.style.opacity=\'1\'" onmouseout="this.style.opacity=\'.85\'">Open ' + m.title + ' &rarr;</a>';
      }
      html += '</div>';
    });

    html += '</div></div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// REGISTRY VIEW
// ═══════════════════════════════════════════════════════════════════
function renderRegistry() {
  var container = document.getElementById('view-registry');
  var visible = MODULES.filter(isModuleVisible);

  var html = '<div class="registry"><table class="registry-table"><thead><tr>';

    html += '<td>';
    if (m.path) {
      html += '<a href="' + m.path + '" onclick="event.stopPropagation()" style="color:var(--accent);text-decoration:none;font-size:.6rem" title="' + m.path + '">Open &rarr;</a>';
    } else {
      html += '<span style="color:var(--text4);font-size:.55rem">—</span>';
    }
    html += '</td>';
    html += '<td style="color:' + phaseColor + ';font-size:.6rem">' + m.phaseLabel + '</td>';
    html += '<td>' + (m.complexity !== '-' ? '<span class="badge badge-' + m.complexity.toLowerCase() + '">' + m.complexity + '</span>' : '-') + '</td>';
    html += '<td>' + (m.daysEstimate || '-') + '</td>';
    html += '<td>' + (m.startWeek > 0 ? 'W' + m.startWeek : '-') + '</td>';
    html += '<td style="font-size:.6rem">' + m.dbTables.length + '</td>';
    html += '<td style="font-size:.6rem">' + m.apiEndpoints.length + '</td>';
    html += '<td style="font-size:.6rem">' + m.aiFeatures.length + '</td>';

    html += '</tr>';
  });

  html += '</tbody></table></div>';

}

// ═══════════════════════════════════════════════════════════════════
// PROGRESS VIEW
// ═══════════════════════════════════════════════════════════════════
function renderProgress() {
  var container = document.getElementById('view-progress');

  // Overall progress
  var totalDays = MODULES.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
  var html = '<div class="progress-view">';
  html += '<div class="progress-overall">';
  html += '<div class="progress-overall-title">Overall Platform Progress</div>';
  html += '<div class="progress-overall-bar">';

  var allPhases = [{ id:0, label:'Live', color:'#00b894' }].concat(PHASES);
  allPhases.forEach(function(phase) {
    var phaseMods = MODULES.filter(function(m) { return m.phase === phase.id; });
    var phaseDays = phaseMods.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
    var phaseComplete = phaseMods.reduce(function(s, m) { return s + Math.round(m.daysEstimate * getModuleProgress(m.id) / 100); }, 0);
    var widthPct = totalDays > 0 ? (phaseDays / totalDays * 100) : 0;
    var fillPct = phaseDays > 0 ? (phaseComplete / phaseDays * 100) : 0;
    html += '<div class="progress-segment" style="width:' + widthPct + '%;background:' + phase.color + ';opacity:' + (fillPct > 0 ? '1' : '.25') + '" title="' + phase.label + ': ' + Math.round(fillPct) + '%"></div>';
  });

  html += '</div>';

  var completedMods = MODULES.filter(function(m) { return getModuleProgress(m.id) === 100; }).length;
  var inProgressMods = MODULES.filter(function(m) { var p = getModuleProgress(m.id); return p > 0 && p < 100; }).length;
  html += '<div class="progress-overall-stats">';
  html += '<div class="stat"><strong style="color:var(--green)">' + completedMods + '</strong> completed</div>';
  html += '<div class="stat"><strong style="color:var(--gold)">' + inProgressMods + '</strong> in progress</div>';
  html += '<div class="stat"><strong style="color:var(--blue)">' + (MODULES.length - completedMods - inProgressMods) + '</strong> remaining</div>';
  html += '</div></div>';

  // Per-phase progress cards
  html += '<div class="progress-grid">';
  allPhases.forEach(function(phase) {
    var phaseMods = MODULES.filter(function(m) { return m.phase === phase.id; });
    if (phaseMods.length === 0) return;
    var totalPhaseDays = phaseMods.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
    var completePhaseDays = phaseMods.reduce(function(s, m) { return s + Math.round(m.daysEstimate * getModuleProgress(m.id) / 100); }, 0);
    var phasePct = totalPhaseDays > 0 ? Math.round(completePhaseDays / totalPhaseDays * 100) : (phaseMods.every(function(m) { return m.status === 'live'; }) ? 100 : 0);
    var doneCount = phaseMods.filter(function(m) { return getModuleProgress(m.id) === 100 || m.status === 'live'; }).length;

    html += '<div class="progress-card">';
    html += '<div class="progress-card-title"><span class="phase-dot" style="background:' + phase.color + '"></span>' + phase.label + '</div>';
    html += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + phasePct + '%;background:' + phase.color + '"></div></div>';
    html += '<div class="progress-stats">';
    html += '<span><strong>' + phasePct + '%</strong></span>';
    html += '<span><strong>' + doneCount + '/' + phaseMods.length + '</strong> modules</span>';
    if (totalPhaseDays > 0) html += '<span><strong>' + totalPhaseDays + '</strong> est. days</span>';
    html += '</div>';

    // Module list within card
    html += '<div style="margin-top:.5rem;display:flex;flex-direction:column;gap:.2rem">';
    phaseMods.forEach(function(m) {
      var mp = getModuleProgress(m.id);
      var isLive = m.status === 'live';
      var isBuilt = m.status === 'wip' && m.path;
      html += '<div style="display:flex;align-items:center;gap:.35rem;font-size:.6rem;cursor:pointer;padding:.15rem 0" onclick="event.stopPropagation();openDetail(\'' + m.id + '\')">';
      html += '<div class="progress-bar-bg" style="height:3px;width:40px;flex-shrink:0"><div class="progress-bar-fill" style="width:' + (isLive ? 100 : mp) + '%;background:' + phase.color + '"></div></div>';
      if (m.path) {
        html += '<a href="' + m.path + '" onclick="event.stopPropagation()" style="color:' + (isLive || mp === 100 ? 'var(--green)' : mp > 0 ? 'var(--gold)' : 'var(--text3)') + ';text-decoration:none;border-bottom:1px dotted">' + m.title + '</a>';
      } else {
        html += '<span style="color:' + (isLive || mp === 100 ? 'var(--green)' : mp > 0 ? 'var(--gold)' : 'var(--text3)') + '">' + m.title + '</span>';
      }
      if (isBuilt) html += ' <span style="font-size:.45rem;color:var(--gold);background:#fdcb6e15;padding:.05rem .2rem;border-radius:2px">BUILT</span>';
      html += ' <span style="font-size:.5rem;color:var(--text4)">' + mp + '%</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// MODULE DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════
function openDetail(moduleId) {
  var m = getModuleById(moduleId);
  if (!m) return;

  var progress = getModuleProgress(m.id);
  var phaseColor = getPhaseColor(m.phase);
  var panel = document.getElementById('detailPanel');

  var html = '<div class="detail-header">';
  html += '<div class="detail-header-left">';
  html += '<div class="detail-id">' + m.id + ' &middot; Phase ' + m.phase + ' &middot; ' + m.phaseLabel + '</div>';
  html += '<div class="detail-title">' + m.title + '</div>';
  html += '<div class="detail-desc">' + m.desc + '</div>';
  html += '</div>';
  html += '<button class="detail-close" onclick="closeDetail()">&times;</button>';
  html += '</div>';

  // Open Page button for modules with a live path
  if (m.path) {
    html += '<a href="' + m.path + '" style="display:inline-flex;align-items:center;gap:.35rem;margin:.5rem 1rem 0;padding:.45rem .9rem;background:#6c5ce7;color:#fff;border-radius:6px;text-decoration:none;font-size:.75rem;font-weight:600;transition:all .15s" onmouseover="this.style.background=\'#7c6cf7\'" onmouseout="this.style.background=\'#6c5ce7\'">Open ' + m.title + ' &rarr;</a>';
  }

  html += '<div class="detail-body">';

  // Status & Meta
  html += '<div class="detail-section">';
  html += '<div class="detail-section-title">Overview</div>';
  html += '<div class="detail-meta">';
  html += '<div class="detail-meta-item"><div class="detail-meta-label">Status</div><div class="detail-meta-value"><span class="badge badge-' + m.status + '">' + m.status + '</span></div></div>';
  html += '<div class="detail-meta-item"><div class="detail-meta-label">Complexity</div><div class="detail-meta-value">' + (m.complexity !== '-' ? '<span class="badge badge-' + m.complexity.toLowerCase() + '">' + m.complexity + '</span>' : 'N/A') + '</div></div>';
  html += '<div class="detail-meta-item"><div class="detail-meta-label">Estimate</div><div class="detail-meta-value">' + (m.daysEstimate > 0 ? m.daysEstimate + ' days' : 'Built') + '</div></div>';
  html += '<div class="detail-meta-item"><div class="detail-meta-label">Start Week</div><div class="detail-meta-value">' + (m.startWeek > 0 ? 'W' + m.startWeek : 'Complete') + '</div></div>';
  html += '</div></div>';

  // Progress
  if (m.status !== 'live') {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Progress</div>';
    html += '<div class="detail-progress">';
    html += '<div class="detail-progress-header"><span style="font-size:.65rem;color:var(--text3)">Completion</span><span class="detail-progress-pct" id="progressPct">' + progress + '%</span></div>';
    html += '<input type="range" min="0" max="100" step="5" value="' + progress + '" oninput="updateProgress(\'' + m.id + '\', this.value)">';
    html += '</div>';
    html += '<div class="progress-bar-bg" style="margin-top:.35rem"><div class="progress-bar-fill" id="progressBar" style="width:' + progress + '%;background:' + phaseColor + '"></div></div>';
    html += '</div>';
  }

  // Roles
  html += '<div class="detail-section">';
  html += '<div class="detail-section-title">Roles</div>';
  html += '<div class="detail-tags">';
  m.roles.forEach(function(r) {
    html += '<span class="detail-tag" style="background:var(--accent-dim);color:var(--accent)">' + r + '</span>';
  });
  html += '</div></div>';

  // Dependencies
  if (m.dependencies.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Dependencies (' + m.dependencies.length + ')</div>';
    html += '<div class="detail-deps">';
    m.dependencies.forEach(function(depId) {
      var dep = getModuleById(depId);
      if (!dep) {
        html += '<div class="detail-dep"><span class="dep-status" style="background:var(--text4)"></span>' + depId + ' (external)</div>';
        return;
      }
      var depColor = dep.status === 'live' ? 'var(--green)' : dep.status === 'wip' ? 'var(--gold)' : 'var(--blue)';
      html += '<div class="detail-dep" onclick="event.stopPropagation();openDetail(\'' + dep.id + '\')"><span class="dep-status" style="background:' + depColor + '"></span>' + dep.title + ' <span class="badge badge-' + dep.status + '" style="margin-left:auto">' + dep.status + '</span></div>';
    });
    html += '</div></div>';
  }

  // Dependents (what depends on this)
  var dependents = MODULES.filter(function(other) { return other.dependencies.indexOf(m.id) !== -1; });
  if (dependents.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Unlocks (' + dependents.length + ')</div>';
    html += '<div class="detail-deps">';
    dependents.forEach(function(dep) {
      var depColor = dep.status === 'live' ? 'var(--green)' : dep.status === 'wip' ? 'var(--gold)' : 'var(--blue)';
      html += '<div class="detail-dep" onclick="event.stopPropagation();openDetail(\'' + dep.id + '\')"><span class="dep-status" style="background:' + depColor + '"></span>' + dep.title + ' <span style="color:var(--text4);font-size:.55rem;margin-left:auto">Phase ' + dep.phase + '</span></div>';
    });
    html += '</div></div>';
  }

  // Database Tables
  if (m.dbTables.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Database Tables (' + m.dbTables.length + ')</div>';
    html += '<ul class="detail-list">';
    m.dbTables.forEach(function(t) { html += '<li>' + t + '</li>'; });
    html += '</ul></div>';
  }

  // API Endpoints
  if (m.apiEndpoints.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">API Endpoints (' + m.apiEndpoints.length + ')</div>';
    html += '<ul class="detail-list">';
    m.apiEndpoints.forEach(function(e) {
      var parts = e.split(' ');
      var method = parts[0];
      var path = parts.slice(1).join(' ');
      var methodColor = method === 'GET' ? 'var(--green)' : method === 'POST' ? 'var(--blue)' : method === 'PUT' || method === 'PATCH' ? 'var(--gold)' : 'var(--red)';
      html += '<li><span style="color:' + methodColor + ';font-weight:700">' + method + '</span> ' + path + '</li>';
    });
    html += '</ul></div>';
  }

  // Frontend Pages
  if (m.frontendPages.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Frontend Pages</div>';
    html += '<ul class="detail-list">';
    m.frontendPages.forEach(function(p) { html += '<li>' + p + '</li>'; });
    html += '</ul></div>';
  }

  // AI Features
  if (m.aiFeatures.length > 0) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">AI Features (' + m.aiFeatures.length + ')</div>';
    html += '<div class="detail-tags">';
    m.aiFeatures.forEach(function(f) {
      html += '<span class="detail-tag" style="background:#6c5ce715;color:var(--accent)">' + f + '</span>';
    });
    html += '</div></div>';
  }

  // Agent Spec button (for non-live modules)
  if (m.status !== 'live') {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Agent Deployment</div>';
    html += '<div style="display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-bottom:.4rem">';
    html += '<div class="round-module-branch"><code>feature/' + m.id + '</code></div>';
    html += '</div>';
    html += '<button class="spec-copy-btn" style="width:100%;padding:.5rem;font-size:.7rem" onclick="event.stopPropagation();openSpec(\'' + m.id + '\')">Generate Agent Spec</button>';
    html += '</div>';
  }

  html += '</div>'; // detail-body
  panel.innerHTML = html;
  document.getElementById('detailOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function updateProgress(moduleId, value) {
  var pct = parseInt(value, 10);
  setModuleProgress(moduleId, pct);
  var pctEl = document.getElementById('progressPct');

// ═══════════════════════════════════════════════════════════════════
// ROUND CALCULATION — Topological sort by dependencies
// ═══════════════════════════════════════════════════════════════════
var ROUNDS = [];

function calculateRounds() {
  ROUNDS = [];
  var assigned = {};
  var AGENTS_PER_ROUND = 5;

  // Pre-Round 0: live modules WITHOUT a builtRound tag (the original 13)
  MODULES.forEach(function(m) {
    if (m.status === 'live' && !m.builtRound) assigned[m.id] = 0;
  });

  // Step 1: Insert completed rounds from builtRound data
  var maxCompleted = 0;
  MODULES.forEach(function(m) { if (m.builtRound && m.builtRound > maxCompleted) maxCompleted = m.builtRound; });

  for (var cr = 1; cr <= maxCompleted; cr++) {
    var completedBatch = MODULES.filter(function(m) { return m.builtRound === cr; });
    if (completedBatch.length === 0) continue;
    completedBatch.forEach(function(m) { assigned[m.id] = cr; });
    var cTotalDays = completedBatch.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
    var cMaxDays = Math.max.apply(null, completedBatch.map(function(m) { return m.daysEstimate; }));
    ROUNDS.push({
      number: cr,
      modules: completedBatch,
      totalDays: cTotalDays,
      parallelDays: cMaxDays,
      agentCount: completedBatch.length,
      completed: true
    });
  }

  // Step 2: Compute future rounds from dependency graph
  var nextRound = maxCompleted + 1;
  for (var r = nextRound; r <= 30 + nextRound; r++) {
    var eligible = MODULES.filter(function(m) {
      if (assigned[m.id] !== undefined) return false;
      if (m.status === 'live') return false;
      return m.dependencies.every(function(depId) {
        return assigned[depId] !== undefined;
      });
    });

    if (eligible.length === 0) break;

    eligible.sort(function(a, b) {
      if (a.phase !== b.phase) return a.phase - b.phase;
      var aDeps = MODULES.filter(function(m) { return m.dependencies.indexOf(a.id) !== -1; }).length;
      var bDeps = MODULES.filter(function(m) { return m.dependencies.indexOf(b.id) !== -1; }).length;
      return bDeps - aDeps;
    });

    var batch = eligible.slice(0, AGENTS_PER_ROUND);
    batch.forEach(function(m) { assigned[m.id] = r; });

    var totalDays = batch.reduce(function(s, m) { return s + m.daysEstimate; }, 0);
    var maxDays = Math.max.apply(null, batch.map(function(m) { return m.daysEstimate; }));
    ROUNDS.push({
      number: r,
      modules: batch,
      totalDays: totalDays,
      parallelDays: maxDays,
      agentCount: batch.length,
      completed: false
    });
  }

  // Assign round number to each module for lookup
  MODULES.forEach(function(m) {
    m._round = assigned[m.id] || 0;
  });

  return ROUNDS;
}

function getModuleRound(id) {
  var m = getModuleById(id);
  return m ? (m._round || 0) : 0;
}

// ═══════════════════════════════════════════════════════════════════
// ROUNDS VIEW
// ═══════════════════════════════════════════════════════════════════
function renderRounds() {
  var container = document.getElementById('view-rounds');
  calculateRounds();

  var totalParallelDays = ROUNDS.reduce(function(s, r) { return s + r.parallelDays; }, 0);
  var totalSequentialDays = ROUNDS.reduce(function(s, r) { return s + r.totalDays; }, 0);

  var html = '<div class="rounds-view">';

  // Info card
  html += '<div class="rounds-info">';
  html += '<div class="rounds-info-title">Multi-Agent Build Strategy</div>';
  html += '<div class="rounds-info-desc">';
  html += 'Deploy up to <strong style="color:var(--accent)">5 agents in parallel</strong> per round, each on its own git branch. ';
  html += 'You act as tech lead — write specs, review output, merge to main.<br><br>';
  html += '<strong style="color:var(--white)">' + ROUNDS.length + ' rounds</strong> total &middot; ';
  html += '<strong style="color:var(--green)">' + totalParallelDays + ' days</strong> parallel (wall clock) vs ';
  html += '<strong style="color:var(--text3)">' + totalSequentialDays + ' days</strong> sequential &middot; ';
  html += '<strong style="color:var(--gold)">' + Math.round((1 - totalParallelDays / totalSequentialDays) * 100) + '% faster</strong> with agents';
  html += '</div></div>';

  // Round cards
  ROUNDS.forEach(function(round) {
    var phaseColors = {};
    round.modules.forEach(function(m) { phaseColors[m.phase] = getPhaseColor(m.phase); });
    var colorList = Object.keys(phaseColors).map(function(k) { return phaseColors[k]; });

    html += '<div class="round-card">';
    // Check if all modules in this round are built
    var roundBuilt = round.modules.filter(function(m) { return m.status === 'live' || (m.status === 'wip' && m.path); }).length;
    var roundDone = roundBuilt === round.modules.length;
    var roundPct = round.modules.length > 0 ? Math.round(roundBuilt / round.modules.length * 100) : 0;

    html += '<div class="round-header" style="' + (roundDone ? 'background:#00b89410;border-bottom:1px solid #00b89430' : '') + '">';
    html += '<div class="round-title">';
    html += '<span class="round-num" style="' + (roundDone ? 'background:var(--green)' : '') + '">R' + round.number + '</span> Round ' + round.number;
    if (roundDone) html += ' <span style="font-size:.6rem;color:var(--green);background:#00b89415;padding:.15rem .4rem;border-radius:3px;margin-left:.4rem;font-weight:700">COMPLETE</span>';
    else if (roundBuilt > 0) html += ' <span style="font-size:.6rem;color:var(--gold);background:#fdcb6e15;padding:.15rem .4rem;border-radius:3px;margin-left:.4rem;font-weight:700">' + roundBuilt + '/' + round.modules.length + ' BUILT</span>';
    html += '</div>';
    html += '<div class="round-meta">';
    html += '<span><strong style="color:var(--white)">' + round.agentCount + '</strong> agents</span>';
    html += '<span><strong style="color:var(--green)">' + round.parallelDays + 'd</strong> wall clock</span>';
    html += '<span>' + round.totalDays + 'd total effort</span>';
    if (roundPct > 0) html += '<span style="color:' + (roundDone ? 'var(--green)' : 'var(--gold)') + ';font-weight:700">' + roundPct + '%</span>';
    if (!roundDone) {
      html += '<button id="prepBtn' + round.number + '" class="spec-copy-btn" style="padding:.25rem .6rem;font-size:.6rem;background:var(--accent-dim);border-color:var(--accent);color:var(--accent)" onclick="event.stopPropagation();prepareRound(' + round.number + ')">Prepare Worktrees</button>';
    }
    html += '</div></div>';

    html += '<div class="round-body">';
    round.modules.forEach(function(m, idx) {
      var phaseColor = getPhaseColor(m.phase);
      var progress = getModuleProgress(m.id);
      html += '<div class="round-module" onclick="openDetail(\'' + m.id + '\')" style="border-top:2px solid ' + phaseColor + '">';
      html += '<div class="round-module-top">';
      html += '<span class="badge badge-' + m.complexity.toLowerCase() + '">' + m.complexity + '</span>';
      html += '<span style="font-size:.55rem;color:' + phaseColor + '">' + m.phaseLabel + '</span>';
      html += '</div>';
      html += '<div class="round-module-title">' + m.title + '</div>';
      html += '<div class="round-module-desc">' + m.desc + '</div>';
      html += '<div class="round-module-branch"><span style="color:var(--text4)">Agent ' + (idx + 1) + ':</span> <code>feature/' + m.id + '</code></div>';
      var isBuilt = m.status === 'live' || (m.status === 'wip' && m.path);
      html += '<div class="round-module-stats">';
      html += '<span>' + m.daysEstimate + 'd</span>';
      html += '<span>API: ' + m.apiEndpoints.length + '</span>';
      html += '<span>AI: ' + m.aiFeatures.length + '</span>';
      html += '<span>Tables: ' + m.dbTables.length + '</span>';
      html += '</div>';
      if (progress > 0) {
        html += '<div style="margin-top:.3rem"><div class="progress-bar-bg" style="height:3px"><div class="progress-bar-fill" style="width:' + progress + '%;background:' + phaseColor + '"></div></div></div>';
      }
      if (isBuilt && m.path) {
        html += '<a href="' + m.path + '" onclick="event.stopPropagation()" style="display:block;width:100%;margin-top:.4rem;padding:.3rem;font-size:.6rem;text-align:center;border-radius:4px;background:#00b89415;border:1px solid #00b89430;color:var(--green);text-decoration:none;font-weight:600;transition:all .15s" onmouseover="this.style.background=\'#00b89425\'" onmouseout="this.style.background=\'#00b89415\'">Open ' + m.title + ' &rarr;</a>';
      } else {
        html += '<button class="spec-copy-btn" style="width:100%;margin-top:.4rem;padding:.3rem;font-size:.6rem" onclick="event.stopPropagation();openSpec(\'' + m.id + '\')">Copy Agent Spec</button>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });

  // Merge checklist
  html += '<div class="rounds-info" style="margin-top:1rem">';
  html += '<div class="rounds-info-title">Merge Checklist (per round)</div>';
  html += '<div class="rounds-info-desc" style="font-family:\'JetBrains Mono\',monospace;font-size:.6rem">';
  html += '1. Each agent delivers on its feature branch<br>';
  html += '2. Review: no conflicts with main, auth/role checks correct<br>';
  html += '3. Verify: new routes don\'t clash, shared code untouched<br>';
  html += '4. Merge to main one branch at a time<br>';
  html += '5. Add CREATE TABLE to server/routes/admin.js<br>';
  html += '6. Wire new service + mount routes in server/index.js<br>';
  html += '7. Test each module independently, then integration<br>';
  html += '8. Update module status in project board';
  html += '</div></div>';

  html += '</div>';
  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// AGENT SPEC GENERATOR
// ═══════════════════════════════════════════════════════════════════
function getWorktreePath(moduleId) {
  return '.claude/worktrees/' + moduleId;
}

function getLaunchCommand(moduleId) {
  return 'cd ' + getWorktreePath(moduleId) + ' && claude "Read AGENT_SPEC.md and build everything specified. Start by reading the reference files."';
}

function generateAgentSpec(moduleId) {
  var m = getModuleById(moduleId);
  if (!m) return '';

  var deps = m.dependencies.map(function(depId) {
    var dep = getModuleById(depId);
    return dep ? dep.title + ' (' + dep.status + ')' : depId;
  });

  var spec = '';
  spec += '# Module: ' + m.title + '\n';
  spec += '# Branch: feature/' + m.id + '\n';
  spec += '# Worktree: ' + getWorktreePath(m.id) + '\n';
  spec += '# Phase: ' + m.phase + ' — ' + m.phaseLabel + '\n';
  spec += '# Complexity: ' + m.complexity + ' (' + m.daysEstimate + ' days)\n';
  spec += '\n';
  spec += '## Launch\n';
  spec += '```\n' + getLaunchCommand(m.id) + '\n```\n';
  spec += '\n';
  spec += '## What to build\n';
  spec += m.desc + '\n';
  spec += '\n';
  spec += '## Files to create\n';
  m.frontendPages.forEach(function(p) { spec += '- ' + p + ' (frontend page)\n'; });
  spec += '- server/services/' + m.id + '.service.js (service layer)\n';
  spec += '- server/routes/' + m.id + '.js (API routes)\n';
  spec += '\n';

  if (m.dbTables.length > 0) {
    spec += '## Database Tables\n';
    spec += 'Add to server/routes/admin.js:\n';
    m.dbTables.forEach(function(t) { spec += '- CREATE TABLE IF NOT EXISTS ' + t + ' (...)\n'; });
    spec += '\n';
  }

  if (m.apiEndpoints.length > 0) {
    spec += '## API Endpoints\n';
    m.apiEndpoints.forEach(function(e) { spec += '- ' + e + '\n'; });
    spec += '\n';
  }

  spec += '## Role Access\n';
  spec += m.roles.join(', ') + '\n';
  spec += '\n';

  if (m.aiFeatures.length > 0) {
    spec += '## AI Features\n';
    m.aiFeatures.forEach(function(f) { spec += '- ' + f + '\n'; });
    spec += '\n';
  }

  if (deps.length > 0) {
    spec += '## Dependencies\n';
    deps.forEach(function(d) { spec += '- ' + d + '\n'; });
    spec += '\n';
  }

  spec += '## Reference Pages (copy patterns from)\n';
  spec += '- docs/qa/deviations.html (layout — split panel with list + detail)\n';
  spec += '- server/services/deviation-mgr.service.js (service factory with AI)\n';
  spec += '- server/routes/deviation-mgr.js (route pattern with auth guards)\n';
  spec += '- server/lib/ids.js (add ID generator, e.g. ' + m.id.replace(/-.*/, '') + 'Id())\n';
  spec += '- server/lib/audit.js (use auditLog for all mutations)\n';
  spec += '\n';
  spec += '## Architecture Rules\n';
  spec += '- DO NOT modify existing files except:\n';
  spec += '  - server/routes/admin.js (add CREATE TABLE)\n';
  spec += '  - server/index.js (wire service + mount routes + PAGE_MAP)\n';
  spec += '  - server/lib/ids.js (add ID generator)\n';
  spec += '- Follow the service factory pattern: module.exports = { make___Service }\n';
  spec += '- Use requireAuth and requireRole() middleware on all routes\n';
  spec += '- Use auditLog() for all create/update/delete operations\n';
  spec += '- Frontend: include shared/styles.css, shared/nav.js, shared/i18n.js, shared/dev-progress.js\n';
  spec += '- Frontend: use authFetch() for all API calls\n';
  spec += '- Frontend: follow dark theme (--bg, --surface, --accent CSS vars)\n';
  spec += '- Frontend: split-panel layout (list left, detail right)\n';
  spec += '- No frameworks — vanilla HTML/CSS/JS only\n';
  spec += '- 21 CFR Part 11 compliant: immutable audit trail, e-signatures where needed\n';

  return spec;
}

var _currentSpecModuleId = null;

function openSpec(moduleId) {
  _currentSpecModuleId = moduleId;
  var spec = generateAgentSpec(moduleId);
  var m = getModuleById(moduleId);
  var cmd = getLaunchCommand(moduleId);
  document.getElementById('specTitle').textContent = 'Agent Spec — ' + m.title;
  document.getElementById('specLaunchBar').innerHTML =
    '<span style="color:var(--text3)">$</span> ' + cmd;
  document.getElementById('specContent').textContent = spec;
  document.getElementById('specOverlay').classList.add('active');
}

function closeSpec() {
  document.getElementById('specOverlay').classList.remove('active');
  _currentSpecModuleId = null;
}

function flashBtn(btn, msg) {
  var orig = btn.textContent;
  var origBg = btn.style.background;
  var origColor = btn.style.color;
  var origBorder = btn.style.borderColor;
  btn.textContent = msg || 'Copied!';
  btn.style.background = 'var(--green)';
  btn.style.color = '#000';
  btn.style.borderColor = 'var(--green)';
  setTimeout(function() {
    btn.textContent = orig;
    btn.style.background = origBg;
    btn.style.color = origColor;
    btn.style.borderColor = origBorder;
  }, 1500);
}

function copySpec() {
  var text = document.getElementById('specContent').textContent;
  navigator.clipboard.writeText(text).then(function() {
    flashBtn(document.querySelectorAll('.spec-modal-actions .spec-copy-btn')[2]);
  });
}

function copyLaunch() {
  if (!_currentSpecModuleId) return;
  var cmd = getLaunchCommand(_currentSpecModuleId);
  navigator.clipboard.writeText(cmd).then(function() {
    flashBtn(document.getElementById('btnCopyLaunch'), 'Copied!');
  });
}

function copyWorktreePath() {
  if (!_currentSpecModuleId) return;
  var p = getWorktreePath(_currentSpecModuleId);
  navigator.clipboard.writeText(p).then(function() {
    flashBtn(document.getElementById('btnCopyPath'), 'Copied!');
  });
}

// ═══════════════════════════════════════════════════════════════════
// PREPARE ROUND — Create worktrees + AGENT_SPEC.md via server API
// ═══════════════════════════════════════════════════════════════════
function prepareRound(roundNumber) {
  var round = ROUNDS.find(function(r) { return r.number === roundNumber; });
  if (!round) return;

  var btn = document.getElementById('prepBtn' + roundNumber);
  if (!btn) return;
  btn.textContent = 'Preparing...';
  btn.style.opacity = '.6';
  btn.disabled = true;

  // Build payload: module id + generated spec for each
  var payload = round.modules.map(function(m) {
    return { id: m.id, spec: generateAgentSpec(m.id) };
  });

  authFetch('/admin/prepare-round', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ modules: payload })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      btn.textContent = 'Ready!';
      btn.style.background = 'var(--green)';
      btn.style.color = '#000';
      btn.style.borderColor = 'var(--green)';
      btn.style.opacity = '1';

      // Show results summary
      var created = data.results.filter(function(r) { return r.status === 'created'; }).length;
      var exists = data.results.filter(function(r) { return r.status === 'exists'; }).length;
      var errors = data.results.filter(function(r) { return r.status === 'error'; }).length;
      var msg = created + ' created';
      if (exists > 0) msg += ', ' + exists + ' existed';
      if (errors > 0) msg += ', ' + errors + ' failed';
      btn.title = msg;

      setTimeout(function() {
        btn.textContent = 'Worktrees Ready';
        btn.disabled = false;
      }, 2000);
    } else {
      btn.textContent = 'Error';
      btn.style.background = 'var(--red)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--red)';
      btn.style.opacity = '1';
      btn.title = data.error || 'Unknown error';
      setTimeout(function() {
        btn.textContent = 'Prepare Worktrees';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.disabled = false;
      }, 3000);
    }
  })
  .catch(function(err) {
    btn.textContent = 'Error';
    btn.style.background = 'var(--red)';
    btn.style.color = '#fff';
    btn.style.opacity = '1';
    btn.title = err.message;
    setTimeout(function() {
      btn.textContent = 'Prepare Worktrees';
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.disabled = false;
    }, 3000);
  });
}

// ═══════════════════════════════════════════════════════════════════
// VIEW SWITCHING
// ═══════════════════════════════════════════════════════════════════
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.view === view); });
  document.querySelectorAll('.view').forEach(function(v) { v.classList.toggle('active', v.id === 'view-' + view); });
  renderCurrentView();
}

function renderCurrentView() {
  if (currentView === 'gantt') renderGantt();
  else if (currentView === 'board') renderBoard();
  else if (currentView === 'registry') renderRegistry();
  else if (currentView === 'progress') renderProgress();
  else if (currentView === 'rounds') renderRounds();
  renderStats();
}

document.getElementById('viewTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.view-tab');
  if (tab) switchView(tab.dataset.view);
});

// Keyboard shortcut: Escape closes detail/spec
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeDetail(); closeSpec(); }
});

// ═══════════════════════════════════════════════════════════════════
// INIT — Mark live modules as 100% complete
// ═══════════════════════════════════════════════════════════════════
(function init() {
  MODULES.forEach(function(m) {
    if (m.status === 'live') setModuleProgress(m.id, 100);
  });
  renderPhaseLegend();
  renderCurrentView();
})();
