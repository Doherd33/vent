<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Media & Buffer Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/styles.css">
<style>
body {
  height: 100vh;
  display: grid;
  grid-template-rows: 42px 1fr 22px;
  overflow: hidden;
}

/* ── WORKBENCH ── */
.workbench {
  display: grid;
  grid-template-columns: 280px 4px 1fr;
  grid-template-rows: 1fr;
  overflow: hidden;
}

/* ── RESIZE HANDLE ── */
.resizer {
  background: var(--border);
  z-index: 10;
  transition: background 0.15s;
  cursor: col-resize;
}
.resizer:hover, .resizer.dragging { background: var(--accent); }
.resizer::after {
  content: '';
  position: absolute;
  inset: 0;
  left: -4px; right: -4px;
}

/* ── LEFT PANEL ── */
.left-panel {
  grid-column: 1; grid-row: 1;
  background: var(--s1);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 8px 12px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: #bbbbbb; background: var(--s2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; padding: 1px 7px;
  border-radius: 10px; font-weight: 700;
}
.filter-bar {
  padding: 6px 8px; display: flex; gap: 4px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.filter-btn {
  padding: 3px 10px; border-radius: 2px;
  border: 1px solid var(--border); background: transparent;
  color: var(--mid); font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); border-color: var(--borderhi); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.record-list { flex: 1; overflow-y: auto; padding: 4px; }
.record-list::-webkit-scrollbar { width: 4px; }
.record-list::-webkit-scrollbar-thumb { background: #424242; border-radius: 2px; }

.rec-card {
  padding: 8px 10px; border-radius: 2px; margin-bottom: 1px;
  cursor: pointer; transition: background 0.1s;
  border-left: 2px solid transparent;
}
.rec-card:hover { background: #2a2d2e; }
.rec-card.active { background: #094771; border-left-color: var(--accent); }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.card-id { font-size: 10px; font-weight: 600; color: #9cdcfe; font-family: 'JetBrains Mono', monospace; }
.type-badge { font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.type-media  { background: rgba(78,201,176,0.15); color: var(--green); border: 1px solid rgba(78,201,176,0.3); }
.type-buffer { background: rgba(0,122,204,0.15); color: var(--accent); border: 1px solid rgba(0,122,204,0.3); }
.type-feed   { background: rgba(255,198,77,0.15); color: var(--gold); border: 1px solid rgba(255,198,77,0.3); }
.card-title { font-size: 11px; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
.card-meta  { font-size: 10px; color: var(--dim); }

.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.status-draft      { background: var(--mid); }
.status-in_progress { background: var(--gold); }
.status-review     { background: var(--accent); }
.status-approved   { background: var(--green); }
.status-rejected   { background: var(--red); }

.new-record-btn {
  margin: 8px; padding: 7px 0; border-radius: 3px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--mid); font-size: 11px; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.new-record-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── RIGHT PANEL (Detail) ── */
.right-panel {
  grid-column: 3; grid-row: 1;
  display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
}
.detail-header {
  padding: 10px 20px; background: var(--s2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.detail-header h2 { font-size: 14px; font-weight: 500; color: var(--text); margin: 0; }
.detail-actions { display: flex; gap: 6px; }
.action-btn {
  padding: 5px 12px; border-radius: 3px; border: 1px solid var(--border);
  background: transparent; color: var(--text); font-size: 11px;
  cursor: pointer; transition: all 0.15s;
}
.action-btn:hover { border-color: var(--borderhi); background: var(--s3); }
.action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.primary:hover { background: hsl(var(--hue), 100%, 35%); }
.action-btn.danger { color: var(--red); border-color: rgba(244,71,71,0.4); }
.action-btn.danger:hover { background: rgba(244,71,71,0.1); }

.detail-content {
  flex: 1; overflow-y: auto; padding: 20px 24px;
}
.detail-content::-webkit-scrollbar { width: 6px; }
.detail-content::-webkit-scrollbar-track { background: var(--bg); }
.detail-content::-webkit-scrollbar-thumb { background: #424242; border-radius: 3px; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; user-select: none; }
.empty-state .ei { font-size: 36px; }
.empty-state p { font-size: 13px; color: var(--dim); }

/* ── FORM STYLES ── */
.section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: #6c6c6c; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid var(--s2);
}
.form-section { margin-bottom: 20px; }
.form-row { display: flex; gap: 12px; margin-bottom: 10px; }
.form-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--mid); }
.form-group input, .form-group select, .form-group textarea {
  padding: 6px 10px; border-radius: 3px; border: 1px solid var(--border);
  background: var(--s1); color: var(--text); font-size: 12px;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 60px; }

/* ── COMPONENT TABLE ── */
.comp-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
.comp-table th {
  text-align: left; padding: 6px 8px; background: var(--s2);
  border-bottom: 1px solid var(--border); color: var(--mid);
  font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
}
.comp-table td {
  padding: 5px 8px; border-bottom: 1px solid var(--s2); color: var(--text);
}
.comp-table input {
  width: 100%; padding: 4px 6px; border: 1px solid var(--border);
  background: var(--s1); color: var(--text); border-radius: 2px; font-size: 11px;
}
.comp-table input:focus { outline: none; border-color: var(--accent); }
.comp-verified { color: var(--green); font-weight: 600; }
.comp-pending  { color: var(--mid); }
.add-comp-btn {
  margin-top: 6px; padding: 4px 10px; border: 1px dashed var(--border);
  background: transparent; color: var(--mid); font-size: 11px;
  border-radius: 2px; cursor: pointer; transition: all 0.15s;
}
.add-comp-btn:hover { border-color: var(--accent); color: var(--accent); }
.remove-comp { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 2px; }
.remove-comp:hover { color: var(--red); background: rgba(244,71,71,0.1); }

/* ── pH SECTION ── */
.ph-indicator {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 11px; font-weight: 600;
}
.ph-ok      { background: rgba(78,201,176,0.15); color: var(--green); }
.ph-warning { background: rgba(255,198,77,0.15); color: var(--gold); }
.ph-danger  { background: rgba(244,71,71,0.15); color: var(--red); }

/* ── HOLD TIME ── */
.hold-bar {
  height: 6px; border-radius: 3px; background: var(--s3); margin-top: 6px; overflow: hidden;
}
.hold-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.hold-ok      .hold-fill { background: var(--green); }
.hold-warning .hold-fill { background: var(--gold); }
.hold-expired .hold-fill { background: var(--red); width: 100% !important; }
.hold-label { font-size: 10px; color: var(--mid); margin-top: 4px; }

/* ── AI ANALYSIS CARD ── */
.ai-card {
  border: 1px solid var(--border); border-radius: 4px;
  padding: 12px 16px; margin-top: 10px; background: var(--s1);
}
.ai-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ai-badge {
  font-size: 9px; padding: 2px 8px; border-radius: 3px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.ai-compliant     { background: rgba(78,201,176,0.15); color: var(--green); border: 1px solid rgba(78,201,176,0.3); }
.ai-non-compliant { background: rgba(244,71,71,0.15); color: var(--red); border: 1px solid rgba(244,71,71,0.3); }
.ai-finding {
  padding: 6px 10px; margin-bottom: 4px; border-radius: 3px;
  font-size: 11px; border-left: 3px solid var(--border);
}
.ai-finding.critical { border-left-color: var(--red); background: rgba(244,71,71,0.05); }
.ai-finding.warning  { border-left-color: var(--gold); background: rgba(255,198,77,0.05); }
.ai-finding.info     { border-left-color: var(--accent); background: rgba(0,122,204,0.05); }
.ai-finding-cat { font-weight: 600; color: var(--text); }
.ai-finding-text { color: var(--mid); margin-top: 2px; }

/* ── E-SIGNATURE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--s1); border: 1px solid var(--border); border-radius: 6px;
  padding: 24px; width: 380px; max-width: 90vw;
}
.modal h3 { font-size: 14px; color: var(--text); margin: 0 0 16px 0; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── STATUS BAR ── */
.status-bar {
  background: var(--accent); color: #fff; font-size: 11px;
  padding: 0 16px; display: flex; align-items: center; gap: 16px;
  border-top: 1px solid var(--border);
}
.status-bar .sep { color: rgba(255,255,255,0.4); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .workbench { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .left-panel { max-height: 35vh; border-right: none; border-bottom: 1px solid var(--border); }
  .resizer { display: none; }
}
</style>
</head>
<body>

<!-- ══════════ TITLE BAR ══════════ -->
<div class="title-bar">
  <div style="display:flex;align-items:center;gap:12px">
    <a class="app-name" href="hub.html">Vent</a>
    <nav class="title-nav" id="mainNav">
      <a class="nav-tab" href="query.html"    data-nav-key="Charlie AI">Charlie AI</a>
      <a class="nav-tab" href="submit.html"   data-nav-key="My Activity">My Activity</a>
      <a class="nav-tab" href="builder.html"  data-nav-key="Doc Builder">Doc Builder</a>
      <a class="nav-tab" href="qa.html"       data-nav-key="QA Centre">QA Centre</a>
      <a class="nav-tab" href="dashboard.html" data-nav-key="Analytics">Analytics</a>
      <a class="nav-tab" href="feedback.html" data-nav-key="Feedback">Feedback</a>
    </nav>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="role-badge" id="roleBadge">operator</span>
    <span style="font-size:12px;color:var(--mid)" id="titleUser"></span>
    <button onclick="ventSignOut()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px">Sign out</button>
  </div>
</div>

<!-- ══════════ WORKBENCH ══════════ -->
<div class="workbench" id="workbench">

  <!-- ── LEFT PANEL: Record List ── -->
  <div class="left-panel">
    <div class="panel-header">
      <span>Media & Buffer Prep <span class="panel-badge" id="recCount">0</span></span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="media">Media</button>
      <button class="filter-btn" data-filter="buffer">Buffer</button>
      <button class="filter-btn" data-filter="feed">Feed</button>
    </div>
    <div class="record-list" id="recList"></div>
    <button class="new-record-btn" id="newRecBtn">+ New Preparation</button>
  </div>

  <!-- ── RESIZER ── -->
  <div class="resizer" id="resizer"></div>

  <!-- ── RIGHT PANEL: Detail / Form ── -->
  <div class="right-panel" id="rightPanel">
    <div id="detailView">
      <div class="empty-state" id="emptyState">
        <div class="ei">&#9878;</div>
        <p>Select a record or create a new preparation</p>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ STATUS BAR ══════════ -->
<div class="status-bar">
  <span>Media & Buffer Prep</span>
  <span class="sep">|</span>
  <span id="statusText">Ready</span>
  <span class="sep">|</span>
  <span id="holdStatus">Hold times OK</span>
</div>

<!-- ══════════ E-SIGNATURE MODAL ══════════ -->
<div class="modal-overlay" id="esigModal">
  <div class="modal">
    <h3>Electronic Signature</h3>
    <div class="form-group" style="margin-bottom:10px">
      <label>Reason for sign-off</label>
      <input type="text" id="esigReason" placeholder="e.g. Verified preparation complete">
    </div>
    <div class="form-group" style="margin-bottom:10px">
      <label>Password</label>
      <input type="password" id="esigPassword" placeholder="Enter your password">
    </div>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeEsig()">Cancel</button>
      <button class="action-btn primary" onclick="submitEsig()">Sign</button>
    </div>
  </div>
</div>

<!-- ══════════ SCRIPTS ══════════ -->
<script src="shared/i18n.js"></script>
<script src="shared/nav.js"></script>
<script>
(function() {
  'use strict';

  var SERVER = window.SERVER || window.location.origin;
  var records = [];
  var activeId = null;
  var activeFilter = 'all';

  // ── Elements ──
  var recList   = document.getElementById('recList');
  var recCount  = document.getElementById('recCount');
  var detailView = document.getElementById('detailView');
  var emptyState = document.getElementById('emptyState');
  var statusText = document.getElementById('statusText');
  var holdStatusEl = document.getElementById('holdStatus');

  // ── Load records ──
  async function loadRecords() {
    statusText.textContent = 'Loading...';
    try {
      var url = SERVER + '/media-prep';
      if (activeFilter !== 'all') url += '?type=' + activeFilter;
      var res = await authFetch(url, {});
      if (!res.ok) throw new Error('Failed to load');
      records = await res.json();
      renderList();
      statusText.textContent = records.length + ' record(s)';
    } catch (e) {
      statusText.textContent = 'Error loading records';
      console.error(e);
    }
  }

  // ── Render list ──
  function renderList() {
    recCount.textContent = records.length;
    if (!records.length) {
      recList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--dim);font-size:12px">No records yet</div>';
      return;
    }
    recList.innerHTML = records.map(function(r) {
      var typeClass = 'type-' + (r.recipe_type || 'media');
      var isActive = r.record_id === activeId ? ' active' : '';
      var date = r.created_at ? new Date(r.created_at).toLocaleDateString() : '';
      return '<div class="rec-card' + isActive + '" data-id="' + r.record_id + '">' +
        '<div class="card-top">' +
          '<span class="card-id">' + r.record_id + '</span>' +
          '<span class="type-badge ' + typeClass + '">' + (r.recipe_type || 'media') + '</span>' +
        '</div>' +
        '<div class="card-title">' + escHtml(r.recipe_name) + '</div>' +
        '<div class="card-meta"><span class="status-dot status-' + (r.status || 'draft') + '"></span>' + (r.status || 'draft') + ' &middot; ' + date + '</div>' +
      '</div>';
    }).join('');

    recList.querySelectorAll('.rec-card').forEach(function(el) {
      el.addEventListener('click', function() {
        activeId = el.dataset.id;
        renderList();
        loadDetail(activeId);
      });
    });
  }

  // ── Load detail ──
  async function loadDetail(id) {
    statusText.textContent = 'Loading ' + id + '...';
    try {
      var res = await authFetch(SERVER + '/media-prep/' + id, {});
      if (!res.ok) throw new Error('Not found');
      var rec = await res.json();
      renderDetail(rec);
      statusText.textContent = id;
    } catch (e) {
      detailView.innerHTML = '<div class="empty-state"><p>Error loading record</p></div>';
      statusText.textContent = 'Error';
    }
  }

  // ── Render detail ──
  function renderDetail(rec) {
    var components = rec.components || [];
    var holdPct = calcHoldPct(rec);
    var holdClass = holdPct >= 100 ? 'hold-expired' : holdPct >= 75 ? 'hold-warning' : 'hold-ok';
    var holdLabel = calcHoldLabel(rec);

    var html = '<div class="detail-header">' +
      '<h2>' + escHtml(rec.recipe_name) + ' <span style="color:var(--mid);font-size:12px">' + rec.record_id + '</span></h2>' +
      '<div class="detail-actions">' +
        (rec.status === 'draft' || rec.status === 'in_progress'
          ? '<button class="action-btn primary" onclick="runAiVerify(\'' + rec.record_id + '\')">AI Verify</button>' +
            '<button class="action-btn" onclick="changeStatus(\'' + rec.record_id + '\', \'review\')">Submit for Review</button>'
          : '') +
        (rec.status === 'review'
          ? '<button class="action-btn primary" onclick="openEsig(\'' + rec.record_id + '\')">Approve (e-Sign)</button>' +
            '<button class="action-btn danger" onclick="changeStatus(\'' + rec.record_id + '\', \'rejected\')">Reject</button>'
          : '') +
      '</div>' +
    '</div>' +
    '<div class="detail-content">';

    // ── Info section
    html += '<div class="form-section">' +
      '<div class="section-label">Preparation Details</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>Type</label><div style="font-size:12px;color:var(--text)">' + (rec.recipe_type || 'media') + '</div></div>' +
        '<div class="form-group"><label>Status</label><div style="font-size:12px"><span class="status-dot status-' + (rec.status || 'draft') + '"></span>' + (rec.status || 'draft') + '</div></div>' +
        '<div class="form-group"><label>Batch ID</label><div style="font-size:12px;color:var(--text)">' + (rec.batch_id || 'N/A') + '</div></div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>Volume</label><div style="font-size:12px;color:var(--text)">' + (rec.volume_litres ? rec.volume_litres + ' L' : 'N/A') + '</div></div>' +
        '<div class="form-group"><label>Temperature</label><div style="font-size:12px;color:var(--text)">' + (rec.temperature_c ? rec.temperature_c + ' °C' : 'N/A') + '</div></div>' +
        '<div class="form-group"><label>Prepared by</label><div style="font-size:12px;color:var(--text)">' + escHtml(rec.prepared_by || 'Unknown') + '</div></div>' +
      '</div>' +
    '</div>';

    // ── Components
    html += '<div class="form-section">' +
      '<div class="section-label">Components</div>';
    if (components.length) {
      html += '<table class="comp-table"><thead><tr>' +
        '<th>Component</th><th>Lot #</th><th>Qty</th><th>Unit</th><th>Verified</th>' +
        '</tr></thead><tbody>';
      components.forEach(function(c) {
        html += '<tr>' +
          '<td>' + escHtml(c.name || '') + '</td>' +
          '<td>' + escHtml(c.lot || '') + '</td>' +
          '<td>' + escHtml(String(c.qty || '')) + '</td>' +
          '<td>' + escHtml(c.unit || '') + '</td>' +
          '<td class="' + (c.verified ? 'comp-verified' : 'comp-pending') + '">' + (c.verified ? 'Yes' : 'No') + '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
    } else {
      html += '<div style="font-size:12px;color:var(--dim);padding:8px 0">No components added</div>';
    }
    html += '</div>';

    // ── pH Section
    html += '<div class="form-section">' +
      '<div class="section-label">pH Adjustment</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>Target pH</label><div style="font-size:12px;color:var(--text)">' + (rec.ph_target || 'N/A') + '</div></div>' +
        '<div class="form-group"><label>Actual pH</label><div style="font-size:12px;color:var(--text)">' + (rec.ph_actual || 'Not measured') + phIndicator(rec) + '</div></div>' +
        '<div class="form-group"><label>Adjusted</label><div style="font-size:12px;color:var(--text)">' + (rec.ph_adjusted ? 'Yes' : 'No') + '</div></div>' +
      '</div>' +
    '</div>';

    // ── Filter integrity
    html += '<div class="form-section">' +
      '<div class="section-label">Filter Integrity</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>Filter Type</label><div style="font-size:12px;color:var(--text)">' + escHtml(rec.filter_type || 'N/A') + '</div></div>' +
        '<div class="form-group"><label>Lot #</label><div style="font-size:12px;color:var(--text)">' + escHtml(rec.filter_lot || 'N/A') + '</div></div>' +
        '<div class="form-group"><label>Integrity Test</label><div style="font-size:12px;color:var(--text)">' +
          '<span class="status-dot status-' + integrityStatus(rec.filter_integrity) + '"></span>' + (rec.filter_integrity || 'pending') +
        '</div></div>' +
      '</div>' +
    '</div>';

    // ── Hold time
    if (rec.hold_time_hours) {
      html += '<div class="form-section">' +
        '<div class="section-label">Hold Time</div>' +
        '<div class="form-row">' +
          '<div class="form-group"><label>Max Hold</label><div style="font-size:12px;color:var(--text)">' + rec.hold_time_hours + ' hours</div></div>' +
          '<div class="form-group"><label>Started</label><div style="font-size:12px;color:var(--text)">' + (rec.hold_start ? new Date(rec.hold_start).toLocaleString() : 'Not started') + '</div></div>' +
          '<div class="form-group"><label>Expires</label><div style="font-size:12px;color:var(--text)">' + (rec.hold_expiry ? new Date(rec.hold_expiry).toLocaleString() : 'N/A') + '</div></div>' +
        '</div>' +
        '<div class="hold-bar ' + holdClass + '"><div class="hold-fill" style="width:' + Math.min(holdPct, 100) + '%"></div></div>' +
        '<div class="hold-label">' + holdLabel + '</div>' +
      '</div>';
    }

    // ── Notes
    html += '<div class="form-section">' +
      '<div class="section-label">Notes</div>' +
      '<div style="font-size:12px;color:var(--text);white-space:pre-wrap">' + escHtml(rec.notes || 'No notes') + '</div>' +
    '</div>';

    // ── AI Analysis
    if (rec.ai_analysis) {
      var ai = rec.ai_analysis;
      html += '<div class="form-section">' +
        '<div class="section-label">AI Compliance Analysis</div>' +
        '<div class="ai-card">' +
          '<div class="ai-card-header">' +
            '<span class="ai-badge ' + (ai.compliant ? 'ai-compliant' : 'ai-non-compliant') + '">' +
              (ai.compliant ? 'Compliant' : 'Non-Compliant') + '</span>' +
            (ai.riskLevel ? ' <span style="font-size:11px;color:var(--mid)">Risk: ' + ai.riskLevel + '</span>' : '') +
          '</div>' +
          '<div style="font-size:12px;color:var(--text);margin-bottom:8px">' + escHtml(ai.summary || '') + '</div>';
      if (ai.findings && ai.findings.length) {
        ai.findings.forEach(function(f) {
          html += '<div class="ai-finding ' + (f.severity || 'info') + '">' +
            '<div class="ai-finding-cat">' + escHtml(f.category || '') + ' — ' + (f.severity || 'info') + '</div>' +
            '<div class="ai-finding-text">' + escHtml(f.issue || '') + '</div>' +
            (f.recommendation ? '<div class="ai-finding-text" style="color:var(--green);margin-top:2px">' + escHtml(f.recommendation) + '</div>' : '') +
          '</div>';
        });
      }
      html += '</div></div>';
    }

    // ── Verification / E-sig
    if (rec.verified_by) {
      html += '<div class="form-section">' +
        '<div class="section-label">Verification</div>' +
        '<div style="font-size:12px;color:var(--green)">Verified by ' + escHtml(rec.verified_by) + ' at ' + (rec.verified_at ? new Date(rec.verified_at).toLocaleString() : '') + '</div>' +
      '</div>';
    }
    if (rec.esig_user) {
      html += '<div class="form-section">' +
        '<div class="section-label">Electronic Signature</div>' +
        '<div style="font-size:12px;color:var(--green)">Signed by ' + escHtml(rec.esig_user) + ' at ' + (rec.esig_at ? new Date(rec.esig_at).toLocaleString() : '') + '</div>' +
        '<div style="font-size:11px;color:var(--mid)">Reason: ' + escHtml(rec.esig_reason || '') + '</div>' +
      '</div>';
    }

    html += '</div>'; // close detail-content
    detailView.innerHTML = html;
  }

  // ── New record form ──
  function showNewForm() {
    activeId = null;
    renderList();
    detailView.innerHTML =
      '<div class="detail-header"><h2>New Preparation</h2>' +
        '<div class="detail-actions"><button class="action-btn primary" onclick="saveNewRecord()">Save</button></div>' +
      '</div>' +
      '<div class="detail-content">' +
        '<div class="form-section">' +
          '<div class="section-label">Recipe Details</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Recipe Name *</label><input id="fRecipeName" placeholder="e.g. LB Broth"></div>' +
            '<div class="form-group"><label>Type</label><select id="fRecipeType"><option value="media">Media</option><option value="buffer">Buffer</option><option value="feed">Feed</option></select></div>' +
          '</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Batch ID</label><input id="fBatchId" placeholder="Optional batch reference"></div>' +
            '<div class="form-group"><label>Volume (L)</label><input id="fVolume" type="number" step="0.1"></div>' +
            '<div class="form-group"><label>Temperature (°C)</label><input id="fTemp" type="number" step="0.1"></div>' +
          '</div>' +
        '</div>' +

        '<div class="form-section">' +
          '<div class="section-label">Components</div>' +
          '<table class="comp-table"><thead><tr><th>Component</th><th>Lot #</th><th>Qty</th><th>Unit</th><th></th></tr></thead>' +
          '<tbody id="compRows"></tbody></table>' +
          '<button class="add-comp-btn" onclick="addCompRow()">+ Add Component</button>' +
        '</div>' +

        '<div class="form-section">' +
          '<div class="section-label">pH & Filter</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Target pH</label><input id="fPhTarget" type="number" step="0.01"></div>' +
            '<div class="form-group"><label>Filter Type</label><input id="fFilterType" placeholder="e.g. 0.22 µm PES"></div>' +
            '<div class="form-group"><label>Filter Lot #</label><input id="fFilterLot"></div>' +
          '</div>' +
        '</div>' +

        '<div class="form-section">' +
          '<div class="section-label">Hold Time</div>' +
          '<div class="form-row">' +
            '<div class="form-group"><label>Max Hold (hours)</label><input id="fHoldTime" type="number"></div>' +
          '</div>' +
        '</div>' +

        '<div class="form-section">' +
          '<div class="section-label">Notes</div>' +
          '<div class="form-group"><textarea id="fNotes" rows="3" placeholder="Additional notes..."></textarea></div>' +
        '</div>' +
      '</div>';

    addCompRow();
  }

  // ── Component rows ──
  window.addCompRow = function() {
    var tbody = document.getElementById('compRows');
    if (!tbody) return;
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input class="c-name" placeholder="Component name"></td>' +
      '<td><input class="c-lot" placeholder="Lot #"></td>' +
      '<td><input class="c-qty" type="number" step="0.01" placeholder="0"></td>' +
      '<td><input class="c-unit" placeholder="g/mL/L"></td>' +
      '<td><button class="remove-comp" onclick="this.closest(\'tr\').remove()">x</button></td>';
    tbody.appendChild(tr);
  };

  // ── Save new record ──
  window.saveNewRecord = async function() {
    var name = document.getElementById('fRecipeName');
    if (!name || !name.value.trim()) { alert('Recipe name is required'); return; }

    var compRows = document.querySelectorAll('#compRows tr');
    var components = [];
    compRows.forEach(function(tr) {
      var n = tr.querySelector('.c-name');
      if (n && n.value.trim()) {
        components.push({
          name: n.value.trim(),
          lot:  tr.querySelector('.c-lot').value.trim(),
          qty:  parseFloat(tr.querySelector('.c-qty').value) || 0,
          unit: tr.querySelector('.c-unit').value.trim(),
          verified: false,
        });
      }
    });

    var body = {
      recipeName:   document.getElementById('fRecipeName').value.trim(),
      recipeType:   document.getElementById('fRecipeType').value,
      batchId:      document.getElementById('fBatchId').value.trim() || null,
      volumeLitres: parseFloat(document.getElementById('fVolume').value) || null,
      temperatureC: parseFloat(document.getElementById('fTemp').value) || null,
      phTarget:     parseFloat(document.getElementById('fPhTarget').value) || null,
      filterType:   document.getElementById('fFilterType').value.trim() || null,
      filterLot:    document.getElementById('fFilterLot').value.trim() || null,
      holdTimeHours: parseInt(document.getElementById('fHoldTime').value) || null,
      notes:        document.getElementById('fNotes').value.trim(),
      components:   components,
    };

    statusText.textContent = 'Saving...';
    try {
      var res = await authFetch(SERVER + '/media-prep', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) { var e = await res.json(); throw new Error(e.error || 'Save failed'); }
      var result = await res.json();
      activeId = result.recordId;
      await loadRecords();
      loadDetail(activeId);
      statusText.textContent = 'Saved ' + result.recordId;
    } catch (e) {
      statusText.textContent = 'Error: ' + e.message;
      alert('Save failed: ' + e.message);
    }
  };

  // ── Status change ──
  window.changeStatus = async function(id, newStatus) {
    statusText.textContent = 'Updating...';
    try {
      var res = await authFetch(SERVER + '/media-prep/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ updates: { status: newStatus }, reason: 'Status changed to ' + newStatus }),
      });
      if (!res.ok) throw new Error('Update failed');
      await loadRecords();
      loadDetail(id);
      statusText.textContent = id + ' → ' + newStatus;
    } catch (e) {
      statusText.textContent = 'Error';
      alert('Update failed: ' + e.message);
    }
  };

  // ── AI verification ──
  window.runAiVerify = async function(id) {
    statusText.textContent = 'Running AI compliance check...';
    try {
      var res = await authFetch(SERVER + '/media-prep/' + id + '/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}',
      });
      if (!res.ok) throw new Error('Verification failed');
      await loadRecords();
      loadDetail(id);
      statusText.textContent = 'AI verification complete';
    } catch (e) {
      statusText.textContent = 'AI error: ' + e.message;
      alert('AI verification failed: ' + e.message);
    }
  };

  // ── E-signature ──
  var esigTarget = null;
  window.openEsig = function(id) {
    esigTarget = id;
    document.getElementById('esigModal').classList.add('visible');
    document.getElementById('esigReason').value = '';
    document.getElementById('esigPassword').value = '';
  };
  window.closeEsig = function() {
    document.getElementById('esigModal').classList.remove('visible');
    esigTarget = null;
  };
  window.submitEsig = async function() {
    var reason = document.getElementById('esigReason').value.trim();
    var password = document.getElementById('esigPassword').value;
    if (!reason || !password) { alert('Reason and password are required'); return; }

    var userName = localStorage.getItem('vent_name') || 'unknown';
    statusText.textContent = 'Signing...';
    try {
      var res = await authFetch(SERVER + '/media-prep/' + esigTarget, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          updates: {
            status: 'approved',
            esig_user: userName,
            esig_at: new Date().toISOString(),
            esig_reason: reason,
            verified_by: userName,
            verified_at: new Date().toISOString(),
          },
          reason: 'Approved with e-signature: ' + reason,
        }),
      });
      if (!res.ok) throw new Error('Signature failed');
      closeEsig();
      await loadRecords();
      loadDetail(esigTarget);
      statusText.textContent = esigTarget + ' approved';
    } catch (e) {
      statusText.textContent = 'Error';
      alert('Signature failed: ' + e.message);
    }
  };

  // ── Hold time check ──
  async function checkHoldTimes() {
    try {
      var res = await authFetch(SERVER + '/media-prep-hold-times', {});
      if (!res.ok) return;
      var data = await res.json();
      if (data.expired && data.expired.length) {
        holdStatusEl.textContent = data.expired.length + ' EXPIRED';
        holdStatusEl.style.color = '#f44747';
      } else if (data.warning && data.warning.length) {
        holdStatusEl.textContent = data.warning.length + ' expiring soon';
        holdStatusEl.style.color = '#ffc64d';
      } else {
        holdStatusEl.textContent = 'Hold times OK';
        holdStatusEl.style.color = '';
      }
    } catch (e) { /* ignore */ }
  }

  // ── Helpers ──
  function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function calcHoldPct(rec) {
    if (!rec.hold_start || !rec.hold_expiry) return 0;
    var start = new Date(rec.hold_start).getTime();
    var expiry = new Date(rec.hold_expiry).getTime();
    var now = Date.now();
    var total = expiry - start;
    if (total <= 0) return 100;
    return Math.round(((now - start) / total) * 100);
  }

  function calcHoldLabel(rec) {
    if (!rec.hold_expiry) return '';
    var remaining = new Date(rec.hold_expiry).getTime() - Date.now();
    if (remaining <= 0) return 'EXPIRED';
    var hrs = Math.floor(remaining / 3600000);
    var mins = Math.floor((remaining % 3600000) / 60000);
    return hrs + 'h ' + mins + 'm remaining';
  }

  function phIndicator(rec) {
    if (!rec.ph_target || !rec.ph_actual) return '';
    var diff = Math.abs(rec.ph_target - rec.ph_actual);
    if (diff <= 0.1) return ' <span class="ph-indicator ph-ok">OK</span>';
    if (diff <= 0.3) return ' <span class="ph-indicator ph-warning">Warning</span>';
    return ' <span class="ph-indicator ph-danger">Out of range</span>';
  }

  function integrityStatus(s) {
    if (s === 'pass') return 'approved';
    if (s === 'fail') return 'rejected';
    return 'draft';
  }

  // ── Filter buttons ──
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      loadRecords();
    });
  });

  // ── New record button ──
  document.getElementById('newRecBtn').addEventListener('click', showNewForm);

  // ── Resizer ──
  (function initResizer() {
    var resizer = document.getElementById('resizer');
    var wb = document.getElementById('workbench');
    var dragging = false;
    resizer.addEventListener('mousedown', function(e) {
      dragging = true;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var x = Math.max(180, Math.min(e.clientX, window.innerWidth - 300));
      wb.style.gridTemplateColumns = x + 'px 4px 1fr';
    });
    document.addEventListener('mouseup', function() {
      if (dragging) {
        dragging = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });
  })();

  // ── Init ──
  loadRecords();
  checkHoldTimes();
  setInterval(checkHoldTimes, 60000);

})();
</script>
</body>
</html>
