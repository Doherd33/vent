<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1e1e1e;
  --s1:       #252526;
  --s2:       #2d2d30;
  --s3:       #333337;
  --border:   #3c3c3c;
  --borderhi: #5a5a5a;
  --text:     #cccccc;
  --mid:      #8e8e8e;
  --dim:      #5a5a5a;
  --accent:   #007acc;
  --accent2:  rgba(0,122,204,0.15);
  --gold:     #ffc64d;
  --gold2:    rgba(255,198,77,0.15);
  --green:    #4ec9b0;
  --green2:   rgba(78,201,176,0.15);
  --red:      #f44747;
  --red2:     rgba(244,71,71,0.15);
  --teal:     #4ec9b0;
  --teal2:    rgba(78,201,176,0.12);
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column; min-height: 100vh;
  overflow-x: hidden;
}

@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── TITLE BAR (unified nav) ── */
.title-bar { background:#323233; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid #111; user-select:none; height:42px; flex-shrink:0; position:sticky; top:0; z-index:100; }
.title-bar-left { display:flex; align-items:center; gap:16px; }
.app-name { font-family:'Instrument Serif',serif; font-size:16px; color:var(--text); display:flex; align-items:center; gap:7px; text-decoration:none; letter-spacing:-.02em; }
.pip { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:breathe 3s ease-in-out infinite; display:inline-block; }
.title-nav { display:flex; gap:2px; }
.nav-tab { padding:4px 14px; font-size:12px; color:var(--mid); cursor:pointer; border-radius:5px; text-decoration:none; transition:all .15s; font-weight:300; }
.nav-tab:hover { color:var(--text); background:#404040; }
.nav-tab.active { color:#fff; background:var(--accent); font-weight:400; }
.title-bar-right { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--mid); }
.role-badge { font-size:10px; font-family:'JetBrains Mono',monospace; padding:2px 8px; border-radius:4px; letter-spacing:.05em; border:1px solid var(--border); }
.user-name { font-weight:400; font-size:12px; }
.sign-out-btn { background:none; border:1px solid var(--border); border-radius:4px; color:var(--dim); font-size:10px; padding:2px 8px; cursor:pointer; font-family:inherit; transition:all .15s; }
.sign-out-btn:hover { color:var(--text); border-color:var(--borderhi); }
.mobile-hamburger { display:none; background:none; border:none; color:var(--mid); cursor:pointer; padding:4px; }
@media(max-width:768px){.mobile-hamburger{display:block}.title-nav{display:none;position:absolute;top:42px;left:0;right:0;background:#323233;flex-direction:column;padding:8px;border-bottom:1px solid #111;z-index:999}.title-nav.open{display:flex}}
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* ── DASHBOARD ── */
.dash { max-width: 1100px; margin: 0 auto; padding: 32px 28px; width: 100%; }
.dash-title {
  font-family: 'Instrument Serif', serif; font-size: 28px;
  margin-bottom: 4px;
}
.dash-sub { font-size: 13px; color: var(--dim); margin-bottom: 28px; }

/* ── STAT CARDS ── */
.stat-row {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px; margin-bottom: 28px;
}
.stat-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; display: flex; flex-direction: column; gap: 6px;
  animation: fadeUp 0.3s ease both;
}
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--dim); }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 500; color: var(--text); }
.stat-note { font-size: 11px; color: var(--mid); }
.stat-value.high   { color: var(--red); }
.stat-value.green  { color: var(--green); }
.stat-value.gold   { color: var(--gold); }
.stat-value.accent { color: var(--accent); }

/* ── SECTION ── */
.section { margin-bottom: 32px; }
.section-title {
  font-size: 14px; font-weight: 500; color: var(--text);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-title .badge {
  font-size: 10px; padding: 2px 8px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── CHARTS ── */
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
.chart-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; min-height: 200px;
}
.chart-title { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); margin-bottom: 14px; }

/* Bar chart */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 11px; color: var(--mid); width: 100px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 22px; background: var(--s2); border-radius: 3px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; }
.bar-fill span { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #fff; }
.bar-fill.high   { background: var(--red2);   border-left: 3px solid var(--red); }
.bar-fill.medium { background: var(--gold2);  border-left: 3px solid var(--gold); }
.bar-fill.low    { background: var(--green2); border-left: 3px solid var(--green); }
.bar-fill.area   { background: var(--accent2); border-left: 3px solid var(--accent); }

/* Donut chart (CSS) */
.donut-wrap { display: flex; align-items: center; gap: 24px; }
.donut { width: 120px; height: 120px; border-radius: 50%; position: relative; }
.donut-center { position: absolute; inset: 25px; border-radius: 50%; background: var(--s1); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.donut-center .num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }
.donut-center .lbl { font-size: 9px; text-transform: uppercase; color: var(--dim); }
.donut-legend { display: flex; flex-direction: column; gap: 6px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--mid); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* ── TABLES ── */
.dash-table { width: 100%; border-collapse: collapse; }
.dash-table th {
  text-align: left; font-size: 10px; text-transform: uppercase;
  letter-spacing: .05em; color: var(--dim); padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.dash-table td { font-size: 12px; padding: 8px 10px; border-bottom: 1px solid var(--s2); color: var(--mid); }
.dash-table tr:hover td { background: var(--s2); }
.ref-link { color: var(--accent); text-decoration: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.ref-link:hover { text-decoration: underline; }

/* Priority pills */
.pp { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; letter-spacing: .03em; }
.pp-high   { background: var(--red2);   color: var(--red); }
.pp-medium { background: var(--gold2);  color: var(--gold); }
.pp-low    { background: var(--green2); color: var(--green); }

/* Status pills */
.sp { font-size: 10px; padding: 2px 8px; border-radius: 100px; }
.sp-open   { background: var(--accent2); color: var(--accent); }
.sp-closed { background: var(--green2);  color: var(--green); }
.sp-overdue { background: var(--red2);   color: var(--red); }

/* ── TREND INDICATOR ── */
.trend { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; }
.trend.up   { color: var(--red); }
.trend.down { color: var(--green); }
.trend.flat { color: var(--dim); }

/* ── LOADING ── */
.loading { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 13px; }

/* ── HAMBURGER ── */
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--mid); cursor: pointer; padding: 6px; border-radius: 7px; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.hamburger:hover { color: var(--text); background: var(--s3); }
.hamburger svg { display: block; }

@media (max-width: 768px) {
  .hamburger { display: flex; align-items: center; justify-content: center; }
  .app-nav { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--s1); border-bottom: 1px solid var(--border); flex-direction: column; padding: 8px 12px; gap: 2px; box-shadow: 0 12px 32px rgba(0,0,0,.3); z-index: 200; }
  .app-nav.open { display: flex; }
  .topbar { position: relative; padding: 0 12px; gap: 8px; }
  .nav-item { padding: 12px 16px; font-size: 14px; width: 100%; border-radius: 8px; }
  .chart-row { grid-template-columns: 1fr; }
  .stat-row { grid-template-columns: 1fr 1fr; }
  .dash { padding: 20px 14px; }
  .dash-title { font-size: 24px; }
  .dash-sub { font-size: 12px; margin-bottom: 20px; }
  .stat-card { padding: 14px 16px; }
  .stat-value { font-size: 24px; }
  .stat-note { font-size: 10px; }
  .chart-card { padding: 16px; min-height: 160px; }
  .donut-wrap { flex-direction: column; align-items: center; gap: 16px; }
  .donut { width: 100px; height: 100px; }
  .donut-center { inset: 20px; }
  .donut-center .num { font-size: 18px; }
  .bar-label { width: 70px; font-size: 10px; }
  .section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .dash-table { min-width: 500px; }
  .dash-table th { font-size: 9px; padding: 6px 8px; }
  .dash-table td { font-size: 11px; padding: 6px 8px; }
  .section-title { font-size: 13px; }
}
</style>
<script>
  const _r = localStorage.getItem('vent_role');
  if (!_r) window.location.replace('login.html');
</script>
</head>
<body>

<!-- TITLE BAR -->
<div class="title-bar">
  <div class="title-bar-left">
    <a href="index.html" class="app-name">Vent<span class="pip"></span></a>
    <button class="mobile-hamburger" onclick="document.querySelector('.title-nav').classList.toggle('open')" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
    <nav class="title-nav" id="mainNav">
      <a href="index.html"       class="nav-tab">Submit</a>
      <a href="query.html"       class="nav-tab">Query SOPs</a>
      <a href="submissions.html" class="nav-tab">Submissions</a>
      <a href="builder.html"     class="nav-tab">Doc Builder</a>
      <a href="qa.html"          class="nav-tab">QA Control</a>
      <a href="workflow.html"    class="nav-tab">Workflow</a>
      <a href="dashboard.html"   class="nav-tab active">Dashboard</a>
    </nav>
  </div>
  <div class="title-bar-right" id="titleBarRight">
    <span class="role-badge" id="roleBadge"></span>
    <span class="user-name" id="titleUser"></span>
    <button class="sign-out-btn" onclick="localStorage.clear();location.href='login.html'">Sign out</button>
  </div>
</div>

<!-- DASHBOARD CONTENT -->
<div class="dash" id="dashContent">
  <div class="loading" id="dashLoading">Loading analytics&hellip;</div>
</div>

<script>
const SERVER = window.location.origin;

// ─── AUTH HELPERS ─────────────────────────────────────────────────────────────
function getAuthHeaders(extra) {
  const token = localStorage.getItem('vent_token');
  const h = Object.assign({}, extra || {});
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}
function authFetch(url, opts) {
  opts = opts || {};
  opts.headers = getAuthHeaders(opts.headers);
  return fetch(url, opts);
}
// Auth guard
(async function authGuard() {
  const token = localStorage.getItem('vent_token');
  if (!token) { window.location.replace('login.html'); return; }
  try {
    const res = await fetch(SERVER + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) throw new Error('expired');
  } catch {
    localStorage.removeItem('vent_token'); localStorage.removeItem('vent_role');
    localStorage.removeItem('vent_name'); localStorage.removeItem('vent_user_id');
    window.location.replace('login.html');
  }
})();

async function loadDashboard() {
  try {
    const res = await authFetch(SERVER + '/analytics');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    renderDashboard(d);
  } catch (err) {
    document.getElementById('dashLoading').innerHTML =
      '<span style="color:var(--red)">Failed to load analytics: ' + err.message + '</span>';
  }
}

function renderDashboard(d) {
  const trendIcon = d.trend.percentChange > 0 ? '&#9650;' : d.trend.percentChange < 0 ? '&#9660;' : '&#8226;';
  const trendClass = d.trend.percentChange > 0 ? 'up' : d.trend.percentChange < 0 ? 'down' : 'flat';
  const trendText = d.trend.percentChange !== 0 ? Math.abs(d.trend.percentChange) + '% vs last week' : 'No change';

  // Priority bar chart
  const maxPri = Math.max(d.byPriority.High || 1, d.byPriority.Medium || 1, d.byPriority.Low || 1);
  const priBars = ['High', 'Medium', 'Low'].map(p => {
    const val = d.byPriority[p] || 0;
    const pct = Math.round((val / maxPri) * 100);
    return `<div class="bar-row">
      <div class="bar-label">${p}</div>
      <div class="bar-track"><div class="bar-fill ${p.toLowerCase()}" style="width:${pct}%"><span>${val}</span></div></div>
    </div>`;
  }).join('');

  // Area bar chart
  const areas = Object.entries(d.byArea).sort((a, b) => b[1] - a[1]);
  const maxArea = areas.length ? areas[0][1] : 1;
  const areaBars = areas.map(([area, count]) => {
    const pct = Math.round((count / maxArea) * 100);
    return `<div class="bar-row">
      <div class="bar-label">${area}</div>
      <div class="bar-track"><div class="bar-fill area" style="width:${pct}%"><span>${count}</span></div></div>
    </div>`;
  }).join('');

  // Status donut
  const open = d.openCount, closed = d.closedCount, review = d.inReview;
  const total = open + closed + review || 1;
  const openDeg = (open / total) * 360;
  const reviewDeg = (review / total) * 360;
  const closedDeg = (closed / total) * 360;
  const donutGrad = `conic-gradient(var(--accent) 0deg ${openDeg}deg, var(--gold) ${openDeg}deg ${openDeg + reviewDeg}deg, var(--green) ${openDeg + reviewDeg}deg 360deg)`;

  // Recent submissions table
  const subRows = (d.recentSubmissions || []).map(s => {
    const pCls = s.priority === 'High' ? 'pp-high' : s.priority === 'Medium' ? 'pp-medium' : 'pp-low';
    const date = new Date(s.date);
    const dateStr = date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
    return `<tr>
      <td><a class="ref-link" href="qa.html">${s.ref}</a></td>
      <td>${s.area}</td>
      <td><span class="pp ${pCls}">${s.priority}</span></td>
      <td>${(s.status || 'new').replace(/_/g, ' ')}</td>
      <td>${dateStr}</td>
    </tr>`;
  }).join('');

  // CAPA table
  const capaRows = (d.recentCapas || []).map(c => {
    const isOverdue = c.status !== 'closed' && c.due_date && new Date(c.due_date) < new Date();
    const stCls = c.status === 'closed' ? 'sp-closed' : isOverdue ? 'sp-overdue' : 'sp-open';
    const stLabel = isOverdue ? 'Overdue' : c.status.replace(/_/g, ' ');
    const due = c.due_date ? new Date(c.due_date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) : '—';
    return `<tr>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)">${c.capa_id}</td>
      <td><a class="ref-link" href="qa.html">${c.submission_ref}</a></td>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.title}</td>
      <td>${c.owner}</td>
      <td>${due}</td>
      <td><span class="sp ${stCls}">${stLabel}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('dashContent').innerHTML = `
    <div class="dash-title">Intelligence Dashboard</div>
    <div class="dash-sub">Real-time analytics across all submissions, CAPAs, and observations</div>

    <!-- STAT CARDS -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value accent">${d.total}</div>
        <div class="stat-note">
          <span class="trend ${trendClass}">${trendIcon} ${trendText}</span>
          &nbsp;&middot;&nbsp; ${d.trend.thisWeek} this week
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">High Priority</div>
        <div class="stat-value high">${d.byPriority.High || 0}</div>
        <div class="stat-note">${Math.round(((d.byPriority.High || 0) / (d.total || 1)) * 100)}% of total</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Open CAPAs</div>
        <div class="stat-value gold">${d.capas.open}</div>
        <div class="stat-note">${d.capas.overdue} overdue &middot; ${d.capas.closed} closed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Resolved</div>
        <div class="stat-value green">${d.closedCount}</div>
        <div class="stat-note">${d.total ? Math.round((d.closedCount / d.total) * 100) : 0}% closure rate</div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">By Priority</div>
        <div class="bar-chart">${priBars}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Submission Status</div>
        <div class="donut-wrap">
          <div class="donut" style="background:${donutGrad}">
            <div class="donut-center">
              <div class="num">${d.total}</div>
              <div class="lbl">Total</div>
            </div>
          </div>
          <div class="donut-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Open (${open})</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>In Review (${review})</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Closed (${closed})</div>
          </div>
        </div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">By Process Area</div>
        <div class="bar-chart">${areaBars || '<div style="color:var(--dim);font-size:12px">No data yet</div>'}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">CAPA Summary</div>
        <div style="display:flex;gap:20px;margin-top:8px">
          <div style="text-align:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--accent)">${d.capas.total}</div>
            <div style="font-size:10px;color:var(--dim);text-transform:uppercase">Total</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--gold)">${d.capas.open}</div>
            <div style="font-size:10px;color:var(--dim);text-transform:uppercase">Open</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--red)">${d.capas.overdue}</div>
            <div style="font-size:10px;color:var(--dim);text-transform:uppercase">Overdue</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'JetBrains Mono',monospace;font-size:24px;color:var(--green)">${d.capas.closed}</div>
            <div style="font-size:10px;color:var(--dim);text-transform:uppercase">Closed</div>
          </div>
        </div>
      </div>
    </div>

    <!-- RECENT SUBMISSIONS -->
    <div class="section">
      <div class="section-title">Recent Submissions <span class="badge" style="background:var(--accent2);color:var(--accent)">${d.total}</span></div>
      <table class="dash-table">
        <thead><tr><th>Ref</th><th>Area</th><th>Priority</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${subRows || '<tr><td colspan="5" style="text-align:center;color:var(--dim)">No submissions yet</td></tr>'}</tbody>
      </table>
    </div>

    <!-- CAPA TABLE -->
    <div class="section">
      <div class="section-title">CAPAs <span class="badge" style="background:${d.capas.overdue ? 'var(--red2)' : 'var(--green2)'};color:${d.capas.overdue ? 'var(--red)' : 'var(--green)'}">${d.capas.overdue} overdue</span></div>
      <table class="dash-table">
        <thead><tr><th>CAPA</th><th>Submission</th><th>Title</th><th>Owner</th><th>Due</th><th>Status</th></tr></thead>
        <tbody>${capaRows || '<tr><td colspan="6" style="text-align:center;color:var(--dim)">No CAPAs yet</td></tr>'}</tbody>
      </table>
    </div>
  `;
}

// ── NAV: role filtering + user display ──
(function(){
  var role=localStorage.getItem('vent_role')||'operator';
  var name=localStorage.getItem('vent_name')||'';
  var rules={operator:['Submit','Query SOPs','Doc Builder'],qa:['Submit','Query SOPs','Submissions','Doc Builder','QA Control'],director:['Submit','Query SOPs','Submissions','Doc Builder','QA Control','Dashboard'],msat:['Submit','Query SOPs','Submissions','Doc Builder'],engineering:['Submit','Query SOPs','Submissions','Doc Builder'],admin:['Submit','Query SOPs','Submissions','Doc Builder','QA Control','Workflow','Dashboard']};
  var colors={operator:'var(--teal)',qa:'var(--accent)',director:'var(--gold)',msat:'var(--green)',engineering:'var(--mid)',admin:'var(--red)'};
  var labels={operator:'Operator',qa:'QA',director:'Director',msat:'MSAT',engineering:'Engineering',admin:'Admin'};
  var badge=document.getElementById('roleBadge');
  if(badge){badge.textContent=labels[role]||role.toUpperCase();badge.style.color=colors[role]||'var(--mid)';badge.style.background='var(--s3)';}
  var un=document.getElementById('titleUser');if(un)un.textContent=name;
  var allowed=rules[role]||[];
  document.querySelectorAll('#mainNav .nav-tab').forEach(function(a){if(!allowed.some(function(x){return a.textContent.trim()===x}))a.style.display='none';});
})();

loadDashboard();
</script>
