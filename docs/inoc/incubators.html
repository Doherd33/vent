<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Incubator Logbook</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/styles.css">
<style>
body {
  height: 100vh;
  display: grid;
  grid-template-rows: 42px 1fr 22px;
  overflow: hidden;
}

/* ── WORKBENCH ── */
.workbench {
  display: grid;
  grid-template-columns: 280px 4px 1fr;
  grid-template-rows: 1fr 4px 160px;
  overflow: hidden;
  position: relative;
}

/* ── RESIZE HANDLES ── */
.resizer { background: #3c3c3c; z-index: 10; transition: background 0.15s; position: relative; }
.resizer:hover, .resizer.dragging { background: #007acc; }
.resizer-v { cursor: col-resize; grid-row: 1; }
.resizer-h { cursor: row-resize; grid-column: 1 / 4; grid-row: 2; }
.resizer::after { content: ''; position: absolute; inset: 0; }
.resizer-v::after { width: 12px; left: -4px; }
.resizer-h::after { height: 12px; top: -4px; }

/* ── LEFT PANEL ── */
.left-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--s1); border-right: 1px solid var(--border); }
.panel-header { padding: 8px 12px; background: var(--s2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; color: var(--text); user-select: none; }
.panel-badge { background: var(--accent); color: #fff; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.panel-actions { margin-left: auto; display: flex; gap: 4px; }
.panel-btn { background: none; border: 1px solid var(--border); color: var(--mid); padding: 2px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; }
.panel-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.filter-bar { display: flex; gap: 4px; padding: 6px 10px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-btn { padding: 3px 10px; border: 1px solid var(--border); background: transparent; color: var(--mid); border-radius: 3px; font-size: 10px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.unit-list { flex: 1; overflow-y: auto; }
.unit-card { padding: 10px 12px; cursor: pointer; border-left: 2px solid transparent; border-bottom: 1px solid var(--border); transition: all 0.12s; }
.unit-card:hover { background: rgba(255,255,255,0.03); }
.unit-card.active { background: #094771; border-left-color: var(--accent); }
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.card-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
.card-title { font-size: 12px; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 10px; color: var(--dim); }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
.status-dot.active { background: var(--green); }
.status-dot.maintenance { background: var(--gold); }
.status-dot.decommissioned { background: var(--dim); }

/* ── CENTER PANEL ── */
.center-panel { display: flex; flex-direction: column; overflow: hidden; }
.editor-tabs { display: flex; background: var(--s2); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; }
.editor-tab { padding: 6px 16px; font-size: 11px; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; user-select: none; transition: all 0.15s; }
.editor-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.editor-tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); }
.center-content { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* ── BOTTOM PANEL ── */
.bottom-panel { display: flex; flex-direction: column; border-top: 1px solid var(--border); grid-column: 1 / 4; }
.bottom-tabs { display: flex; background: var(--s2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.bottom-tab { padding: 4px 14px; font-size: 11px; color: var(--mid); cursor: pointer; border-bottom: 2px solid transparent; user-select: none; }
.bottom-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.bottom-content { flex: 1; overflow-y: auto; padding: 6px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.log-line { display: flex; gap: 8px; padding: 1px 0; }
.log-time { color: var(--dim); min-width: 70px; }
.log-info { color: var(--green); }
.log-warn { color: var(--gold); }
.log-error { color: var(--red); }

/* ── STATUS BAR ── */
.status-bar { background: #007acc; display: flex; align-items: center; padding: 0 10px; gap: 14px; font-size: 11px; color: rgba(255,255,255,0.85); user-select: none; }
.status-bar .s-sep { opacity: 0.3; }
.status-bar .s-right { margin-left: auto; display: flex; gap: 12px; }

/* ── READING CARDS (Dashboard) ── */
.reading-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.reading-card { background: var(--s1); border: 1px solid var(--border); border-radius: 4px; padding: 16px; border-left: 3px solid var(--border); }
.reading-card.normal { border-left-color: var(--green); }
.reading-card.warning { border-left-color: var(--gold); }
.reading-card.alarm { border-left-color: var(--red); }
.reading-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 4px; }
.reading-value { font-size: 28px; font-weight: 300; font-family: 'JetBrains Mono', monospace; color: var(--text); }
.reading-unit { font-size: 14px; color: var(--mid); margin-left: 2px; }
.reading-setpoint { font-size: 10px; color: var(--dim); margin-top: 6px; }
.reading-sparkline { width: 100%; height: 40px; margin-top: 8px; }

/* ── QUICK STATS ── */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--s1); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 500; font-family: 'JetBrains Mono', monospace; color: var(--text); }
.stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-top: 2px; }

/* ── SECTION LABEL ── */
.section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 8px; margin-top: 20px; }
.section-label:first-child { margin-top: 0; }

/* ── TABLES ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.data-table th { text-align: left; padding: 6px 10px; background: var(--s2); color: var(--mid); font-weight: 500; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.data-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
.data-table tr:hover { background: rgba(255,255,255,0.02); }

/* ── BADGES ── */
.badge { display: inline-flex; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; text-transform: uppercase; }
.badge-normal { background: rgba(78,201,176,0.15); color: var(--green); }
.badge-warning { background: rgba(255,198,77,0.15); color: var(--gold); }
.badge-alarm, .badge-critical { background: rgba(244,71,71,0.15); color: var(--red); }
.badge-pass { background: rgba(78,201,176,0.15); color: var(--green); }
.badge-fail { background: rgba(244,71,71,0.15); color: var(--red); }
.badge-adjusted { background: rgba(255,198,77,0.15); color: var(--gold); }
.badge-active { background: rgba(78,201,176,0.15); color: var(--green); }
.badge-maintenance { background: rgba(255,198,77,0.15); color: var(--gold); }
.badge-decommissioned { background: rgba(90,90,90,0.25); color: var(--dim); }
.badge-preventive { background: rgba(0,122,204,0.15); color: #4fc1ff; }
.badge-corrective { background: rgba(244,71,71,0.15); color: var(--red); }
.badge-cleaning { background: rgba(78,201,176,0.15); color: var(--green); }

/* ── ACTION BUTTONS ── */
.action-btn { padding: 4px 12px; border: 1px solid var(--border); background: transparent; color: var(--text); border-radius: 3px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
.action-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.action-btn.primary:hover { filter: brightness(1.15); }
.action-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); }
.form-group input, .form-group select, .form-group textarea { background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 3px; font-size: 12px; font-family: 'DM Sans', sans-serif; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); outline: none; }
.form-group textarea { min-height: 60px; resize: vertical; }

/* ── MODAL (E-Sig) ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 900; display: flex; align-items: center; justify-content: center; }
.modal-box { background: var(--s1); border: 1px solid var(--border); width: 440px; border-radius: 6px; overflow: hidden; }
.modal-header { padding: 14px 18px; background: var(--s2); border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 14px; color: var(--text); margin: 0; }
.modal-header p { font-size: 11px; color: var(--mid); margin: 4px 0 0; }
.modal-body { padding: 16px 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

/* ── AI INSIGHT CARDS ── */
.ai-section { margin-bottom: 20px; }
.ai-card { background: var(--s1); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-top: 10px; }
.ai-card h4 { font-size: 12px; color: var(--text); margin: 0 0 6px; }
.ai-card p { font-size: 11px; color: var(--mid); margin: 0; line-height: 1.5; }
.ai-loading { text-align: center; padding: 24px; color: var(--dim); font-size: 12px; }
.risk-tag { display: inline-flex; padding: 2px 6px; border-radius: 2px; font-size: 9px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
.risk-low { background: rgba(78,201,176,0.15); color: var(--green); }
.risk-medium { background: rgba(255,198,77,0.15); color: var(--gold); }
.risk-high { background: rgba(244,71,71,0.15); color: var(--red); }

/* ── EMPTY STATE ── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-size: 12px; gap: 8px; padding: 40px; text-align: center; }

/* ── DATE FILTER ── */
.date-filter { display: flex; gap: 8px; align-items: center; }
.date-filter input { background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 3px; font-size: 11px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .workbench { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
  .left-panel { max-height: 200px; }
  .resizer-v { display: none; }
  .reading-cards { grid-template-columns: 1fr; }
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .status-bar { font-size: 10px; gap: 8px; padding: 0 8px; }
}
</style>
<script src="../shared/i18n.js"></script>
<script src="../shared/audio.js"></script>
<script src="../shared/nav.js"></script>
</head>

<!-- TITLE BAR -->
<div class="title-bar">
  <div class="title-bar-left">
    <a href="hub.html" class="app-name">Vent<span class="pip"></span></a>
    <button class="mobile-hamburger" onclick="document.querySelector('.title-nav').classList.toggle('open')" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>

      <div class="editor-tab" onclick="switchTab('calibration')">Calibration</div>

      <div class="bottom-tab" onclick="switchBottom('notes',this)">Notes</div>

  </div>

</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span>&#11041; Incubator Logbook</span>
  <span class="s-sep">|</span>
  <span id="statusUnits">Loading&#8230;</span>
  <span class="s-sep">|</span>
  <span id="statusSel">No selection</span>
  <div class="s-right">
    <span id="statusAlarms"></span>
    <span>&#127866; Connected</span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   Incubator Logbook — Frontend Logic
   ═══════════════════════════════════════════════════════════════ */

const SERVER = window.VENT_SERVER || '';
const isDemo = localStorage.getItem('vent_token') === 'demo';

let incubators = [];
let selected = null;
let selectedLogs = [];
let selectedAlarms = [];
let selectedCalibrations = [];
let selectedMaintenances = [];
let currentTab = 'dashboard';
let filter = 'all';
let logLines = [];
let curBottom = 'log';

// ── Demo Mock Data ────────────────────────────────────────────
const DEMO_INCUBATORS = [
  {
    incubator_id: 'INOC-4201', name: 'CO2 Incubator #1', model: 'Thermo Heracell VIOS 160i',
    serial_number: 'THV-2024-0891', location: 'Clean Room A', status: 'active',
    co2_setpoint: 5.0, temp_setpoint: 37.0, humidity_setpoint: 95,
    created_at: '2025-09-15T08:00:00Z',
  },
  {
    incubator_id: 'INOC-4202', name: 'CO2 Incubator #2', model: 'Eppendorf CellXpert C170i',
    serial_number: 'EPC-2024-1102', location: 'Clean Room A', status: 'active',
    co2_setpoint: 5.0, temp_setpoint: 37.0, humidity_setpoint: 95,
    created_at: '2025-10-01T08:00:00Z',
  },
  {
    incubator_id: 'INOC-4203', name: 'CO2 Incubator #3 (Backup)', model: 'NuAire NU-5820',
    serial_number: 'NAI-2023-0332', location: 'Clean Room B', status: 'maintenance',
    co2_setpoint: 5.0, temp_setpoint: 37.0, humidity_setpoint: 90,
    created_at: '2025-06-20T08:00:00Z',
  },
];

function demoLogs(id) {
  const now = Date.now();
  return Array.from({ length: 24 }, (_, i) => ({
    log_id: 'ILOG-' + (5000 + i),
    incubator_id: id,
    recorded_by: 'Operator A',
    recorded_at: new Date(now - i * 3600000).toISOString(),
    temperature: 37.0 + (Math.random() - 0.5) * 0.6,
    co2_level: 5.0 + (Math.random() - 0.5) * 0.4,
    humidity: 95 + (Math.random() - 0.5) * 3,
    door_openings: Math.floor(Math.random() * 3),
    status: i === 5 ? 'warning' : 'normal',
    notes: '',
  }));
}

function demoAlarms(id) {
  return [
    { alarm_id: 'IALM-3001', incubator_id: id, alarm_type: 'temp_high', severity: 'warning', triggered_at: '2026-03-04T14:22:00Z', acknowledged_by: 'Eng. B', acknowledged_at: '2026-03-04T14:30:00Z', resolved_at: '2026-03-04T15:10:00Z', notes: 'Brief excursion after door left open' },
    { alarm_id: 'IALM-3002', incubator_id: id, alarm_type: 'co2_low', severity: 'critical', triggered_at: '2026-03-01T09:15:00Z', acknowledged_by: null, acknowledged_at: null, resolved_at: null, notes: 'CO2 supply pressure low' },
  ];
}

function demoCalibrations(id) {
  return [
    { calibration_id: 'ICAL-2001', incubator_id: id, calibrated_by: 'Eng. C', calibrated_role: 'engineering', calibration_date: '2026-02-15', next_due: '2026-08-15', temp_offset: 0.1, co2_offset: -0.05, humidity_offset: 0.3, result: 'pass', certificate_ref: 'CAL-2026-0042', notes: 'Annual calibration', esig_user: 'Eng. C', esig_at: '2026-02-15T10:00:00Z', esig_reason: 'Calibration verified' },
  ];
}

function demoMaintenances(id) {
  return [
    { maintenance_id: 'IMNT-1001', incubator_id: id, type: 'preventive', description: 'HEPA filter replacement', performed_by: 'Eng. D', performed_role: 'engineering', performed_at: '2026-02-01T09:00:00Z', next_due: '2026-08-01', status: 'completed', notes: 'Filter replaced per PM schedule', esig_user: 'Eng. D', esig_at: '2026-02-01T10:00:00Z', esig_reason: 'PM completed' },
    { maintenance_id: 'IMNT-1002', incubator_id: id, type: 'cleaning', description: 'Interior decontamination cycle', performed_by: 'Operator A', performed_role: 'operator', performed_at: '2026-03-01T07:00:00Z', next_due: '2026-04-01', status: 'completed', notes: '', esig_user: null, esig_at: null, esig_reason: null },
  ];
}

// ── Data Loading ──────────────────────────────────────────────

async function loadIncubators() {
  try {
    addLog('Fetching incubators...', 'info');
    const res = await authFetch(SERVER + '/inoc/incubators');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    incubators = await res.json();
    addLog(incubators.length + ' incubators loaded', 'info');
  } catch (err) {
    addLog('Fetch failed: ' + err.message, 'error');
    incubators = [];
  }

  if (incubators.length === 0 && isDemo) {
    incubators = DEMO_INCUBATORS;
    addLog('Demo mode: loaded ' + incubators.length + ' mock incubators', 'warn');
  }

  renderLeft();
  document.getElementById('statusUnits').textContent = incubators.length + ' units';
}

async function loadUnitDetail(incubatorId) {
  try {
    if (isDemo) {
      selectedLogs = demoLogs(incubatorId);
      selectedAlarms = demoAlarms(incubatorId);
      selectedCalibrations = demoCalibrations(incubatorId);
      selectedMaintenances = demoMaintenances(incubatorId);
    } else {
      const [logsRes, alarmsRes, calRes, mntRes] = await Promise.all([
        authFetch(SERVER + '/inoc/incubators/' + incubatorId + '/logs?limit=200'),
        authFetch(SERVER + '/inoc/incubators/' + incubatorId + '/alarms'),
        authFetch(SERVER + '/inoc/incubators/' + incubatorId + '/calibrations'),
        authFetch(SERVER + '/inoc/incubators/' + incubatorId + '/maintenance'),
      ]);
      selectedLogs = logsRes.ok ? await logsRes.json() : [];
      selectedAlarms = alarmsRes.ok ? await alarmsRes.json() : [];
      selectedCalibrations = calRes.ok ? await calRes.json() : [];
      selectedMaintenances = mntRes.ok ? await mntRes.json() : [];
    }
  } catch (err) {
    addLog('Detail load failed: ' + err.message, 'error');

function getReadingStatus(val, setpoint, warnThresh, alarmThresh) {
  if (val == null || setpoint == null) return 'normal';
  const dev = Math.abs(val - setpoint);
  if (dev > alarmThresh) return 'alarm';
  if (dev > warnThresh) return 'warning';
  return 'normal';
}

function drawSparkline(canvasId, values, setpoint) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w * 2;
  canvas.height = h * 2;
  ctx.scale(2, 2);

  const vals = values.filter(v => v != null);
  if (vals.length < 2) return;

  const min = Math.min(...vals) - 0.5;
  const max = Math.max(...vals) + 0.5;
  const range = max - min || 1;

  // Setpoint line
  if (setpoint != null) {
    const sy = h - ((setpoint - min) / range) * h;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(w, sy);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Data line
  ctx.strokeStyle = '#007acc';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = (i / (vals.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

      <span style="font-size:11px;color:var(--dim);margin-left:auto;">${selectedMaintenances.length} records</span>
    </div>
    ${upcoming.length ? '<div class="section-label">Upcoming PM</div>' + upcoming.map(m => '<div style="font-size:11px;color:var(--mid);margin-bottom:4px;">' + m.next_due + ' — ' + esc(m.description || m.type) + '</div>').join('') : ''}
    <div class="section-label">History</div>
    <table class="data-table">
      <thead><tr><th>Date</th><th>Type</th><th>Description</th><th>By</th><th>Status</th><th>Next Due</th><th>E-Sig</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="7" style="text-align:center;color:var(--dim);">No maintenance records.</td></tr>'}</tbody>
    </table>
  `;
}

function openMaintenanceModal() {
  if (!selected) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'mntModal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header"><h3>Add Maintenance Record</h3><p>${esc(selected.incubator_id)}</p></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label>Type</label>
            <select id="mMntType"><option value="preventive">Preventive</option><option value="corrective">Corrective</option><option value="cleaning">Cleaning</option></select>
          </div>
          <div class="form-group"><label>Next Due</label><input type="date" id="mMntNext"></div>
          <div class="form-group full"><label>Description</label><textarea id="mMntDesc" rows="2"></textarea></div>
          <div class="form-group full"><label>Notes</label><textarea id="mMntNotes" rows="2"></textarea></div>
        </div>
        <div class="section-label" style="margin-top:16px;">Electronic Signature (optional)</div>
        <div class="form-grid">
          <div class="form-group"><label>Full Name</label><input type="text" id="mMntEsig" value="${esc(localStorage.getItem('vent_name') || '')}"></div>
          <div class="form-group"><label>Reason</label><input type="text" id="mMntEsigReason" value="Maintenance completed per SOP"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn" onclick="closeModal('mntModal')">Cancel</button>
        <button class="action-btn primary" onclick="submitMaintenance()">Save</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function submitMaintenance() {
  if (!selected) return;
  const esigUser = document.getElementById('mMntEsig').value.trim() || null;
  const body = {
    type: document.getElementById('mMntType').value,
    description: document.getElementById('mMntDesc').value.trim(),
    nextDue: document.getElementById('mMntNext').value || null,
    notes: document.getElementById('mMntNotes').value.trim(),
    esigUser,
    esigReason: esigUser ? document.getElementById('mMntEsigReason').value : null,
  };

  try {
    const res = await authFetch(SERVER + '/inoc/incubators/' + selected.incubator_id + '/maintenance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    addLog('Maintenance saved: ' + result.maintenanceId, 'info');
    closeModal('mntModal');
    await loadUnitDetail(selected.incubator_id);
    renderCenter();
  } catch (err) {
    addLog('Maintenance failed: ' + err.message, 'error');
  }
}

// ── AI Insights Tab ───────────────────────────────────────────

function renderAiTab() {
  document.getElementById('centerContent').innerHTML = `
    <div class="ai-section">
      <div class="section-label">Parameter Trending</div>
      <p style="font-size:11px;color:var(--mid);margin:0 0 8px;">Analyses temperature, CO2, and humidity trends over time.</p>
      <button class="action-btn" onclick="runTrending()">Generate Analysis</button>
      <div id="aiTrending"></div>
    </div>
    <div class="ai-section">
      <div class="section-label">Alarm Pattern Analysis</div>
      <p style="font-size:11px;color:var(--mid);margin:0 0 8px;">Identifies recurring alarm patterns and root cause correlations.</p>
      <button class="action-btn" onclick="runAlarmPatterns()">Generate Analysis</button>
      <div id="aiAlarms"></div>
    </div>
    <div class="ai-section">
      <div class="section-label">Capacity Planning</div>
      <p style="font-size:11px;color:var(--mid);margin:0 0 8px;">Fleet-wide utilisation analysis and projections.</p>
      <button class="action-btn" onclick="runCapacity()">Generate Analysis</button>
      <div id="aiCapacity"></div>
    </div>
  `;
}

async function runTrending() {
  if (!selected) return;
  const el = document.getElementById('aiTrending');
  el.innerHTML = '<div class="ai-loading">Analysing trends...</div>';
  try {
    const res = await authFetch(SERVER + '/inoc/incubators/' + selected.incubator_id + '/trending');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    el.innerHTML = renderAiResult(data);
    addLog('Trending analysis complete', 'info');
  } catch (err) {
    el.innerHTML = '<div class="ai-card"><p style="color:var(--red);">Error: ' + esc(err.message) + '</p></div>';
    addLog('Trending failed: ' + err.message, 'error');
  }
}

async function runAlarmPatterns() {
  if (!selected) return;
  const el = document.getElementById('aiAlarms');
  el.innerHTML = '<div class="ai-loading">Analysing alarm patterns...</div>';
  try {
    const res = await authFetch(SERVER + '/inoc/incubators/' + selected.incubator_id + '/alarm-patterns');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    el.innerHTML = renderAiResult(data);
    addLog('Alarm pattern analysis complete', 'info');
  } catch (err) {
    el.innerHTML = '<div class="ai-card"><p style="color:var(--red);">Error: ' + esc(err.message) + '</p></div>';
  }
}

async function runCapacity() {
  const el = document.getElementById('aiCapacity');
  el.innerHTML = '<div class="ai-loading">Analysing fleet capacity...</div>';
  try {
    const res = await authFetch(SERVER + '/inoc/incubators/capacity');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    el.innerHTML = renderAiResult(data);
    addLog('Capacity analysis complete', 'info');
  } catch (err) {
    el.innerHTML = '<div class="ai-card"><p style="color:var(--red);">Error: ' + esc(err.message) + '</p></div>';
  }
}

function renderAiResult(data) {
  if (data.summary) {
    let html = '<div class="ai-card"><h4>Summary</h4><p>' + esc(data.summary) + '</p></div>';

    if (data.risk_level || data.risk_score || data.stability_score) {
      const level = data.risk_level || data.risk_score || data.stability_score;
      html += '<div style="margin-top:8px;"><span class="risk-tag risk-' + level + '">' + level + '</span></div>';
    }

    const lists = ['trends', 'patterns', 'recommendations', 'drift_alerts', 'correlations', 'utilisation', 'projections', 'maintenance_alerts', 'usage_patterns', 'anomalies'];
    lists.forEach(key => {
      if (data[key] && Array.isArray(data[key]) && data[key].length > 0) {
        html += '<div class="ai-card"><h4>' + key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) + '</h4>';
        data[key].forEach(item => {
          if (typeof item === 'string') {
            html += '<p>' + esc(item) + '</p>';
          } else {
            html += '<p>';
            Object.entries(item).forEach(([k, v]) => {
              html += '<strong>' + esc(k) + ':</strong> ' + esc(String(v)) + '<br>';
            });
            html += '</p>';
          }
        });
        html += '</div>';
      }
    });

    return html;
  }
  return '<div class="ai-card"><p>' + esc(JSON.stringify(data)) + '</p></div>';
}

// ── E-Signature Modal ─────────────────────────────────────────

function openEsigModal(action, entityId, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'esigModal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header"><h3>Electronic Signature Required</h3><p>Action: <strong>${esc(action)}</strong> &mdash; ${esc(entityId)}</p></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label>Full Name</label><input type="text" id="esigName" value="${esc(localStorage.getItem('vent_name') || '')}"></div>
          <div class="form-group"><label>Meaning</label>
            <select id="esigMeaning"><option>Approved</option><option>Reviewed</option><option>Acknowledged</option></select>
          </div>
          <div class="form-group full"><label>Reason</label><textarea id="esigReason" placeholder="Required..." rows="2"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="action-btn" onclick="closeModal('esigModal')">Cancel</button>
        <button class="action-btn primary" onclick="confirmEsig()">Sign</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  window._esigCallback = callback;
}

function confirmEsig() {
  const name = document.getElementById('esigName').value.trim();
  const reason = document.getElementById('esigReason').value.trim();
  if (!name || !reason) { alert('Name and reason are required for e-signature.'); return; }
  closeModal('esigModal');
  if (window._esigCallback) window._esigCallback(name, reason);
  window._esigCallback = null;
}

// ── Add Incubator Modal ───────────────────────────────────────

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'addUnitModal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-header"><h3>Register New Incubator</h3></div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label>Name *</label><input type="text" id="mUnitName" placeholder="e.g. CO2 Incubator #4"></div>

          <div class="form-group"><label>Serial Number</label><input type="text" id="mUnitSerial"></div>
          <div class="form-group"><label>Location</label><input type="text" id="mUnitLoc"></div>

          <div class="form-group"><label>CO2 Setpoint (%)</label><input type="number" step="0.1" id="mUnitCO2" value="5.0"></div>
          <div class="form-group"><label>Humidity Setpoint (%)</label><input type="number" step="0.1" id="mUnitHum" value="95"></div>
        </div>

      <div class="modal-footer">

async function submitNewUnit() {
  const name = document.getElementById('mUnitName').value.trim();
  if (!name) { alert('Name is required.'); return; }

  const body = {
    name,
    model: document.getElementById('mUnitModel').value.trim(),
    serialNumber: document.getElementById('mUnitSerial').value.trim(),
    location: document.getElementById('mUnitLoc').value.trim(),
    tempSetpoint: parseFloat(document.getElementById('mUnitTemp').value) || null,
    co2Setpoint: parseFloat(document.getElementById('mUnitCO2').value) || null,
    humiditySetpoint: parseFloat(document.getElementById('mUnitHum').value) || null,
  };

  try {
    const res = await authFetch(SERVER + '/inoc/incubators', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const result = await res.json();
    addLog('Incubator registered: ' + result.incubatorId, 'info');
    closeModal('addUnitModal');
    await loadIncubators();
  } catch (err) {
    addLog('Register failed: ' + err.message, 'error');
  }
}

// ── Modal Utils ───────────────────────────────────────────────

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

// ── Activity Log ──────────────────────────────────────────────

function addLog(msg, level) {
  level = level || 'info';
  const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
  logLines.unshift({ t, msg, level });
  if (logLines.length > 100) logLines.pop();
  if (curBottom === 'log') renderLog();
}

function renderLog() {
  document.getElementById('bottomContent').innerHTML = logLines.map(l =>
    '<div class="log-line"><span class="log-time">' + l.t + '</span><span class="log-' + l.level + '">[' + l.level.toUpperCase() + ']</span><span>' + esc(l.msg) + '</span></div>'
  ).join('');
}

function switchBottom(tab, el) {
  curBottom = tab;
  document.querySelectorAll('.bottom-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'log') renderLog();
  else if (tab === 'notes') renderNotesTab();
}

function renderNotesTab() {
  document.getElementById('bottomContent').innerHTML = '<textarea style="width:100%;height:100%;background:transparent;border:none;color:var(--text);font-family:\'JetBrains Mono\',monospace;font-size:11px;resize:none;outline:none;" placeholder="Session notes..."></textarea>';
}

// ── Resizer ───────────────────────────────────────────────────

(function() {
  const wb = document.getElementById('workbench');
  const rLC = document.getElementById('resizerLC');

  let startX, startW;
  rLC.addEventListener('mousedown', function(e) {
    startX = e.clientX;
    startW = parseFloat(getComputedStyle(wb).gridTemplateColumns.split(' ')[0]);
    rLC.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';

    function onMove(ev) {
      const nw = Math.max(180, Math.min(500, startW + (ev.clientX - startX)));
      wb.style.gridTemplateColumns = nw + 'px 4px 1fr';
    }
    function onUp() {
      rLC.classList.remove('dragging');
      document.body.style.userSelect = '';
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Helpers ───────────────────────────────────────────────────

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ── Init ──────────────────────────────────────────────────────

addLog('Incubator Logbook initialised', 'info');
loadIncubators();
</script>
