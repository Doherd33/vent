<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140">
  <rect width="500" height="140" fill="#0e0e12" rx="8"/>
  <!-- V mark made of connected nodes - like a system/network -->
  <line x1="50" y1="25" x2="80" y2="70" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="80" y1="70" x2="110" y2="25" stroke="#6366f1" stroke-width="2.5"/>
  <!-- Nodes at connection points -->
  <circle cx="50" cy="25" r="4" fill="#6366f1"/>
  <circle cx="80" cy="70" r="5" fill="#8b5cf6"/>
  <circle cx="110" cy="25" r="4" fill="#6366f1"/>
  <!-- Branch lines - representing modules/departments -->
  <line x1="50" y1="25" x2="35" y2="18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <circle cx="35" cy="18" r="2.5" fill="#6366f1" opacity="0.5"/>
  <line x1="110" y1="25" x2="125" y2="18" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
  <circle cx="125" cy="18" r="2.5" fill="#6366f1" opacity="0.5"/>
  <line x1="80" y1="70" x2="80" y2="85" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="80" cy="85" r="2.5" fill="#8b5cf6" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="155" y="62" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="700" fill="#e2e2e8" letter-spacing="8">VENT</text>
  <!-- Tagline -->
  <text x="158" y="82" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#6366f1" letter-spacing="4" font-weight="400">MANUFACTURING INTELLIGENCE</text>
</svg>