<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent — Manufacturing Site Platform</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0e0e12;color:#c8c8d0;font-family:'DM Sans',system-ui,sans-serif;padding:1.5rem;min-height:100vh}
  h1{font-family:'Instrument Serif',Georgia,serif;font-size:1.8rem;color:#fff;margin-bottom:.2rem}
  .subtitle{color:#666;font-size:.8rem;margin-bottom:1.5rem}
  .top-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .role-bar{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
  .role-btn{padding:.3rem .7rem;border-radius:5px;border:1px solid #2a2a35;background:#16161e;color:#888;cursor:pointer;font-size:.7rem;transition:all .15s}
  .role-btn:hover{border-color:#555;color:#ccc}
  .role-btn.active{border-color:#6c5ce7;color:#6c5ce7;background:#6c5ce71a}
  .quick-actions{display:flex;gap:.4rem;flex-wrap:wrap}
  .qa-btn{padding:.3rem .6rem;border-radius:5px;border:1px solid #2a2a35;background:#16161e;color:#888;cursor:pointer;font-size:.7rem;transition:all .15s}
  .qa-btn:hover{border-color:#6c5ce7;color:#ccc}

  /* Filter bar */
  .filter-bar{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  .filter-btn{padding:.25rem .6rem;border-radius:4px;border:1px solid #2a2a35;background:transparent;color:#555;cursor:pointer;font-size:.65rem;transition:all .15s}
  .filter-btn:hover{color:#ccc;border-color:#555}
  .filter-btn.active{color:#fff;border-color:#fff;background:#ffffff10}
  .filter-btn.f-live{color:#00b894;border-color:#00b89440}
  .filter-btn.f-live.active{background:#00b89420;border-color:#00b894}
  .filter-btn.f-wip{color:#fdcb6e;border-color:#fdcb6e40}
  .filter-btn.f-wip.active{background:#fdcb6e20;border-color:#fdcb6e}
  .filter-btn.f-planned{color:#74b9ff;border-color:#74b9ff40}
  .filter-btn.f-planned.active{background:#74b9ff20;border-color:#74b9ff}

  /* Stats */
  .stats{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap}
  .stat{font-size:.7rem;color:#555}
  .stat strong{color:#ccc;font-size:.85rem}

  /* Board */
  .board{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:1rem;align-items:flex-start}
  .column{min-width:240px;max-width:270px;flex-shrink:0;background:#13131a;border:1px solid #2a2a35;border-radius:10px;display:flex;flex-direction:column;transition:opacity .2s}
  .column.filtered-out{opacity:.15;pointer-events:none}
  .col-header{padding:.6rem .75rem;display:flex;align-items:center;justify-content:space-between;cursor:grab;border-bottom:1px solid #1e1e28;user-select:none}
  .col-header:active{cursor:grabbing}
  .col-title{color:#fff;font-size:.78rem;font-weight:600}
  .col-dept{color:#444;font-size:.6rem;margin-top:.1rem}
  .col-count{color:#555;font-size:.65rem;white-space:nowrap}
  .col-body{padding:.4rem;display:flex;flex-direction:column;gap:.4rem;min-height:50px;max-height:70vh;overflow-y:auto}
  .col-body::-webkit-scrollbar{width:3px}
  .col-body::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:3px}

  /* Cards */
  .card{background:#16161e;border:1px solid #2a2a35;border-radius:7px;padding:.75rem;cursor:grab;transition:all .15s;text-decoration:none;display:block;color:inherit}
  .card:active{cursor:grabbing}
  .card:hover{border-color:#6c5ce7;box-shadow:0 2px 12px #6c5ce720}
  .card.status-live{border-left:2px solid #00b894}
  .card.status-wip{border-left:2px solid #fdcb6e}
  .card.status-planned{border-left:2px solid #74b9ff}
  .card-top{display:flex;align-items:center;gap:.35rem;margin-bottom:.3rem;flex-wrap:wrap}
  .card-title{color:#fff;font-size:.8rem;font-weight:600}
  .card-desc{color:#555;font-size:.68rem;line-height:1.35}
  .card-path{color:#333;font-size:.6rem;margin-top:.3rem;font-family:'JetBrains Mono',monospace}
  .card-badge{display:inline-block;padding:.1rem .35rem;border-radius:3px;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .badge-live{background:#00b89425;color:#00b894}
  .badge-wip{background:#fdcb6e25;color:#fdcb6e}
  .badge-planned{background:#74b9ff20;color:#74b9ff}
  .card-roles{margin-top:.3rem;display:flex;gap:.25rem;flex-wrap:wrap}
  .card-role{font-size:.55rem;color:#444;background:#ffffff06;padding:.1rem .3rem;border-radius:3px}

  /* Drag states */
  .card.dragging{opacity:.4;transform:scale(.95)}
  .column.drag-over{border-color:#6c5ce7;background:#6c5ce708}
  .column.col-dragging{opacity:.5;transform:scale(.97)}

  .status-bar{position:fixed;bottom:1rem;right:1rem;padding:.4rem .8rem;border-radius:5px;font-size:.7rem;background:#00b89420;color:#00b894;border:1px solid #00b89440}
  .hint{color:#333;font-size:.65rem;margin-bottom:.75rem}
</style>
</head>
<body>

<h1>Vent — Manufacturing Site Platform</h1>
<p class="subtitle">Full facility coverage. Every department, every workflow, every role.</p>

<div class="top-bar">
  <div class="role-bar" id="roleBar">
    <span style="color:#444;font-size:.7rem;margin-right:.25rem">Role:</span>
    <button class="role-btn" data-role="operator">Operator</button>
    <button class="role-btn" data-role="qa">QA</button>
    <button class="role-btn" data-role="qc">QC</button>
    <button class="role-btn" data-role="director">Director</button>
    <button class="role-btn" data-role="msat">MSAT</button>
    <button class="role-btn" data-role="engineering">Engineering</button>
    <button class="role-btn" data-role="validation">Validation</button>
    <button class="role-btn" data-role="supply_chain">Supply Chain</button>
    <button class="role-btn" data-role="ehs">EHS</button>
    <button class="role-btn" data-role="regulatory">Regulatory</button>
    <button class="role-btn" data-role="training">Training</button>
    <button class="role-btn" data-role="it">IT / Digital</button>
    <button class="role-btn active" data-role="admin">Admin</button>
  </div>
  <div class="quick-actions">
    <button class="qa-btn" onclick="window.location='/project.html'" style="border-color:#6c5ce740;color:#6c5ce7">Project Centre</button>
    <button class="qa-btn" onclick="clearAndLogin()">Re-auth</button>
    <button class="qa-btn" onclick="openDemo()">Demo tour</button>
    <button class="qa-btn" onclick="resetBoard()">Reset layout</button>
    <button class="qa-btn" onclick="localStorage.clear();location.reload()">Nuke</button>
  </div>
</div>

<div class="filter-bar">
  <span style="color:#444;font-size:.65rem;margin-right:.25rem">Show:</span>
  <button class="filter-btn f-live active" data-filter="live" onclick="toggleFilter(this)">Live</button>
  <button class="filter-btn f-wip active" data-filter="wip" onclick="toggleFilter(this)">In Progress</button>
  <button class="filter-btn f-planned active" data-filter="planned" onclick="toggleFilter(this)">Planned</button>
</div>

<div class="stats" id="stats"></div>

<p class="hint">Drag columns to reorder. Drag cards between columns. Double-click to open live pages. Layout persists.</p>

<div class="board" id="board"></div>

<div class="status-bar" id="status">Authenticated as <strong>admin</strong></div>

<script>
// ── Module definitions: entire manufacturing facility ──
var ALL_PAGES = [

  { id:'charlie',         title:'Charlie AI',              desc:'Ask SOPs in plain language. Get sourced, step-by-step answers. Works with gloves on via voice.',  path:'/query.html',        status:'live',    roles:['operator','qa','msat','engineering','admin'] },
  { id:'hub',             title:'Hub',                     desc:'Central landing — role-filtered feature cards, batch status, shift info.',                        path:'/hub.html',          status:'live',    roles:['all'] },

  { id:'batch-sampling',  title:'Sampling & Chain of Custody', desc:'Sample collection, labelling, chain of custody to QC. Barcode-tracked, time-stamped.',          path:null,              status:'planned', roles:['operator','qc'] },
  { id:'batch-weight',    title:'Weighing & Dispensing',   desc:'Material verification by barcode, tare/gross/net auto-calc, yield calculations, tolerance checks.', path:null,              status:'planned', roles:['operator'] },

];

var STORAGE_KEY = 'vent_dev_board_v4';
var activeFilters = { live:true, wip:true, planned:true };

function getPageById(id){ return ALL_PAGES.find(function(p){ return p.id === id; }); }

// ── Stats ──
function renderStats(){
  var live = ALL_PAGES.filter(function(p){ return p.status === 'live'; }).length;
  var wip = ALL_PAGES.filter(function(p){ return p.status === 'wip'; }).length;
  var planned = ALL_PAGES.filter(function(p){ return p.status === 'planned'; }).length;
  document.getElementById('stats').innerHTML =
    '<div class="stat"><strong style="color:#00b894">' + live + '</strong> live</div>' +
    '<div class="stat"><strong style="color:#fdcb6e">' + wip + '</strong> in progress</div>' +
    '<div class="stat"><strong style="color:#74b9ff">' + planned + '</strong> planned</div>' +
    '<div class="stat"><strong style="color:#fff">' + ALL_PAGES.length + '</strong> total modules</div>' +
    '<div class="stat"><strong style="color:#fff">' + DEFAULT_COLUMNS.length + '</strong> columns</div>';
}

// ── Filters ──
function toggleFilter(btn){
  var f = btn.dataset.filter;
  activeFilters[f] = !activeFilters[f];
  btn.classList.toggle('active', activeFilters[f]);
  applyFilters();
}

function applyFilters(){
  document.querySelectorAll('.card').forEach(function(card){
    var page = getPageById(card.dataset.id);
    if(!page) return;
    var visible = activeFilters[page.status];
    card.style.display = visible ? '' : 'none';
  });
  updateCounts();
}

// ── Load/save layout ──
function loadLayout(){
  try {
    var saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(saved && saved.length) return saved;
  } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
}

function saveLayout(){
  var cols = [];
  document.querySelectorAll('.column').forEach(function(colEl){
    var cards = [];
    colEl.querySelectorAll('.card').forEach(function(c){ cards.push(c.dataset.id); });
    cols.push({ id: colEl.dataset.colId, title: colEl.querySelector('.col-title').textContent, cards: cards });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cols));
}

// ── Auth ──
function setAuth(role){
  localStorage.setItem('vent_token', 'demo');
  localStorage.setItem('vent_role', role || 'admin');
  localStorage.setItem('vent_name', 'Dev');
  localStorage.setItem('vent_user_id', 'dev-user');
}
setAuth(localStorage.getItem('vent_role') || 'admin');

// ── Render board ──
function renderBoard(){
  var board = document.getElementById('board');
  board.innerHTML = '';
  var layout = loadLayout();

  layout.forEach(function(col){
    var colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;

    var visibleCount = 0;
    var liveCount = 0;

    var header = document.createElement('div');
    header.className = 'col-header';
    header.draggable = true;

    var body = document.createElement('div');
    body.className = 'col-body';

    col.cards.forEach(function(cardId){
      var page = getPageById(cardId);
      if(!page) return;
      if(page.status === 'live') liveCount++;

      var card = document.createElement('div');
      card.className = 'card status-' + page.status;
      card.draggable = true;
      card.dataset.id = page.id;

      var rolesHtml = '';
      if(page.roles && page.roles[0] !== 'all'){
        page.roles.slice(0,4).forEach(function(r){
          rolesHtml += '<span class="card-role">' + r + '</span>';
        });
        if(page.roles.length > 4) rolesHtml += '<span class="card-role">+' + (page.roles.length - 4) + '</span>';
      }

      card.innerHTML =
        '<div class="card-top">' +
          '<span class="card-badge badge-' + page.status + '">' + page.status.toUpperCase() + '</span>' +
          '<span class="card-title">' + page.title + '</span>' +
        '</div>' +
        '<div class="card-desc">' + page.desc + '</div>' +
        (page.path ? '<div class="card-path">' + page.path + '</div>' : '') +
        (rolesHtml ? '<div class="card-roles">' + rolesHtml + '</div>' : '');

      if(!activeFilters[page.status]) card.style.display = 'none';
      else visibleCount++;

      // Double-click to navigate (live pages only)
      if(page.path){
        card.addEventListener('dblclick', function(e){
          e.preventDefault();
          window.location.href = page.path;
        });
      }

      body.appendChild(card);
    });

    header.innerHTML =
      '<div><span class="col-title">' + col.title + '</span></div>' +
      '<span class="col-count">' + liveCount + '/' + col.cards.length + '</span>';

    colEl.appendChild(header);
    colEl.appendChild(body);
    board.appendChild(colEl);
  });

  setupDragAndDrop();
  renderStats();
}

// ── Drag & Drop ──
var dragItem = null;
var dragType = null;

function setupDragAndDrop(){
  document.querySelectorAll('.card').forEach(function(card){
    card.addEventListener('dragstart', function(e){
      dragItem = card;
      dragType = 'card';
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', function(){
      card.classList.remove('dragging');
      dragItem = null;
      dragType = null;
      saveLayout();
    });
  });

  document.querySelectorAll('.col-header').forEach(function(header){
    header.addEventListener('dragstart', function(e){
      var col = header.closest('.column');
      dragItem = col;
      dragType = 'column';
      col.classList.add('col-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', col.dataset.colId);
    });
    header.addEventListener('dragend', function(){
      header.closest('.column').classList.remove('col-dragging');
      dragItem = null;
      dragType = null;
      saveLayout();
    });
  });

  document.querySelectorAll('.col-body').forEach(function(body){
    body.addEventListener('dragover', function(e){
      if(dragType !== 'card') return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      body.closest('.column').classList.add('drag-over');
      var after = getAfter(body, e.clientY);
      if(after) body.insertBefore(dragItem, after);
      else body.appendChild(dragItem);
    });
    body.addEventListener('dragleave', function(e){
      var col = body.closest('.column');
      if(!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
    });
    body.addEventListener('drop', function(e){
      e.preventDefault();
      body.closest('.column').classList.remove('drag-over');
      updateCounts();
      saveLayout();
    });
  });

  var board = document.getElementById('board');
  board.addEventListener('dragover', function(e){
    if(dragType !== 'column') return;
    e.preventDefault();
    var after = getAfterCol(board, e.clientX);
    if(after) board.insertBefore(dragItem, after);
    else board.appendChild(dragItem);
  });
  board.addEventListener('drop', function(e){
    if(dragType !== 'column') return;
    e.preventDefault();
    saveLayout();
  });
}

function getAfter(container, y){
  var els = Array.from(container.querySelectorAll('.card:not(.dragging)'));
  var closest = null, closestOff = Number.NEGATIVE_INFINITY;
  els.forEach(function(el){
    var box = el.getBoundingClientRect();
    var off = y - box.top - box.height/2;
    if(off < 0 && off > closestOff){ closestOff = off; closest = el; }
  });
  return closest;
}

function getAfterCol(board, x){
  var cols = Array.from(board.querySelectorAll('.column:not(.col-dragging)'));
  var closest = null, closestOff = Number.NEGATIVE_INFINITY;
  cols.forEach(function(col){
    var box = col.getBoundingClientRect();
    var off = x - box.left - box.width/2;
    if(off < 0 && off > closestOff){ closestOff = off; closest = col; }
  });
  return closest;
}

function updateCounts(){
  document.querySelectorAll('.column').forEach(function(col){
    var total = col.querySelectorAll('.card').length;
    var live = col.querySelectorAll('.card.status-live').length;
    col.querySelector('.col-count').textContent = live + '/' + total;
  });
}

        // Stale data — nuke it
        localStorage.removeItem(STORAGE_KEY);
      }
    }
  }
} catch(e){ localStorage.removeItem(STORAGE_KEY); }

try {
  renderBoard();
} catch(err){
  document.getElementById('board').innerHTML =
    '<div style="color:#e17260;padding:2rem;font-size:.85rem">' +
    '<strong>Board render error:</strong> ' + err.message +
    '<br><br><button onclick="localStorage.removeItem(\'' + STORAGE_KEY + '\');location.reload()" ' +
    'style="padding:.5rem 1rem;background:#e17260;color:#fff;border:none;border-radius:6px;cursor:pointer">' +
    'Clear board data &amp; reload</button></div>';
}
