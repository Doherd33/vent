<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · Observation Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/styles.css">
<style>
html, body { height: 100%; }
body {
  font-weight: 400;
  min-height: 100vh;
}

@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.ref-chip {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim);
  background: var(--s2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px;
}
.priority-pill {
  font-size: 11px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 100px;
}
.p-high   { background: var(--red2);   color: var(--red); }
.p-medium { background: var(--gold2);  color: var(--gold); }
.p-low    { background: var(--green2); color: var(--green); }
.new-btn {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 14px; cursor: pointer; text-decoration: none;
  transition: border-color .15s, color .15s;
}
.new-btn:hover { border-color: var(--borderhi); color: var(--text); }

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 32px 24px 80px;
  animation: fadeUp .4s ease both;
}

/* ── HERO ── */
.hero {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 28px 32px; margin-bottom: 16px;
}
.hero-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--green); font-weight: 400; margin-bottom: 14px;
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: breathe 2s ease-in-out infinite; }
.hero-title {
  font-family: 'Instrument Serif', serif;
  font-size: 28px; line-height: 1.25; color: var(--text); margin-bottom: 6px;
}
.hero-title em { color: var(--accent); font-style: italic; }
.hero-sub { font-size: 14px; color: var(--mid); margin-bottom: 20px; line-height: 1.6; }
.obs-quote {
  background: var(--s2); border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0; padding: 14px 18px;
  font-family: 'Instrument Serif', serif; font-style: italic;
  font-size: 15px; color: var(--mid); line-height: 1.7; margin-bottom: 18px;
}
.meta-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.meta-chip {
  font-size: 11px; padding: 4px 10px; border-radius: 4px;
  background: var(--s3); border: 1px solid var(--border);
  color: var(--mid); display: flex; align-items: center; gap: 5px;
}
.chip-hi { background: var(--accent2); border-color: rgba(27,95,204,.2); color: var(--accent); }

/* ── WORKFLOW STATUS TRACKER ── */
.status-tracker {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px 24px; margin-bottom: 32px;
  display: flex; align-items: flex-start;
}
.st-step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.st-step + .st-step::before {
  content: ''; position: absolute; right: 50%; top: 11px;
  width: 100%; height: 1px; background: var(--border); z-index: 0;
}
.st-step.done + .st-step::before { background: var(--green); }
.st-step.active + .st-step::before { background: linear-gradient(to right, var(--accent), var(--border)); }
.st-dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--dim); font-family: 'JetBrains Mono', monospace;
  position: relative; z-index: 1;
}
.st-step.active .st-dot { border-color: var(--accent); background: var(--accent2); color: var(--accent); }
.st-step.done   .st-dot { border-color: var(--green);  background: var(--green2);  color: var(--green); }
.st-label { font-size: 10px; color: var(--dim); margin-top: 7px; text-align: center; letter-spacing: .02em; }
.st-step.active .st-label { color: var(--accent); font-weight: 500; }
.st-step.done   .st-label { color: var(--mid); }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px; letter-spacing: .09em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 20px; font-weight: 400;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── WORKFLOW PHASES ── */
.workflow { position: relative; padding-left: 0; }
.workflow-line {
  position: absolute; left: 18px; top: 38px; bottom: 80px;
  width: 1px; background: var(--border);
}

.phase-block {
  display: flex; gap: 20px; margin-bottom: 28px;
  animation: fadeUp .4s ease both;
}
.phase-icon { flex-shrink: 0; width: 38px; }
.phase-dot {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 13px;
  position: relative; z-index: 1;
  transition: all .2s;
}
.phase-active   .phase-dot { background: var(--accent2); border: 2px solid var(--accent); color: var(--accent); box-shadow: 0 0 0 5px rgba(27,95,204,0.06); }
.phase-upcoming .phase-dot { background: var(--s1); border: 1.5px solid var(--border); color: var(--dim); }
.phase-done     .phase-dot { background: var(--green2); border: 1.5px solid var(--green); color: var(--green); }

.phase-content { flex: 1; padding-top: 6px; }
.phase-header { margin-bottom: 16px; }
.phase-eyebrow { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
.phase-name { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.phase-active .phase-name { color: var(--accent); }
.phase-timing {
  font-size: 12px; color: var(--mid);
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
}
.phase-desc { font-size: 13px; color: var(--mid); margin-top: 8px; line-height: 1.6; }

/* ── WHO BAR ── */
.who-bar {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 20px; margin-bottom: 20px;
  display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
}
.who-bar-title { font-size: 12px; font-weight: 500; color: var(--text); flex-shrink: 0; }
.who-avatars { display: flex; align-items: center; }
.who-av-wrap { position: relative; margin-right: -7px; cursor: default; }
.who-av-wrap:last-child { margin-right: 0; }
.who-av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; border: 2px solid var(--s1);
}
.who-presence {
  position: absolute; bottom: 0; right: 0;
  width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--s1);
}
.who-bar-meta { font-size: 12px; color: var(--mid); margin-left: 6px; }

/* ── CONTACT CARDS ── */
.contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.contact-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px; transition: border-color .15s, box-shadow .15s;
}
.phase-active .contact-card { border-color: rgba(27,95,204,0.2); }
.contact-card:hover { border-color: var(--borderhi); box-shadow: 0 2px 12px rgba(0,0,0,.06); }

.cc-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.cc-avatar-wrap { position: relative; flex-shrink: 0; }
.cc-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500;
}
.av-a { background: rgba(27,95,204,0.1);  color: #1b5fcc; border: 1px solid rgba(27,95,204,0.2); }
.av-b { background: rgba(27,95,204,0.08); color: #1b5fcc; border: 1px solid rgba(27,95,204,0.15); }
.av-c { background: var(--green2);        color: var(--green); border: 1px solid rgba(26,138,96,0.2); }
.av-d { background: var(--gold2);         color: var(--gold);  border: 1px solid rgba(201,125,32,0.2); }
.av-e { background: var(--teal2);         color: var(--teal);  border: 1px solid rgba(26,144,128,0.2); }
.cc-presence-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--s1);
}
.presence-online  { background: #22c55e; }
.presence-away    { background: var(--gold); }
.presence-offline { background: var(--dim); }

.cc-info { flex: 1; min-width: 0; }
.cc-name { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cc-role { font-size: 11.5px; color: var(--mid); margin-top: 1px; }
.cc-location {
  font-size: 11px; color: var(--dim); margin-top: 3px;
  display: flex; align-items: center; gap: 3px;
}
.cc-status-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.cc-dept {
  display: inline-block;
  font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .05em;
  font-family: 'JetBrains Mono', monospace;
}
.dept-qa  { background: var(--accent2); color: var(--accent); }
.dept-ops { background: var(--green2);  color: var(--green); }
.dept-eng { background: var(--blue2);   color: var(--blue); }
.dept-ms  { background: var(--gold2);   color: var(--gold); }
.cc-presence-label { font-size: 10px; }
.cc-presence-online  { color: #22c55e; }
.cc-presence-away    { color: var(--gold); }
.cc-presence-offline { color: var(--dim); }

.cc-why {
  font-size: 12px; color: var(--mid); line-height: 1.55;
  border-top: 1px solid var(--border); padding-top: 10px;
}
.no-contacts { font-size: 13px; color: var(--dim); font-style: italic; padding: 4px 0 12px; }

/* ── BOTTOM GRID ── */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
.section-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px;
}
.sc-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.sc-icon {
  width: 26px; height: 26px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sci-amber { background: var(--gold2);   color: var(--gold); }
.sci-blue  { background: var(--blue2);   color: var(--blue); }
.sci-red   { background: var(--red2);    color: var(--red); }
.sci-green { background: var(--green2);  color: var(--green); }
.sc-title  { font-size: 12px; font-weight: 500; color: var(--text); letter-spacing: .04em; text-transform: uppercase; }

/* SOP Reference cards */
.sop-intro { font-size: 13px; color: var(--mid); margin-bottom: 14px; line-height: 1.6; }
.sop-ref-card { padding: 14px 0; border-bottom: 1px solid var(--border); }
.sop-ref-card:last-child { border-bottom: none; }
.sop-ref-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.sop-flag { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 3px; flex-shrink: 0; letter-spacing: .03em; text-transform: uppercase; }
.flag-gap  { background: var(--red2);   color: var(--red); border-left: 2px solid var(--red); }
.flag-ambi { background: var(--gold2);  color: var(--gold); border-left: 2px solid var(--gold); }
.flag-ok   { background: var(--green2); color: var(--green); border-left: 2px solid var(--green); }
.sop-ref-meta { display: flex; align-items: center; gap: 8px; }
.sop-ref-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--accent); letter-spacing: .02em; }
.sop-ref-step { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dim); }
.sop-ref-title { font-size: 13.5px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.sop-ref-relevance { font-size: 13px; color: var(--mid); line-height: 1.65; }
.reg-note { margin-top: 14px; display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--red); line-height: 1.5; background: var(--red2); padding: 10px 12px; border-radius: 8px; }

/* Corrective actions */
.actions-intro { font-size: 13px; color: var(--mid); margin-bottom: 14px; line-height: 1.6; }
.action-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.action-item:last-child { border-bottom: none; }
.action-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 3px; margin-bottom: 7px;
  letter-spacing: .03em; text-transform: uppercase;
}
.badge-imm   { background: var(--red2);  color: var(--red); border-left: 2px solid var(--red); }
.badge-short { background: var(--gold2); color: var(--gold); border-left: 2px solid var(--gold); }
.badge-long  { background: var(--blue2); color: var(--blue); border-left: 2px solid var(--blue); }
.action-title { font-size: 14px; color: var(--text); font-weight: 500; margin-bottom: 4px; }
.action-desc  { font-size: 13px; color: var(--mid); line-height: 1.6; }

/* Scientific eval */
.sci-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px 22px; margin-top: 14px;
}
.risk-banner {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px; border-radius: 10px; margin-bottom: 18px; border: 1px solid;
}
.risk-banner.risk-high   { background: var(--red2);   border-color: rgba(201,48,48,.2); }
.risk-banner.risk-medium { background: var(--gold2);  border-color: rgba(201,125,32,.2); }
.risk-banner.risk-low    { background: var(--green2); border-color: rgba(26,138,96,.2); }
.risk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.risk-high   .risk-dot { background: var(--red); }
.risk-medium .risk-dot { background: var(--gold); }
.risk-low    .risk-dot { background: var(--green); }
.risk-label { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--mid); font-family: 'JetBrains Mono', monospace; }
.risk-val { font-size: 15px; font-weight: 500; }
.risk-high   .risk-val { color: var(--red); }
.risk-medium .risk-val { color: var(--gold); }
.risk-low    .risk-val { color: var(--green); }
.risk-sub { font-size: 12px; color: var(--mid); margin-left: auto; }
.sci-summary { font-size: 14px; color: var(--mid); line-height: 1.8; margin-bottom: 18px; }
.sci-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sci-cell { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.sci-cell-label { font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
.sci-cell-val   { font-size: 13px; color: var(--text); line-height: 1.5; }
.sv-red    { color: var(--red); }
.sv-amber  { color: var(--gold); }
.sv-green  { color: var(--green); }
.sv-accent { color: var(--accent); }

/* ── LOADING / ERROR ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 80vh; gap: 14px;
}
.spinner {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--accent);
  animation: spin 1s linear infinite;
}
.loading-label { font-size: 13px; color: var(--mid); }

/* ── HAMBURGER ── */
.hamburger { display: none; background: none; border: 1px solid var(--border); color: var(--mid); cursor: pointer; padding: 6px; border-radius: 7px; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.hamburger:hover { color: var(--text); background: var(--s3); }
.hamburger svg { display: block; }

/* ── MOBILE ── */
@media (max-width: 640px) {
  .hamburger { display: flex; align-items: center; justify-content: center; }
  .app-nav { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--s1); border-bottom: 1px solid var(--border); flex-direction: column; padding: 8px 12px; gap: 2px; box-shadow: 0 12px 32px rgba(0,0,0,.3); z-index: 200; }
  .app-nav.open { display: flex; }
  .topbar { position: relative; padding: 0 12px; gap: 8px; height: 48px; }
  .logo { font-size: 19px; }
  .nav-item { padding: 12px 16px; font-size: 14px; width: 100%; border-radius: 8px; }
  .topbar-label { display: none; }
  .topbar-right { gap: 6px; }
  .ref-chip { font-size: 10px; padding: 3px 8px; }
  .priority-pill { font-size: 10px; padding: 3px 10px; }
  /* Page — more breathing room */
  .page { padding: 20px 16px 60px; }
  .hero { padding: 22px 18px; border-radius: 14px; }
  .hero-title { font-size: 23px; }
  .hero-sub { font-size: 13.5px; line-height: 1.6; }
  .obs-quote { font-size: 14px; padding: 14px 16px; line-height: 1.7; }
  .meta-chips { gap: 6px; }
  .meta-chip { font-size: 11px; padding: 5px 12px; }
  .contacts-grid { grid-template-columns: 1fr; }
  .bottom-grid { grid-template-columns: 1fr; }
  .sci-grid { grid-template-columns: 1fr; }
  /* Status tracker — bigger dots */
  .status-tracker { padding: 16px 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .st-label { font-size: 10px; }
  /* Phases */
  .phase-block { gap: 16px; }
  .phase-icon { width: 36px; }
  .phase-dot { width: 36px; height: 36px; font-size: 13px; }
  .phase-name { font-size: 16px; }
  .phase-desc { font-size: 13px; line-height: 1.6; }
  .who-bar { padding: 14px 16px; gap: 10px; flex-wrap: wrap; }
  .who-bar-title { font-size: 12px; }
  .who-bar-meta { font-size: 12px; }
  /* Section cards */
  .section-card { padding: 18px; }
  .sc-head { gap: 8px; margin-bottom: 12px; padding-bottom: 12px; }
  .sc-title { font-size: 13px; }
  .sop-ref-card { padding: 12px 0; }
  .sop-ref-top { flex-direction: column; gap: 6px; }
  .sop-ref-title { font-size: 13px; }
  .sop-ref-relevance { font-size: 12.5px; line-height: 1.55; }
  .action-title { font-size: 14px; }
  .action-desc { font-size: 13px; line-height: 1.6; }
  .risk-banner { flex-wrap: wrap; padding: 14px 16px; gap: 10px; }
  .risk-sub { margin-left: 0; font-size: 12px; width: 100%; }
  .sci-summary { font-size: 13.5px; line-height: 1.7; }
  .sci-cell { padding: 12px 14px; }
  .sci-cell-val { font-size: 13px; }
  .new-btn { font-size: 12px; padding: 8px 14px; }
}
</style>
<script src="/shared/i18n.js"></script>
<script src="/shared/nav.js"></script>
</head>
<body>

<!-- LOADING STATE -->
<div id="loadingView" class="loading">
  <div class="spinner"></div>
  <div class="loading-label">Loading workflow...</div>
</div>

<!-- MAIN VIEW -->
<div id="mainView" style="display:none">

  <!-- TITLE BAR -->
  <div class="title-bar">
    <div class="title-bar-left">
      <a href="/hub/hub.html" class="app-name">Vent<span class="pip"></span></a>
      <button class="mobile-hamburger" onclick="document.querySelector('.title-nav').classList.toggle('open')" aria-label="Menu"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
      <nav class="title-nav" id="mainNav"></nav>
    </div>
    <div class="title-bar-right" id="titleBarRight">
      <div id="langSwitcher"></div>
      <div class="ref-chip" id="topRefCode">—</div>
      <div class="priority-pill" id="topPriority"></div>
      <span class="role-badge" id="roleBadge"></span>
      <span class="user-name" id="titleUser"></span>
      <button class="sign-out-btn" onclick="ventSignOut()" data-i18n="nav.signOut">Sign out</button>
    </div>
  </div>

  <div class="page">

    <!-- HERO -->
    <div class="hero">
      <div class="hero-status">
        <div class="status-dot"></div>
        Observation received and workflow initiated
      </div>
      <div class="hero-title">Your observation has been <em>routed.</em></div>
      <div class="hero-sub" id="heroSub">Processing...</div>
      <div class="obs-quote" id="obsQuote"></div>
      <div class="meta-chips" id="metaChips"></div>
    </div>

    <!-- WORKFLOW STATUS TRACKER -->
    <div class="status-tracker">
      <div class="st-step" id="sts0">
        <div class="st-dot">1</div>
        <div class="st-label">Submitted</div>
      </div>
      <div class="st-step" id="sts1">
        <div class="st-dot">2</div>
        <div class="st-label">Acknowledged</div>
      </div>
      <div class="st-step" id="sts2">
        <div class="st-dot">3</div>
        <div class="st-label">In Progress</div>
      </div>
      <div class="st-step" id="sts3">
        <div class="st-dot">4</div>
        <div class="st-label">Resolved</div>
      </div>
    </div>

    <!-- WHO BAR -->
    <div id="whoBar" class="who-bar" style="display:none"></div>

    <!-- WORKFLOW PHASES -->
    <div class="section-label">Notification workflow</div>
    <div class="workflow" id="workflowEl">
      <div class="workflow-line"></div>
    </div>

    <!-- BOTTOM: SOP refs + Corrective actions -->
    <div class="bottom-grid">
      <div class="section-card">
        <div class="sc-head">
          <div class="sc-icon sci-amber">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="sc-title">Which procedures relate to this</div>
        </div>
        <div id="sopContent"></div>
      </div>
      <div class="section-card">
        <div class="sc-head">
          <div class="sc-icon sci-blue">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <div class="sc-title">What needs to happen</div>
        </div>
        <div id="actionsContent"></div>
      </div>
    </div>

    <!-- SCIENTIFIC EVALUATION -->
    <div class="sci-card">
      <div class="sc-head">
        <div class="sc-icon sci-red">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/></svg>
        </div>
        <div class="sc-title">What the AI assessed about your observation</div>
      </div>
      <div id="riskBanner"></div>
      <div class="sci-summary" id="sciSummary"></div>
      <div class="sci-grid" id="sciGrid"></div>
    </div>

  </div><!-- /page -->
</div><!-- /mainView -->

<script>
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const PHASE_DEFS = [
  { num: 1, label: 'Immediate Response',  timing: '0 – 4 hours',  desc: 'Operational notification — floor-level awareness and immediate response initiated.' },
  { num: 2, label: 'Document & Notify',   timing: 'Same day',     desc: 'Quality documentation — deviation or change control raised in the QMS.' },
  { num: 3, label: 'Investigate & Act',   timing: '2 – 7 days',   desc: 'Technical root cause investigation and corrective action implementation.' },
  { num: 4, label: 'Review & Close',      timing: '1 – 4 weeks',  desc: 'Senior review of findings, regulatory assessment, and formal sign-off.' }
];

const STATUS_ACTIVE = { new: 0, acknowledged: 1, in_progress: 2, resolved: 3 };

async function init() {
  const ref = new URLSearchParams(window.location.search).get('ref');
  if (!ref) { window.location.href = 'index.html'; return; }

  try {
    const d = await loadData(ref);
    render(d);
  } catch (err) {
    console.error(err);
    document.getElementById('loadingView').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:28px;margin-bottom:12px;color:var(--dim)">—</div>
        <div style="font-size:15px;color:var(--text);margin-bottom:6px">Could not load submission</div>
        <div style="font-size:12px;color:var(--dim);margin-bottom:24px">${escHtml(ref)}</div>
        <a href="/operator/index.html" style="font-size:13px;color:var(--accent);text-decoration:none">← New submission</a>
      </div>`;
  }
}

async function loadData(ref) {
  // Try localStorage first (stored right after submission)
  try {
    const raw = localStorage.getItem('vent_' + ref);
    if (raw) return normaliseLocal(JSON.parse(raw));
  } catch (_) {}
  // Fall back to API
  const res = await authFetch(`${SERVER_URL}/submissions/${ref}`);
  if (!res.ok) throw new Error('Not found');
  return normaliseApi(await res.json());
}

function normaliseLocal(d) {
  return {
    refCode: d.refCode,
    area:    d.process_area || 'Upstream',
    shift:   d.shift        || 'Unspecified',
    obs:     d.raw_text     || '',
    status:  d.status       || 'new',
    priority: d.priority    || 'Medium',
    contacts: d.contacts    || [],
    sopRefs:  [...(d.sopRefs||[]), ...(d.bprRefs||[])],
    sciEval:  d.sciEval     || {},
    actions:  d.correctiveActions || [],
    pattern:  d.pattern     || {}
  };
}

function normaliseApi(d) {
  const s = d.structured || {};
  return {
    refCode: d.ref_code,
    area:    d.process_area || 'Upstream',
    shift:   d.shift        || 'Unspecified',
    obs:     d.raw_text     || '',
    status:  d.status       || 'new',
    priority: d.priority || s.priority || 'Medium',
    contacts: s.contacts || [],
    sopRefs:  [...(s.sopRefs||[]), ...(s.bprRefs||[])],
    sciEval:  s.sciEval  || {},
    actions:  s.correctiveActions || [],
    pattern:  s.pattern  || {}
  };
}

function derivePhase(c) {
  if (c.workflowPhase) return parseInt(c.workflowPhase);
  const role = (c.role || '').toLowerCase();
  const dept = c.dept || '';
  if (role.includes('shift lead') || role.includes('ehs')) return 1;
  if (dept === 'qa' && (role.includes('lead') || role.includes('qms'))) return 2;
  if (dept === 'ms' || (dept === 'eng' && !role.includes('director'))) return 3;
  if (role.includes('director') || role.includes('qp') || role.includes('senior')) return 4;
  return 2;
}

function render(d) {
  document.title = `Vent · ${d.refCode}`;

  // Topbar
  document.getElementById('topRefCode').textContent = d.refCode;
  const pill = document.getElementById('topPriority');
  pill.textContent = d.priority;
  pill.className = 'priority-pill ' + (d.priority === 'High' ? 'p-high' : d.priority === 'Low' ? 'p-low' : 'p-medium');

  // Hero
  const gapCount = d.sopRefs.filter(r => r.flag === 'gap').length;
  document.getElementById('heroSub').textContent =
    `${d.contacts.length} contact${d.contacts.length !== 1 ? 's' : ''} notified · ` +
    `${d.sopRefs.length} SOP reference${d.sopRefs.length !== 1 ? 's' : ''} identified` +
    (gapCount ? ` · ${gapCount} procedural gap${gapCount > 1 ? 's' : ''} flagged` : '');

  document.getElementById('obsQuote').textContent = d.obs;

  const pCls = d.priority === 'High' ? 'chip-hi' : '';
  document.getElementById('metaChips').innerHTML = [
    { label: d.area },
    { label: (d.shift || 'Unspecified') + ' Shift' },
    { label: d.priority + ' Priority', cls: pCls },
    { label: d.refCode }
  ].map(c => `<div class="meta-chip ${c.cls||''}">${c.label}</div>`).join('');

  // Status tracker
  const activeIdx = STATUS_ACTIVE[d.status] ?? 0;
  [0,1,2,3].forEach(i => {
    const el = document.getElementById('sts' + i);
    const dot = el.querySelector('.st-dot');
    if (i < activeIdx)      { el.className = 'st-step done';   dot.textContent = '✓'; }
    else if (i === activeIdx) el.className = 'st-step active';
    else                      el.className = 'st-step';
  });

  // Who bar
  renderWhoBar(d.contacts);

  // Group contacts by phase
  const grouped = { 1:[], 2:[], 3:[], 4:[] };
  d.contacts.forEach(c => {
    const p = derivePhase(c);
    (grouped[p] = grouped[p] || []).push(c);
  });

  const activePhase = activeIdx + 1; // status 0→phase1, 1→phase2, etc. (resolved = phase 5, all done)
  const resolvedAll = d.status === 'resolved';

  // Render phases
  const wEl = document.getElementById('workflowEl');
  const phaseHtml = PHASE_DEFS.map((ph, i) => {
    const contacts = grouped[ph.num] || [];
    let state;
    if (resolvedAll)              state = 'done';
    else if (ph.num < activePhase) state = 'done';
    else if (ph.num === activePhase) state = 'active';
    else                           state = 'upcoming';

    const dotContent = state === 'done' ? '✓' : ph.num;

    const cardsHtml = contacts.length
      ? `<div class="contacts-grid">${contacts.map(renderContact).join('')}</div>`
      : `<div class="no-contacts">No contacts assigned to this phase for this observation.</div>`;

    return `
<div class="phase-block phase-${state}" style="animation-delay:${i * 0.08}s">
  <div class="phase-icon"><div class="phase-dot">${dotContent}</div></div>
  <div class="phase-content">
    <div class="phase-header">
      <div class="phase-eyebrow">Phase ${ph.num}</div>
      <div class="phase-name">${ph.label}</div>
      <div class="phase-timing">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${ph.timing}
      </div>
      <div class="phase-desc">${ph.desc}</div>
    </div>
    ${cardsHtml}
  </div>
</div>`;
  }).join('');

  // Re-inject keeping the line element
  wEl.innerHTML = '<div class="workflow-line"></div>' + phaseHtml;

  // SOP refs
  const sopEl = document.getElementById('sopContent');
  if (d.sopRefs.length) {
    const gapCount = d.sopRefs.filter(r => r.flag === 'gap').length;
    const intro = gapCount
      ? `${gapCount} procedural gap${gapCount > 1 ? 's were' : ' was'} identified in the procedures below. These will be escalated to QA for review.`
      : `The following SOP sections are relevant to your observation. No gaps were found — the procedures appear to cover this scenario.`;
    const cards = d.sopRefs.map(r => {
      const flagCls  = r.flag === 'gap' ? 'flag-gap'  : r.flag === 'ambiguous' ? 'flag-ambi' : 'flag-ok';
      const flagIcon = r.flag === 'gap' ? '▲ Gap identified' : r.flag === 'ambiguous' ? '◆ Needs clarification' : '✓ Procedure covers this';
      return `<div class="sop-ref-card">
        <div class="sop-ref-top">
          <div class="sop-ref-meta">
            <span class="sop-ref-code">${escHtml(r.code)}</span>
            <span class="sop-ref-step">§ ${escHtml(r.step)}</span>
          </div>
          <span class="sop-flag ${flagCls}">${flagIcon}</span>
        </div>
        <div class="sop-ref-title">${escHtml(r.title)}</div>
        <div class="sop-ref-relevance">${escHtml(r.relevance)}</div>
      </div>`;
    }).join('');
    const regNote = (d.sciEval.regulatoryFlag === 'Yes' && d.sciEval.regulatoryNote)
      ? `<div class="reg-note"><span style="flex-shrink:0">⚑</span><span><strong>Regulatory note:</strong> ${escHtml(d.sciEval.regulatoryNote)}</span></div>`
      : '';
    sopEl.innerHTML = `<p class="sop-intro">${intro}</p>${cards}${regNote}`;
  } else {
    sopEl.innerHTML = `<p class="sop-intro">Your observation didn't match any specific SOP sections currently in the system. It has still been captured and routed to the appropriate contacts for review.</p>`;
  }

  // Corrective actions
  const actEl = document.getElementById('actionsContent');
  if (d.actions.length) {
    const timingOrder = { immediate: 0, short: 1, long: 2 };
    const sorted = [...d.actions].sort((a, b) => (timingOrder[a.timing] ?? 3) - (timingOrder[b.timing] ?? 3));
    actEl.innerHTML = `<p class="actions-intro">These actions are required based on your observation, listed in order of urgency.</p>` +
      sorted.map(a => {
        const bc = a.timing === 'immediate' ? 'badge-imm' : a.timing === 'short' ? 'badge-short' : 'badge-long';
        const icon = a.timing === 'immediate' ? '↑ Immediate —' : a.timing === 'short' ? '→ Short-term —' : '◎ Long-term —';
        return `<div class="action-item">
          <div class="action-badge ${bc}">${icon} ${a.timingLabel || a.timing}</div>
          <div class="action-title">${escHtml(a.title)}</div>
          <div class="action-desc">${escHtml(a.description)}</div>
        </div>`;
      }).join('');
  } else {
    actEl.innerHTML = `<p class="actions-intro">No specific corrective actions were generated. Your shift lead and QA team will determine the appropriate next steps based on the routed contacts.</p>`;
  }

  // Scientific eval
  const sc = d.sciEval;
  const rl = (sc.riskLevel || '').toLowerCase();
  const riskClass = rl === 'high' ? 'risk-high' : rl === 'low' ? 'risk-low' : 'risk-medium';
  const riskSub = rl === 'high' ? 'Requires prompt escalation' : rl === 'low' ? 'Monitor and document' : 'Review within normal workflow';
  document.getElementById('riskBanner').innerHTML = sc.riskLevel ? `
    <div class="risk-banner ${riskClass}">
      <div class="risk-dot"></div>
      <div>
        <div class="risk-label">Risk level</div>
        <div class="risk-val">${escHtml(sc.riskLevel)}</div>
      </div>
      <div class="risk-sub">${riskSub}</div>
    </div>` : '';

  document.getElementById('sciSummary').textContent = sc.summary || '';

  const cells = [
    { label: 'Most likely cause',          val: sc.rootCauseHypothesis, cls: '' },
    { label: 'Process parameter at risk',  val: sc.affectedParameter,   cls: 'sv-accent' },
    { label: 'Regulatory requirement',
      val: sc.regulatoryFlag === 'Yes' ? 'Yes — a regulatory requirement applies to this observation' : sc.regulatoryFlag === 'No' ? 'No specific regulatory requirement identified' : sc.regulatoryFlag,
      cls: sc.regulatoryFlag === 'Yes' ? 'sv-red' : 'sv-green' },
    { label: 'What was assessed against',  val: 'Facility SOPs cross-referenced via AI. Contacts routed based on process area and observation type.', cls: '' }
  ];
  document.getElementById('sciGrid').innerHTML = cells.map(c => `
    <div class="sci-cell">
      <div class="sci-cell-label">${c.label}</div>
      <div class="sci-cell-val ${c.cls}">${escHtml(c.val) || '—'}</div>
    </div>`).join('');

  // Show
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
}

function getPresence(c) {
  const hour = new Date().getHours();
  const phase = derivePhase(c);
  // Phase 1 (Shift Lead, EHS) — always on the floor
  if (phase === 1) return 'online';
  const biz  = hour >= 8  && hour < 18;
  const core = hour >= 9  && hour < 17;
  // Directors / QP / Senior — core hours only
  if (phase === 4) return core ? 'online' : biz ? 'away' : 'offline';
  // Everyone else — business hours
  return biz ? 'online' : 'away';
}

function getLocation(c) {
  const dept = (c.dept || '').toLowerCase();
  const role = (c.role || '').toLowerCase();
  if (role.includes('ehs'))       return 'EHS Office';
  if (dept === 'ops')             return 'Manufacturing Floor';
  if (dept === 'qa')              return 'QA Office';
  if (dept === 'ms')              return 'MSAT Lab';
  if (dept === 'eng')             return 'Engineering Office';
  return 'On-site';
}

function renderContact(c) {
  const dCls      = c.dept === 'qa' ? 'dept-qa' : c.dept === 'eng' ? 'dept-eng' : c.dept === 'ms' ? 'dept-ms' : 'dept-ops';
  const presence  = getPresence(c);
  const dotCls    = presence === 'online' ? 'presence-online' : presence === 'away' ? 'presence-away' : 'presence-offline';
  const labelCls  = presence === 'online' ? 'cc-presence-online' : presence === 'away' ? 'cc-presence-away' : 'cc-presence-offline';
  const labelTxt  = presence === 'online' ? '● Online now' : presence === 'away' ? '● Away' : '● Offline';
  const location  = getLocation(c);
  return `
<div class="contact-card">
  <div class="cc-top">
    <div class="cc-avatar-wrap">
      <div class="cc-avatar ${c.avatarClass || 'av-a'}">${c.initials || '?'}</div>
      <div class="cc-presence-dot ${dotCls}"></div>
    </div>
    <div class="cc-info">
      <div class="cc-name">${c.name}</div>
      <div class="cc-role">${c.role}</div>
      <div class="cc-location">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${location}
      </div>
      <div class="cc-status-row">
        <div class="cc-dept ${dCls}">${c.deptLabel || c.dept}</div>
        <span class="cc-presence-label ${labelCls}">${labelTxt}</span>
      </div>
    </div>
  </div>
  ${c.why ? `<div class="cc-why">${c.why}</div>` : ''}
</div>`;
}

function renderWhoBar(contacts) {
  const el = document.getElementById('whoBar');
  if (!contacts.length) { el.style.display = 'none'; return; }

  const onlineCount = contacts.filter(c => getPresence(c) === 'online').length;
  const avatarHtml  = contacts.map(c => {
    const presence = getPresence(c);
    const dotCls   = presence === 'online' ? 'presence-online' : presence === 'away' ? 'presence-away' : 'presence-offline';
    return `<div class="who-av-wrap" title="${c.name} — ${c.role}">
      <div class="who-av ${c.avatarClass || 'av-a'}">${c.initials || '?'}</div>
      <div class="who-presence ${dotCls}"></div>
    </div>`;
  }).join('');

  el.style.display = 'flex';
  el.innerHTML = `
    <div class="who-bar-title">People on this</div>
    <div class="who-avatars">${avatarHtml}</div>
    <div class="who-bar-meta">${contacts.length} contacts notified &nbsp;·&nbsp; ${onlineCount} online now</div>`;
}

init();

</script>
</body>
</html>
