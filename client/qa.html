<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vent · QA Doc Control</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #070709;
  --s1:       #0d0d10;
  --s2:       #121215;
  --s3:       #181820;
  --border:   #1e1e26;
  --borderhi: #28282e;
  --text:     #eceaf5;
  --mid:      #7c7a8a;
  --dim:      #38374a;
  --accent:   #b8a4d8;
  --accent2:  rgba(184,164,216,0.1);
  --accent3:  rgba(184,164,216,0.18);
  --gold:     #d4a85a;
  --gold2:    rgba(212,168,90,0.1);
  --green:    #62c99a;
  --green2:   rgba(98,201,154,0.1);
  --red:      #e07070;
  --red2:     rgba(224,112,112,0.1);
  --blue:     #7ab4e8;
  --blue2:    rgba(122,180,232,0.1);
  --teal:     #5ecec0;
  --teal2:    rgba(94,206,192,0.1);
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.page { position: relative; z-index: 1; }

@keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,7,9,.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 20px; height: 56px;
}
.logo {
  font-family: 'Instrument Serif', serif; font-size: 22px;
  letter-spacing: -.02em; color: var(--text);
  display: flex; align-items: center; gap: 7px; flex-shrink: 0;
  text-decoration: none;
}
.pip { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: breathe 3s ease-in-out infinite; }
.topbar-label {
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); padding-left: 16px; border-left: 1px solid var(--border); flex-shrink: 0;
}
.topbar-stats { display: flex; gap: 24px; flex: 1; }
.ts-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mid); }
.ts-num { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); }
.ts-num.red   { color: var(--red); }
.ts-num.amber { color: var(--gold); }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-link {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 12px; cursor: pointer; text-decoration: none;
  transition: border-color .15s, color .15s;
}
.nav-link:hover { border-color: var(--borderhi); color: var(--text); }
.refresh-btn { display: flex; align-items: center; gap: 6px; }
.refresh-btn.spinning svg { animation: spin .8s linear infinite; }

/* ── TABS ── */
.tab-bar {
  display: flex; gap: 0;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--dim); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 14px 18px; cursor: pointer; transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.tab-btn:hover { color: var(--mid); }
.tab-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  background: var(--s3); border: 1px solid var(--border);
  border-radius: 100px; padding: 1px 7px;
  font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--dim);
}
.tab-btn.on .tab-badge { background: var(--accent2); border-color: var(--accent3); color: var(--accent); }

/* ── FILTER BAR ── */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 28px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-group { display: flex; gap: 2px; }
.ftab {
  background: transparent; border: 1px solid var(--border); border-radius: 7px;
  color: var(--dim); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 4px 11px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.ftab:hover { border-color: var(--borderhi); color: var(--mid); }
.ftab.on { background: var(--accent2); border-color: var(--accent3); color: var(--accent); }
.filter-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
.search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 260px; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--dim); pointer-events: none; }
.search-input {
  width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 4px 10px 4px 28px; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--borderhi); }
.search-input::placeholder { color: var(--dim); }
.filter-count { font-size: 11px; color: var(--dim); margin-left: auto; font-family: 'JetBrains Mono', monospace; }

/* ── SUBMISSION LIST ── */
.sub-list { padding: 14px 28px 80px; display: flex; flex-direction: column; gap: 6px; }

.sub-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; transition: border-color .2s; animation: fadeUp .2s ease both;
}
.sub-card:hover { border-color: var(--borderhi); }
.sub-card.open { border-color: var(--borderhi); }

.sub-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; cursor: pointer;
}
.sub-obs-text {
  flex: 1; font-size: 12.5px; color: var(--mid);
  font-family: 'Instrument Serif', serif; font-style: italic; line-height: 1.5;
}
.sub-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.sub-chev { color: var(--dim); transition: transform .25s; flex-shrink: 0; }
.sub-card.open .sub-chev { transform: rotate(180deg); }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }

/* Pills */
.pill {
  display: inline-block; padding: 3px 9px; border-radius: 100px; font-size: 10px;
  font-weight: 500; letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
}
.pill-red   { background: var(--red2);   border: 1px solid rgba(224,112,112,.2); color: var(--red); }
.pill-amber { background: var(--gold2);  border: 1px solid rgba(212,168,90,.2);  color: var(--gold); }
.pill-green { background: var(--green2); border: 1px solid rgba(98,201,154,.2);  color: var(--green); }

.flag {
  display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 4px;
  font-weight: 500; white-space: nowrap;
}
.flag-gap  { background: var(--red2);   color: var(--red);   border: 1px solid rgba(224,112,112,.2); }
.flag-reg  { background: var(--gold2);  color: var(--gold);  border: 1px solid rgba(212,168,90,.2); }
.flag-ambi { background: var(--gold2);  color: var(--gold);  border: 1px solid rgba(212,168,90,.2); }
.flag-ok   { background: var(--green2); color: var(--green); border: 1px solid rgba(98,201,154,.2); }

.status-badge {
  display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 6px;
  font-weight: 500; white-space: nowrap; font-family: 'JetBrains Mono', monospace;
}
.status-new          { background: var(--accent2); color: var(--accent); border: 1px solid var(--accent3); }
.status-acknowledged { background: var(--blue2);   color: var(--blue);   border: 1px solid rgba(122,180,232,.2); }
.status-in_progress  { background: var(--gold2);   color: var(--gold);   border: 1px solid rgba(212,168,90,.2); }
.status-resolved     { background: var(--green2);  color: var(--green);  border: 1px solid rgba(98,201,154,.2); }

/* ── SUBMISSION DETAIL ── */
.sub-detail {
  border-top: 1px solid var(--border);
  padding: 18px 18px 20px;
  background: var(--s2);
}
.detail-obs {
  padding: 11px 15px; background: var(--s3); border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px; color: var(--mid); line-height: 1.7;
  font-family: 'Instrument Serif', serif; font-style: italic; margin-bottom: 16px;
}
.detail-obs::before { content: '\201C'; color: var(--accent); font-size: 18px; line-height: 0; vertical-align: -3px; margin-right: 3px; }
.detail-obs::after  { content: '\201D'; color: var(--accent); font-size: 18px; line-height: 0; vertical-align: -3px; margin-left: 3px; }

.detail-section-label {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 8px;
}

/* SOP ref chips — clickable */
.sop-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.sop-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: var(--s1); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all .15s;
}
.sop-chip:hover { border-color: var(--gold); background: var(--gold2); }
.sop-chip.gap  { border-color: rgba(224,112,112,.3); background: var(--red2); }
.sop-chip.gap:hover { border-color: var(--red); }
.sop-chip.ambiguous { border-color: rgba(212,168,90,.3); background: var(--gold2); }
.chip-code { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--accent); }
.chip-step { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--mid); }
.chip-flag { font-size: 9px; font-weight: 500; letter-spacing: .04em; }
.chip-flag.gap    { color: var(--red); }
.chip-flag.ambiguous { color: var(--gold); }
.chip-flag.compliant { color: var(--green); }
.chip-icon { color: var(--dim); opacity: .6; flex-shrink: 0; }

/* QA Actions */
.qa-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.qa-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 7px 14px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.qa-btn:hover { border-color: var(--borderhi); color: var(--text); }
.qa-btn.cc:hover  { border-color: var(--accent3); color: var(--accent); background: var(--accent2); }
.qa-btn.dev:hover { border-color: rgba(224,112,112,.3); color: var(--red); background: var(--red2); }
.qa-btn.resolve:hover { border-color: rgba(98,201,154,.3); color: var(--green); background: var(--green2); }
.qa-btn:disabled { opacity: .35; cursor: default; }

/* Sci eval inline */
.sci-inline {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px;
}
.sci-cell {
  background: var(--s1); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px;
}
.sci-cell-label { font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
.sci-cell-val { font-size: 12px; color: var(--text); line-height: 1.4; }
.sci-cell-val.red   { color: var(--red); }
.sci-cell-val.amber { color: var(--gold); }
.sci-cell-val.green { color: var(--green); }
.sci-cell-val.accent{ color: var(--accent); }

/* ── SOP VIEWER DRAWER ── */
.sop-backdrop {
  position: fixed; inset: 0;
  background: rgba(7,7,9,.6); z-index: 199;
  display: none;
  animation: fadeIn .2s ease;
}
.sop-backdrop.open { display: block; }

.sop-drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 520px; max-width: 100vw;
  background: var(--s1); border-left: 1px solid var(--border);
  z-index: 200;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sop-drawer.open { transform: translateX(0); }

.drawer-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px; flex-shrink: 0;
}
.drawer-title-block { flex: 1; }
.drawer-doc-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 3px; }
.drawer-doc-title { font-size: 14px; color: var(--text); font-weight: 400; line-height: 1.4; }
.drawer-section { font-size: 12px; color: var(--mid); margin-top: 3px; }
.drawer-close {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--mid); padding: 5px 8px; cursor: pointer; flex-shrink: 0;
  font-size: 13px; transition: all .15s;
}
.drawer-close:hover { border-color: var(--borderhi); color: var(--text); }

.drawer-gap-note {
  margin: 0 20px; padding: 10px 14px;
  background: var(--red2); border: 1px solid rgba(224,112,112,.25);
  border-radius: 8px; font-size: 12.5px; color: var(--red); line-height: 1.6;
  flex-shrink: 0; margin-top: 12px;
}
.drawer-gap-note strong { font-weight: 500; display: block; margin-bottom: 2px; font-size: 10px; letter-spacing: .06em; text-transform: uppercase; }

.drawer-content {
  flex: 1; overflow-y: auto; padding: 16px 20px 20px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.drawer-content::-webkit-scrollbar { width: 4px; }
.drawer-content::-webkit-scrollbar-track { background: transparent; }
.drawer-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* SOP content rendering */
.sop-section-block { margin-bottom: 20px; }
.sop-section-title {
  font-size: 11px; letter-spacing: .06em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.sop-line { font-size: 12.5px; color: var(--mid); line-height: 1.7; padding: 2px 0; }
.sop-line.meta { color: var(--dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.sop-line.step { display: flex; gap: 8px; padding: 3px 0; }
.sop-line.subitem { padding-left: 20px; }
.sop-line.bold { color: var(--text); font-weight: 400; }
.sop-line.note {
  padding: 8px 12px; background: var(--gold2); border-left: 2px solid var(--gold);
  border-radius: 0 6px 6px 0; color: var(--gold); margin: 6px 0;
  font-size: 12px; line-height: 1.6;
}
.step-num {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
  flex-shrink: 0; min-width: 52px;
}
.sop-line.highlighted,
.sop-line.highlighted .sop-line { color: var(--text) !important; }
.sop-highlight-wrap {
  background: rgba(212,168,90,.08); border: 1px solid rgba(212,168,90,.2);
  border-radius: 6px; padding: 8px 12px; margin: 4px 0;
}
.sop-highlight-wrap .sop-line { color: var(--text); }
.sop-highlight-wrap .step-num { color: var(--gold); }
.highlight-label {
  font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 4px; display: flex; align-items: center; gap: 4px;
}

.drawer-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 12px; color: var(--dim); font-size: 13px;
}
.load-ring {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); border-top-color: var(--accent);
  animation: spin 1s linear infinite;
}

/* ── DRAFT MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(7,7,9,.7); z-index: 300;
  display: none; align-items: center; justify-content: center; padding: 20px;
  animation: fadeIn .2s ease;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--s1); border: 1px solid var(--borderhi);
  border-radius: 14px; width: 100%; max-width: 680px; max-height: 85vh;
  display: flex; flex-direction: column; overflow: hidden;
  animation: fadeUp .25s ease both;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-title { font-size: 14px; color: var(--text); font-weight: 400; }
.modal-subtitle { font-size: 12px; color: var(--mid); margin-top: 2px; }
.modal-close {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--mid); padding: 5px 10px; cursor: pointer; font-size: 12px;
  transition: all .15s;
}
.modal-close:hover { border-color: var(--borderhi); color: var(--text); }
.modal-body { flex: 1; overflow-y: auto; padding: 20px; }
.draft-text {
  width: 100%; min-height: 320px;
  background: var(--s3); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  line-height: 1.7; padding: 14px; resize: vertical; outline: none;
  transition: border-color .15s;
}
.draft-text:focus { border-color: var(--borderhi); }
.modal-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.modal-note { font-size: 11px; color: var(--dim); }
.copy-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent); color: #070709;
  border: none; border-radius: 7px; padding: 8px 16px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.copy-btn:hover { opacity: .85; }

/* ── PATTERNS TAB ── */
.patterns-list { padding: 14px 28px 80px; display: flex; flex-direction: column; gap: 8px; }
.pattern-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; transition: border-color .2s; animation: fadeUp .2s ease both;
}
.pattern-card:hover { border-color: var(--borderhi); }
.pattern-card-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
}
.pattern-count-badge {
  min-width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 500; font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.badge-critical { background: var(--red2);   color: var(--red);   border: 1px solid rgba(224,112,112,.3); }
.badge-warning  { background: var(--gold2);  color: var(--gold);  border: 1px solid rgba(212,168,90,.3); }
.badge-info     { background: var(--accent2); color: var(--accent); border: 1px solid var(--accent3); }
.pattern-info { flex: 1; }
.pattern-doc { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); margin-bottom: 3px; }
.pattern-section { font-size: 13px; color: var(--text); font-weight: 400; }
.pattern-subtitle { font-size: 12px; color: var(--mid); margin-top: 2px; }
.pattern-threshold {
  font-size: 10px; padding: 3px 9px; border-radius: 100px;
  font-weight: 500; letter-spacing: .04em; white-space: nowrap; flex-shrink: 0;
}
.threshold-met    { background: var(--red2); color: var(--red); border: 1px solid rgba(224,112,112,.2); }
.threshold-near   { background: var(--gold2); color: var(--gold); border: 1px solid rgba(212,168,90,.2); }
.threshold-normal { background: var(--s3); color: var(--dim); border: 1px solid var(--border); }

.pattern-detail {
  border-top: 1px solid var(--border); background: var(--s2);
}
.pattern-subs { padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
.pattern-sub-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: var(--s1); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: border-color .15s;
}
.pattern-sub-row:hover { border-color: var(--borderhi); }
.pattern-sub-obs { flex: 1; font-size: 12px; color: var(--mid); font-family: 'Instrument Serif', serif; font-style: italic; }
.pattern-action-row {
  padding: 12px 16px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.view-sop-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--mid); font-family: 'DM Sans', sans-serif; font-size: 12px;
  padding: 6px 12px; cursor: pointer; transition: all .15s;
}
.view-sop-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold2); }

/* Empty / loading */
.empty-state { padding: 60px 20px; text-align: center; font-size: 14px; color: var(--dim); line-height: 1.8; }
.loading-state { padding: 60px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; color: var(--dim); font-size: 13px; }

/* Responsive */
@media (max-width: 960px) {
  .topbar-stats { display: none; }
  .sop-drawer { width: 100vw; }
}
@media (max-width: 600px) {
  .topbar { padding: 0 16px; }
  .filter-bar { padding: 8px 16px; }
  .sub-list, .patterns-list { padding: 12px 16px 60px; }
  .sci-inline { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page">

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="logo">Vent<div class="pip"></div></a>
  <div class="topbar-label">QA Doc Control</div>
  <div class="topbar-stats">
    <div class="ts-item"><span class="ts-num red" id="tGaps">—</span>&nbsp;SOP gaps</div>
    <div class="ts-item"><span class="ts-num amber" id="tReg">—</span>&nbsp;reg flags</div>
    <div class="ts-item"><span class="ts-num" id="tOpen">—</span>&nbsp;open items</div>
  </div>
  <div class="topbar-right">
    <button class="nav-link refresh-btn" id="refreshBtn" onclick="loadAll()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.87"/></svg>
      Refresh
    </button>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="index.html" class="nav-link" style="background:var(--accent);color:#070709;border-color:var(--accent)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Submit
    </a>
  </div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn on" id="tabSubs" onclick="switchTab('subs')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Submissions
    <span class="tab-badge" id="subsBadge">—</span>
  </button>
  <button class="tab-btn" id="tabPat" onclick="switchTab('patterns')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    SOP Gap Patterns
    <span class="tab-badge" id="patBadge">—</span>
  </button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <div class="filter-group" id="filterGroup">
    <button class="ftab on" data-val="gaps"     onclick="setFilter(this)">SOP Gaps</button>
    <button class="ftab"    data-val="reg"      onclick="setFilter(this)">Reg Flags</button>
    <button class="ftab"    data-val="high"     onclick="setFilter(this)">High Priority</button>
    <button class="ftab"    data-val="all"      onclick="setFilter(this)">All</button>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group" id="statusGroup">
    <button class="ftab on" data-val="open"     onclick="setStatusFilter(this)">Open</button>
    <button class="ftab"    data-val="all"      onclick="setStatusFilter(this)">All Status</button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" placeholder="Search…" oninput="renderSubs()">
  </div>
  <div class="filter-count" id="filterCount"></div>
</div>

<!-- SUBMISSIONS TAB -->
<div id="panelSubs">
  <div class="sub-list" id="subList">
    <div class="loading-state"><div class="load-ring"></div>Loading…</div>
  </div>
</div>

<!-- PATTERNS TAB -->
<div id="panelPatterns" style="display:none">
  <div class="patterns-list" id="patternList">
    <div class="loading-state"><div class="load-ring"></div>Computing patterns…</div>
  </div>
</div>

</div><!-- /page -->

<!-- SOP VIEWER DRAWER -->
<div class="sop-backdrop" id="sopBackdrop" onclick="closeDrawer()"></div>
<div class="sop-drawer" id="sopDrawer">
  <div class="drawer-head">
    <div class="drawer-title-block">
      <div class="drawer-doc-id" id="drawerDocId">—</div>
      <div class="drawer-doc-title" id="drawerDocTitle">—</div>
      <div class="drawer-section" id="drawerSection">—</div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕ Close</button>
  </div>
  <div class="drawer-gap-note" id="drawerGapNote" style="display:none">
    <strong>Gap identified</strong>
    <span id="drawerGapText"></span>
  </div>
  <div class="drawer-content" id="drawerContent">
    <div class="drawer-loading"><div class="load-ring"></div>Loading SOP…</div>
  </div>
</div>

<!-- DRAFT MODAL -->
<div class="modal-backdrop" id="draftModal" onclick="if(event.target===this)closeDraft()">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="draftTitle">Change Control Draft</div>
        <div class="modal-subtitle" id="draftSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeDraft()">✕ Close</button>
    </div>
    <div class="modal-body">
      <textarea class="draft-text" id="draftText" spellcheck="false"></textarea>
    </div>
    <div class="modal-foot">
      <span class="modal-note">Edit before copying — this is a pre-filled starting point only.</span>
      <button class="copy-btn" onclick="copyDraft()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy to clipboard
      </button>
    </div>
  </div>
</div>

<script>
const SERVER_URL = 'https://vent-production-8f8a.up.railway.app';

let allSubs = [];
let openCards = new Set();
let openPatterns = new Set();
let activeFilter = 'gaps';
let activeStatusFilter = 'open';
let currentTab = 'subs';

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch(`${SERVER_URL}/submissions`);
    if (!res.ok) throw new Error();
    allSubs = await res.json();
    renderStats();
    renderSubs();
    renderPatterns();
  } catch {
    document.getElementById('subList').innerHTML =
      '<div class="empty-state">Could not reach server.<br><span style="font-size:12px;color:var(--dim)">' + SERVER_URL + '</span></div>';
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderStats() {
  const gaps  = allSubs.filter(s => hasGap(s)).length;
  const reg   = allSubs.filter(s => hasRegFlag(s)).length;
  const open  = allSubs.filter(s => { const st = st_(s); return st !== 'resolved'; }).length;
  document.getElementById('tGaps').textContent = gaps;
  document.getElementById('tReg').textContent  = reg;
  document.getElementById('tOpen').textContent = open;
  document.getElementById('subsBadge').textContent = allSubs.length;
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function hasGap(s) {
  const p = s.structured || {};
  return [...(p.sopRefs || []), ...(p.bprRefs || [])].some(r => r.flag === 'gap' || r.flag === 'ambiguous');
}
function hasRegFlag(s) {
  return (s.structured?.sciEval?.regulatoryFlag) === 'Yes';
}
function st_(s) { return s.status || 'new'; }

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return allSubs.filter(s => {
    if (activeFilter === 'gaps' && !hasGap(s)) return false;
    if (activeFilter === 'reg'  && !hasRegFlag(s)) return false;
    if (activeFilter === 'high' && s.priority !== 'High') return false;
    if (activeStatusFilter === 'open' && st_(s) === 'resolved') return false;
    if (q) {
      const hay = [(s.raw_text||''), (s.ref_code||''), (s.process_area||'')].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function setFilter(btn) {
  document.querySelectorAll('#filterGroup .ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeFilter = btn.dataset.val;
  renderSubs();
}
function setStatusFilter(btn) {
  document.querySelectorAll('#statusGroup .ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeStatusFilter = btn.dataset.val;
  renderSubs();
}

// ── RENDER SUBMISSIONS ────────────────────────────────────────────────────────
function renderSubs() {
  const list = document.getElementById('subList');
  const filtered = getFiltered();
  document.getElementById('filterCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">No submissions match your filters.</div>';
    return;
  }
  list.innerHTML = filtered.map(cardHTML).join('');

  openCards.forEach(ref => {
    const card = document.querySelector(`[data-ref="${ref}"]`);
    if (!card) return;
    card.classList.add('open');
    const det = document.getElementById('det-' + ref);
    if (det) det.style.display = 'block';
  });
}

function cardHTML(s) {
  const p = s.structured || {};
  const sops = [...(p.sopRefs || []), ...(p.bprRefs || [])];
  const status = st_(s);
  const priorityCls = s.priority === 'High' ? 'pill-red' : s.priority === 'Medium' ? 'pill-amber' : 'pill-green';
  const gapCount = sops.filter(r => r.flag === 'gap').length;
  const regFlag  = hasRegFlag(s);

  const d = new Date(s.created_at);
  const dateStr = d.toLocaleDateString('en-IE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });

  return `
<div class="sub-card" data-ref="${esc(s.ref_code)}">
  <div class="sub-header" onclick="toggleCard('${esc(s.ref_code)}')">
    <span class="pill ${priorityCls}">${esc(s.priority)}</span>
    <span class="mono">${esc(s.ref_code)}</span>
    <div class="sub-obs-text">${esc((s.raw_text||'').slice(0,110))}${(s.raw_text||'').length > 110 ? '…' : ''}</div>
    <div class="sub-meta">
      ${gapCount  > 0 ? `<span class="flag flag-gap">${gapCount} gap${gapCount>1?'s':''}</span>` : ''}
      ${regFlag       ? `<span class="flag flag-reg">Reg</span>` : ''}
      <span class="status-badge status-${status}">${statusLabel(status)}</span>
      <span style="font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace">${dateStr}</span>
    </div>
    <div class="sub-chev">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
  <div class="sub-detail" id="det-${esc(s.ref_code)}" style="display:none">
    ${detailHTML(s)}
  </div>
</div>`;
}

function detailHTML(s) {
  const p = s.structured || {};
  const sops = [...(p.sopRefs || []), ...(p.bprRefs || [])];
  const sci  = p.sciEval || {};
  const ref  = s.ref_code;
  const status = st_(s);

  const chips = sops.map(r => {
    const fc = r.flag === 'gap' ? 'gap' : r.flag === 'ambiguous' ? 'ambiguous' : '';
    const fl = r.flag === 'gap' ? 'Gap' : r.flag === 'ambiguous' ? 'Ambiguous' : 'OK';
    const flc = r.flag === 'gap' ? 'gap' : r.flag === 'ambiguous' ? 'ambiguous' : 'compliant';
    return `<div class="sop-chip ${fc}" onclick="openSopViewer('${esc(r.code)}','${esc(r.step)}','${esc(r.relevance)}','${esc(r.flag)}')">
      <svg class="chip-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="chip-code">${esc(r.code)}</span>
      <span class="chip-step">§${esc(r.step)}</span>
      <span class="chip-flag ${flc}">${fl}</span>
      <svg class="chip-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');

  const sciContent = sci.summary ? `
    <div class="detail-section-label" style="margin-top:14px">Scientific Evaluation</div>
    <div class="sci-inline">
      <div class="sci-cell" style="grid-column:1/-1">
        <div class="sci-cell-label">Summary</div>
        <div class="sci-cell-val">${esc(sci.summary)}</div>
      </div>
      <div class="sci-cell">
        <div class="sci-cell-label">Root Cause Hypothesis</div>
        <div class="sci-cell-val">${esc(sci.rootCauseHypothesis||'—')}</div>
      </div>
      <div class="sci-cell">
        <div class="sci-cell-label">Risk Level</div>
        <div class="sci-cell-val ${sci.riskLevel==='High'?'red':sci.riskLevel==='Medium'?'amber':'green'}">${esc(sci.riskLevel||'—')}</div>
      </div>
      <div class="sci-cell">
        <div class="sci-cell-label">Affected Parameter</div>
        <div class="sci-cell-val accent">${esc(sci.affectedParameter||'—')}</div>
      </div>
      <div class="sci-cell">
        <div class="sci-cell-label">Regulatory Note</div>
        <div class="sci-cell-val ${sci.regulatoryFlag==='Yes'?'red':''}">${esc(sci.regulatoryNote||'—')}</div>
      </div>
    </div>` : '';

  const { nextLabel, nextStatus, nextCls } = nextAction(status);
  const hasSopGap = sops.some(r => r.flag === 'gap');

  return `
    <div class="detail-obs">${esc(s.raw_text||'')}</div>

    ${sops.length ? `
    <div class="detail-section-label">SOP References — click to open in viewer</div>
    <div class="sop-chips">${chips}</div>` : ''}

    ${sciContent}

    <div class="qa-actions" style="margin-top:16px">
      ${hasSopGap ? `<button class="qa-btn cc" onclick="openDraft('cc','${esc(ref)}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Open Change Control
      </button>` : ''}
      ${sci.regulatoryFlag === 'Yes' ? `<button class="qa-btn dev" onclick="openDraft('dev','${esc(ref)}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Raise Deviation
      </button>` : ''}
      ${nextStatus ? `<button class="qa-btn resolve" onclick="doStatus('${esc(ref)}','${nextStatus}',this)">${nextLabel}</button>` : ''}
    </div>`;
}

// ── PATTERNS ──────────────────────────────────────────────────────────────────
function computePatterns() {
  const map = {};
  allSubs.forEach(s => {
    const p = s.structured || {};
    [...(p.sopRefs || []), ...(p.bprRefs || [])].forEach(r => {
      if (r.flag !== 'gap' && r.flag !== 'ambiguous') return;
      const key = `${r.code}::${r.step}`;
      if (!map[key]) map[key] = { code: r.code, title: r.title, step: r.step, flag: r.flag, subs: [] };
      if (!map[key].subs.find(x => x.ref_code === s.ref_code)) map[key].subs.push(s);
    });
  });
  return Object.values(map).sort((a, b) => b.subs.length - a.subs.length);
}

function renderPatterns() {
  const patterns = computePatterns();
  document.getElementById('patBadge').textContent = patterns.length;
  const list = document.getElementById('patternList');

  if (!patterns.length) {
    list.innerHTML = '<div class="empty-state">No SOP gaps found across submissions yet.<br><span style="font-size:12px;color:var(--dim)">Submit observations to build pattern intelligence.</span></div>';
    return;
  }

  list.innerHTML = patterns.map((pat, i) => {
    const count = pat.subs.length;
    const threshold = 3;
    const met  = count >= threshold;
    const near = count >= threshold - 1 && !met;
    const badgeCls   = met ? 'badge-critical' : near ? 'badge-warning' : 'badge-info';
    const threshCls  = met ? 'threshold-met'  : near ? 'threshold-near' : 'threshold-normal';
    const threshLabel = met ? `⚑ Threshold reached` : `${count} / ${threshold}`;

    const subRows = pat.subs.map(s => `
      <div class="pattern-sub-row" onclick="openCardFromPattern('${esc(s.ref_code)}')">
        <span class="mono">${esc(s.ref_code)}</span>
        <span class="pill ${s.priority==='High'?'pill-red':s.priority==='Medium'?'pill-amber':'pill-green'}" style="font-size:9px;padding:2px 7px">${esc(s.priority)}</span>
        <div class="pattern-sub-obs">${esc((s.raw_text||'').slice(0,90))}…</div>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--dim);flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`).join('');

    return `
<div class="pattern-card" data-pat="${i}">
  <div class="pattern-card-head" onclick="togglePattern(${i})">
    <div class="pattern-count-badge ${badgeCls}">${count}</div>
    <div class="pattern-info">
      <div class="pattern-doc">${esc(pat.code)} &mdash; §${esc(pat.step)}</div>
      <div class="pattern-section">${esc(pat.title)}</div>
      <div class="pattern-subtitle">${count} independent submission${count>1?'s':''} flagged this ${pat.flag}</div>
    </div>
    <span class="pattern-threshold ${threshCls}">${threshLabel}</span>
    <svg style="color:var(--dim);transition:transform .25s;flex-shrink:0" class="pat-chev-${i}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="pattern-detail" id="patdet-${i}" style="display:none">
    <div class="pattern-subs">${subRows}</div>
    <div class="pattern-action-row">
      <button class="view-sop-btn" onclick="openSopViewer('${esc(pat.code)}','${esc(pat.step)}','${count} submissions have flagged this section','${pat.flag}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        View SOP Section
      </button>
      <button class="qa-btn cc" onclick="openPatternCC('${esc(pat.code)}','${esc(pat.step)}','${esc(pat.title)}',${count})">
        Open Change Control Draft
      </button>
    </div>
  </div>
</div>`;
  }).join('');
}

function togglePattern(i) {
  const det  = document.getElementById('patdet-' + i);
  const chev = document.querySelector('.pat-chev-' + i);
  const open = det.style.display !== 'none';
  if (open) {
    det.style.display = 'none';
    if (chev) chev.style.transform = '';
    openPatterns.delete(i);
  } else {
    det.style.display = 'block';
    if (chev) chev.style.transform = 'rotate(180deg)';
    openPatterns.add(i);
  }
}

function openCardFromPattern(ref) {
  switchTab('subs');
  // Show all so the card is visible
  document.querySelectorAll('#filterGroup .ftab').forEach(b => b.classList.remove('on'));
  document.querySelector('#filterGroup .ftab[data-val="all"]').classList.add('on');
  activeFilter = 'all';
  renderSubs();
  setTimeout(() => {
    const card = document.querySelector(`[data-ref="${ref}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      toggleCard(ref);
    }
  }, 100);
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('panelSubs').style.display     = tab === 'subs'     ? 'block' : 'none';
  document.getElementById('panelPatterns').style.display = tab === 'patterns' ? 'block' : 'none';
  document.getElementById('filterBar').style.display     = tab === 'subs'     ? 'flex'  : 'none';
  document.getElementById('tabSubs').classList.toggle('on', tab === 'subs');
  document.getElementById('tabPat').classList.toggle('on',  tab === 'patterns');
}

// ── CARD TOGGLE ───────────────────────────────────────────────────────────────
function toggleCard(ref) {
  const card = document.querySelector(`[data-ref="${ref}"]`);
  const det  = document.getElementById('det-' + ref);
  if (!card || !det) return;
  const isOpen = card.classList.contains('open');
  if (isOpen) {
    card.classList.remove('open'); det.style.display = 'none'; openCards.delete(ref);
  } else {
    card.classList.add('open'); det.style.display = 'block'; openCards.add(ref);
  }
}

// ── STATUS UPDATE ─────────────────────────────────────────────────────────────
async function doStatus(ref, newStatus, btn) {
  btn.disabled = true;
  try {
    const res = await fetch(`${SERVER_URL}/submissions/${ref}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (!res.ok) throw new Error();
    const sub = allSubs.find(s => s.ref_code === ref);
    if (sub) sub.status = newStatus;
    renderStats(); renderSubs();
  } catch {
    btn.disabled = false;
    alert('Could not update status.');
  }
}

// ── SOP VIEWER ────────────────────────────────────────────────────────────────
let sopCache = {};

async function openSopViewer(docId, step, relevance, flag) {
  document.getElementById('drawerDocId').textContent    = docId;
  document.getElementById('drawerDocTitle').textContent = 'Loading…';
  document.getElementById('drawerSection').textContent  = `Section ${step}`;
  document.getElementById('drawerContent').innerHTML    = '<div class="drawer-loading"><div class="load-ring"></div>Loading SOP…</div>';

  const gapNote = document.getElementById('drawerGapNote');
  if (flag === 'gap' || flag === 'ambiguous') {
    gapNote.style.display = 'block';
    document.getElementById('drawerGapText').textContent = relevance || '';
  } else {
    gapNote.style.display = 'none';
  }

  document.getElementById('sopBackdrop').classList.add('open');
  document.getElementById('sopDrawer').classList.add('open');

  try {
    if (!sopCache[docId]) {
      const res = await fetch(`${SERVER_URL}/sop/${docId}`);
      if (!res.ok) throw new Error();
      sopCache[docId] = await res.json();
    }
    const chunks = sopCache[docId];
    if (chunks.length) {
      document.getElementById('drawerDocTitle').textContent =
        chunks[0].content.split('\n')[0].replace(/^\[.+?\]\s*/, '').trim() || docId;
    }
    renderSopContent(chunks, step);
  } catch {
    document.getElementById('drawerContent').innerHTML =
      '<div class="empty-state" style="padding:40px 20px">Could not load SOP content.</div>';
  }
}

function renderSopContent(chunks, highlightStep) {
  const content = document.getElementById('drawerContent');
  if (!chunks.length) {
    content.innerHTML = '<div class="empty-state" style="padding:40px 20px">No content found.</div>';
    return;
  }

  let highlighted = null;
  const html = chunks.map(chunk => {
    const lines = chunk.content.split('\n');
    const linesHTML = [];
    let i = 0;

    // Skip the first two header lines (doc id + section label) as we show them in drawer-head
    const startLine = lines[0].startsWith('[') ? 2 : 0;

    for (let li = startLine; li < lines.length; li++) {
      const line = lines[li];
      const trimmed = line.trim();
      if (!trimmed) { linesHTML.push('<div style="height:6px"></div>'); continue; }

      const stepMatch = trimmed.match(/^(\d+(?:\.\d+)+)/);
      const lineStep  = stepMatch ? stepMatch[1] : null;
      const isTarget  = lineStep && (lineStep === highlightStep || highlightStep.startsWith(lineStep + '.') || lineStep.startsWith(highlightStep + '.') || lineStep === highlightStep);

      const rendered = esc(trimmed)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code style="font-family:JetBrains Mono,monospace;font-size:10.5px;background:var(--s3);padding:1px 5px;border-radius:3px">$1</code>');

      if (isTarget && !highlighted) {
        highlighted = `sec-${lineStep}`;
        linesHTML.push(`
          <div class="sop-highlight-wrap" id="sec-${esc(lineStep)}">
            <div class="highlight-label">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              Referenced section
            </div>
            <div class="sop-line step"><span class="step-num">${esc(lineStep)}</span><span>${rendered.slice(esc(lineStep).length).trim()}</span></div>
          </div>`);
      } else if (trimmed.startsWith('**NOTE') || trimmed.startsWith('**CAUTION') || trimmed.startsWith('**WARNING')) {
        linesHTML.push(`<div class="sop-line note">${rendered}</div>`);
      } else if (lineStep) {
        linesHTML.push(`<div class="sop-line step"><span class="step-num">${esc(lineStep)}</span><span>${rendered.slice(esc(lineStep).length).trim()}</span></div>`);
      } else if (trimmed.startsWith('|')) {
        linesHTML.push(`<div class="sop-line" style="font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim)">${rendered}</div>`);
      } else {
        linesHTML.push(`<div class="sop-line ${trimmed.startsWith('**') ? 'bold' : ''}">${rendered}</div>`);
      }
    }

    return `
      <div class="sop-section-block">
        <div class="sop-section-title">${esc(chunk.section_title)}</div>
        ${linesHTML.join('')}
      </div>`;
  }).join('');

  content.innerHTML = html;

  // Scroll to highlighted section
  if (highlighted) {
    setTimeout(() => {
      const el = document.getElementById(highlighted);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
  }
}

function closeDrawer() {
  document.getElementById('sopBackdrop').classList.remove('open');
  document.getElementById('sopDrawer').classList.remove('open');
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function statusLabel(s) {
  return { new:'New', acknowledged:'Acknowledged', in_progress:'In Progress', resolved:'Resolved' }[s] || s;
}
function nextAction(status) {
  if (status === 'new')          return { nextLabel:'Acknowledge',  nextStatus:'acknowledged', nextCls:'' };
  if (status === 'acknowledged') return { nextLabel:'Start CAPA',   nextStatus:'in_progress',  nextCls:'' };
  if (status === 'in_progress')  return { nextLabel:'Mark Resolved', nextStatus:'resolved',     nextCls:'resolve' };
  return { nextLabel:'', nextStatus:'', nextCls:'' };
}
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
